<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis AI</title>
    <style>
        :root {
            --accent: #008cff;
            --bg: #00050a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        /* LIENZO DEL UNIVERSO */
        #universe-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* PANEL DE PENSAMIENTOS DE LA IA */
        #ai-brain {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 300px;
            height: 200px;
            background: rgba(0, 10, 20, 0.8);
            border: 1px solid var(--accent);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 15px;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 140, 255, 0.3);
        }

        #ai-log {
            overflow-y: auto;
            flex-grow: 1;
            color: #00ffcc;
        }

        .status-bar {
            border-bottom: 1px solid rgba(0, 140, 255, 0.3);
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: var(--accent);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* INTERFAZ SUPERIOR */
        .header {
            position: fixed;
            top: 20px; width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .header h1 {
            letter-spacing: 10px;
            font-weight: 200;
            margin: 0;
            opacity: 0.7;
        }

        .btn-restart {
            position: fixed;
            top: 20px; right: 20px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid white;
            color: white;
            cursor: pointer;
            z-index: 1000;
            transition: 0.3s;
        }
        .btn-restart:hover { background: white; color: black; }

    </style>
</head>
<body>

    <div class="header">
        <h1>ANX UNIVERSUM</h1>
    </div>

    <button class="btn-restart" onclick="resetUniverse()">REINICIAR BIG BANG</button>

    <div id="ai-brain">
        <div class="status-bar">Nucleo de IA: Activo</div>
        <div id="ai-log">Iniciando secuencia de creación...</div>
    </div>

    <canvas id="universe-canvas"></canvas>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');

        let width, height;
        let elements = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Inteligencia de la IA
        class AI_Architect {
            constructor() {
                this.energy = 100;
                this.thoughts = [
                    "Analizando el vacío...",
                    "Detectando fluctuaciones cuánticas.",
                    "Preparando el tejido del espacio-tiempo."
                ];
            }

            think() {
                const decider = Math.random();
                
                if (decider < 0.05) {
                    this.createStar();
                } else if (decider < 0.07) {
                    this.createNebula();
                } else if (decider < 0.01) {
                    this.createSupernova();
                }

                // Mantener el log activo
                if (Math.random() < 0.02) {
                    this.updateLog();
                }
            }

            updateLog() {
                const phrases = [
                    "Expandiendo fronteras del universo.",
                    "Generando gravedad en sector " + Math.floor(Math.random()*99),
                    "Estabilizando órbitas planetarias.",
                    "IA: La entropía está bajo control.",
                    "Creando materia oscura..."
                ];
                const msg = document.createElement('div');
                msg.innerText = "> " + phrases[Math.floor(Math.random()*phrases.length)];
                log.prepend(msg);
                if(log.childNodes.length > 8) log.removeChild(log.lastChild);
            }

            createStar() {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const size = Math.random() * 2;
                elements.push({ type: 'star', x, y, size, alpha: 0 });
            }

            createNebula() {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const size = 50 + Math.random() * 150;
                const color = `hsla(${Math.random() * 360}, 70%, 50%, 0.05)`;
                elements.push({ type: 'nebula', x, y, size, color });
            }

            createSupernova() {
                const x = Math.random() * width;
                const y = Math.random() * height;
                elements.push({ type: 'supernova', x, y, radius: 1, maxRadius: 200 + Math.random()*300, alpha: 1 });
                const msg = document.createElement('div');
                msg.style.color = "orange";
                msg.innerText = "!!! EVENTO: Supernova detectada.";
                log.prepend(msg);
            }
        }

        const AI = new AI_Architect();

        function draw() {
            // Fondo con rastro suave
            ctx.fillStyle = 'rgba(0, 5, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            elements.forEach((el, index) => {
                if (el.type === 'star') {
                    if(el.alpha < 1) el.alpha += 0.01;
                    ctx.fillStyle = `rgba(255, 255, 255, ${el.alpha})`;
                    ctx.beginPath();
                    ctx.arc(el.x, el.y, el.size, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (el.type === 'nebula') {
                    ctx.fillStyle = el.color;
                    ctx.beginPath();
                    ctx.arc(el.x, el.y, el.size, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (el.type === 'supernova') {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${el.alpha})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(el.x, el.y, el.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    el.radius += 5;
                    el.alpha -= 0.01;
                    if(el.alpha <= 0) elements.splice(index, 1);
                }
            });

            AI.think();
            requestAnimationFrame(draw);
        }

        function resetUniverse() {
            elements = [];
            log.innerHTML = "EL BIG BANG HA COMENZADO...";
        }

        draw();
    </script>
</body>
</html>
