<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V4 (FPS Reality)</title>
    <style>
        :root { --accent: #008cff; --bg: #00050a; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* --- VOLVIÓ EL CEREBRO --- */
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,10,20,0.85); padding: 15px; border-radius: 10px; border: 1px solid var(--accent); width: 260px; pointer-events: none; }
        #ai-log { height: 80px; overflow-y: auto; font-size: 0.7rem; margin-top: 5px; color: #aaa; }

        /* --- LUMINA HUMANOIDE (CON OJOS) --- */
        #lumina-humanoid {
            position: fixed; bottom: -300px; right: 50px; width: 100px; height: 180px; z-index: 1000;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 0 15px var(--ai-color)); opacity: 0;
        }
        #lumina-humanoid.visible { bottom: 40px; opacity: 1; }
        .head { width: 35px; height: 40px; background: var(--ai-color); border-radius: 50%; margin: 0 auto; border: 2px solid #fff; position: relative; }
        .head::before, .head::after { content: ''; position: absolute; top: 15px; width: 5px; height: 5px; background: #000; border-radius: 50%; }
        .head::before { left: 8px; } .head::after { right: 8px; }
        .torso { width: 50px; height: 70px; background: linear-gradient(var(--ai-color), transparent); border-radius: 10px 10px 50% 50%; margin: 5px auto; border-top: 2px solid #fff; }
        
        #ai-speech { position: absolute; top: -70px; right: -20px; background: #fff; color: #000; padding: 10px; border-radius: 15px; font-size: 0.8rem; width: 180px; display: none; font-weight: bold; box-shadow: 0 5px 20px var(--ai-color); }

        /* --- UI DE JUEGO --- */
        #game-hud { position: fixed; top: 20px; left: 20px; display: none; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid var(--ai-color); z-index: 1000; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(0,255,204,0.5); transform: translate(-50%, -50%); display: none; border-radius: 50%; z-index: 999; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: white; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div id="ai-status" style="color:var(--ai-color); font-weight:bold;">SISTEMA: ONLINE</div>
        <div id="ai-log">Iniciando redes neuronales...</div>
    </div>

    <div id="game-hud">
        <b id="world-name" style="color:var(--ai-color)">MUNDO GENERADO</b><br>
        <span style="font-size: 0.8rem;">MOVER: WASD | GIRAR: Flechas o A/D | ESC: Salir</span>
    </div>
    <div id="crosshair"></div>

    <div id="lumina-humanoid">
        <div id="ai-speech"></div>
        <div class="head"></div>
        <div class="torso"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        const luminaBody = document.getElementById('lumina-humanoid');
        const speech = document.getElementById('ai-speech');
        
        let width, height;
        let elements = [];
        let inGame = false;
        
        // --- MOTOR FPS ---
        let player = { x: 0, z: 0, yaw: 0 };
        let currentBuildings = [];
        let keys = {};

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        resize();

        function addLog(txt) {
            const d = document.createElement('div');
            d.innerText = "> " + txt;
            log.prepend(d);
        }

        class LuminaEngine {
            constructor() { this.isVisible = false; }
            update() {
                if (Math.random() < 0.008 && !this.isVisible && !inGame) this.appear();
                if (Math.random() < 0.02 && !inGame) this.createPortal();
            }
            appear() {
                this.isVisible = true;
                luminaBody.classList.add('visible');
                const frases = ["¿Listo para saltar a otro universo?", "He construido algo nuevo para ti.", "Santino, mis cálculos son perfectos."];
                this.react(frases[Math.floor(Math.random()*frases.length)]);
                setTimeout(() => { luminaBody.classList.remove('visible'); this.isVisible = false; }, 5000);
            }
            react(text) {
                speech.innerText = text; speech.style.display = 'block';
                addLog("Lumina: " + text);
            }
            createPortal() {
                if (elements.length > 4) return;
                elements.push({ 
                    x: Math.random() * (width - 100) + 50, 
                    y: Math.random() * (height - 100) + 50, 
                    size: 0, targetSize: 50, color: `hsl(${Math.random()*360}, 100%, 50%)` 
                });
            }
        }

        const AI = new LuminaEngine();

        canvas.addEventListener('mousedown', (e) => {
            elements.forEach((el, i) => {
                if (Math.hypot(el.x - e.clientX, el.y - e.clientY) < el.targetSize) {
                    enterWorld();
                    elements.splice(i, 1);
                }
            });
        });

        function enterWorld() {
            inGame = true;
            player = { x: 0, z: 200, yaw: 0 };
            currentBuildings = [];
            const colorBase = Math.random() * 360;
            
            document.getElementById('world-name').innerText = "UNIVERSO: #" + Math.floor(Math.random()*9999);
            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            
            // GENERACIÓN DE CONSTRUCCIONES (No se repiten)
            for(let i=0; i<30; i++) {
                currentBuildings.push({
                    x: (Math.random() - 0.5) * 2000,
                    z: (Math.random() - 0.5) * 2000,
                    w: 50 + Math.random() * 100,
                    h: 100 + Math.random() * 500,
                    color: `hsl(${colorBase + (Math.random()*40 - 20)}, 70%, 50%)`
                });
            }
            addLog("Entrando a realidad simulada...");
        }

        function updateFPS() {
            if (!inGame) return;
            const speed = 4;
            const rotSpeed = 0.04;
            
            if (keys['KeyW']) { player.x += Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
            if (keys['KeyS']) { player.x -= Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
            if (keys['KeyA'] || keys['ArrowLeft']) player.yaw -= rotSpeed;
            if (keys['KeyD'] || keys['ArrowRight']) player.yaw += rotSpeed;
            
            if (keys['Escape']) { 
                inGame = false; 
                document.getElementById('game-hud').style.display = 'none'; 
                document.getElementById('crosshair').style.display = 'none';
                addLog("Conexión finalizada.");
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            if (!inGame) {
                ctx.fillStyle = 'rgba(0, 5, 12, 0.8)';
                ctx.fillRect(0, 0, width, height);
                elements.forEach(el => {
                    ctx.shadowBlur = 15; ctx.shadowColor = el.color;
                    ctx.fillStyle = el.color; ctx.beginPath();
                    ctx.arc(el.x, el.y, el.size, 0, Math.PI*2); ctx.fill();
                    if(el.size < el.targetSize) el.size += 2;
                });
                ctx.shadowBlur = 0;
            } else {
                // --- RENDERIZADO PRIMERA PERSONA ---
                ctx.fillStyle = "#00050a"; ctx.fillRect(0, 0, width, height);
                
                // Horizonte/Cielo
                let grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, "#001122"); grad.addColorStop(0.5, "#000");
                ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height/2);

                // Suelo de rejilla (Infinito)
                ctx.strokeStyle = "#004466";
                ctx.lineWidth = 1;
                for(let i = -2000; i <= 2000; i += 100) {
                    // Aquí se simula la perspectiva del suelo simplificada
                }

                // Dibujar Construcciones con Perspectiva
                // Ordenar por distancia para que lo lejano no tape a lo cercano
                let sorted = currentBuildings.map(b => {
                    let dx = b.x - player.x;
                    let dz = b.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    return { ...b, rx, rz };
                }).filter(b => b.rz > 20).sort((a, b) => b.rz - a.rz);

                sorted.forEach(b => {
                    let fov = 600;
                    let scale = fov / b.rz;
                    let x2d = b.rx * scale + width / 2;
                    let y2d = height / 2;
                    let w2d = b.w * scale;
                    let h2d = b.h * scale;

                    // Dibujar Edificio (Caja)
                    ctx.fillStyle = b.color;
                    ctx.fillRect(x2d - w2d/2, y2d - h2d, w2d, h2d);
                    
                    // Brillo en los bordes
                    ctx.strokeStyle = "rgba(255,255,255,0.3)";
                    ctx.strokeRect(x2d - w2d/2, y2d - h2d, w2d, h2d);
                    
                    // Ventanas simuladas
                    ctx.fillStyle = "rgba(255,255,255,0.1)";
                    for(let j=0; j<3; j++) {
                        ctx.fillRect(x2d - w2d/4, y2d - h2d + (j*h2d/4) + 10, w2d/2, 5);
                    }
                });
            }

            updateFPS();
            AI.update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
