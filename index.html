<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V6.5 (ULTRA EDITION)</title>
    <style>
        :root { --accent: #008cff; --bg: #000205; --ai-color: #00ffcc; --blood: #ff0033; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,5,15,0.95); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); width: 280px; pointer-events: none; box-shadow: 0 0 25px rgba(0,140,255,0.4); }
        #ai-log { height: 110px; overflow-y: auto; font-size: 0.7rem; margin-top: 5px; color: #7af; scrollbar-width: none; line-height: 1.2; }
        .glitch { animation: glitch 1.2s infinite; }
        @keyframes glitch { 0% { opacity: 1; transform: skew(0deg); } 20% { opacity: 0.8; transform: skew(2deg); } 40% { opacity: 1; } 100% { opacity: 1; } }

        #game-hud { position: fixed; top: 20px; left: 20px; display: none; background: rgba(0,0,0,0.9); padding: 25px; border-left: 6px solid var(--ai-color); z-index: 1000; backdrop-filter: blur(10px); border-radius: 0 15px 15px 0; border-top: 1px solid #333; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 26px; height: 26px; transform: translate(-50%, -50%); display: none; z-index: 999; pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: var(--ai-color); box-shadow: 0 0 8px var(--ai-color); }
        #crosshair::before { top: 50%; left: 0; width: 100%; height: 2px; }
        #crosshair::after { left: 50%; top: 0; width: 2px; height: 100%; }

        #lumina-container { position: fixed; bottom: -350px; right: 50px; width: 140px; height: 220px; z-index: 1000; transition: 1.2s cubic-bezier(0.23, 1, 0.32, 1); filter: drop-shadow(0 0 30px var(--ai-color)); }
        #lumina-container.visible { bottom: 40px; }
        .ai-core { width: 50px; height: 50px; background: #fff; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 45px var(--ai-color); border: 2px solid white; position: relative; }
        .ai-ring { position: absolute; top: -15px; left: -15px; width: 76px; height: 76px; border: 3px solid var(--ai-color); border-radius: 50%; animation: spin 4s linear infinite; border-right-color: transparent; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #inventory-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 1000; }
        .slot { width: 50px; height: 50px; background: rgba(0,10,20,0.8); border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #666; transition: 0.3s; }
        .slot.active { border-color: var(--ai-color); box-shadow: 0 0 15px var(--ai-color); color: white; transform: translateY(-5px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2000; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; }
        
        #menu-hint { position: fixed; width: 100%; text-align: center; top: 70%; font-size: 1.2rem; text-shadow: 0 0 10px white; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div id="ai-status" class="glitch" style="color:var(--ai-color); font-weight:bold;">GENESIS ENGINE V6.5_STABLE</div>
        <div id="ai-log">Iniciando protocolos de Santino Ruiz...</div>
    </div>

    <div id="game-hud">
        <b id="world-name" style="color:var(--ai-color); font-size: 1.3rem;">DATA_LINK: OK</b><br>
        <div style="margin-top: 10px;">
            <div style="width: 180px; height: 10px; background: #111; border: 1px solid #444; position: relative;">
                <div id="hp-bar" style="width: 100%; height: 100%; background: var(--ai-color); box-shadow: 0 0 10px var(--ai-color); transition: 0.5s;"></div>
            </div>
            <span id="biome-label" style="font-size:0.6rem; color: #888; display: block; margin-top: 5px; letter-spacing: 2px;">STATUS: OPERATIONAL</span>
        </div>
    </div>

    <div id="inventory-bar">
        <div class="slot active">FIST</div>
        <div class="slot">SCAN</div>
        <div class="slot">BLADE</div>
    </div>

    <div id="crosshair"></div>
    <div id="menu-hint">PULSA [ESPACIO] PARA CREAR MUNDOS</div>

    <div id="lumina-container">
        <div style="position: absolute; top: -90px; right: -30px; background: white; color: black; padding: 15px; border-radius: 12px; font-size: 0.8rem; width: 220px; font-weight: bold; border-left: 5px solid var(--ai-color);" id="ai-msg"></div>
        <div class="ai-core"></div>
        <div class="ai-ring"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        
        let width, height, inGame = false, frames = 0;
        let selectedSlot = 0;
        let portals = [];

        let player = {
            x: 0, z: 0, yaw: 0,
            vX: 0, vZ: 0,
            bob: 0, health: 100,
            isAttacking: false, atkFrame: 0
        };

        let currentWorld = {
            entities: [],
            weather: [],
            colors: { bg: '#000', accent: '#00ffcc', fog: '#000' }
        };

        const keys = {};

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `<span style="color:var(--ai-color)">[SYSTEM]</span> ${msg}`;
            log.prepend(div);
            if(log.childNodes.length > 15) log.lastChild.remove();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Space' && !inGame) spawnPortals();
            if(e.key >= 1 && e.key <= 3) {
                selectedSlot = parseInt(e.key) - 1;
                updateSlots();
            }
        });

        window.addEventListener('keyup', e => keys[e.code] = false);
        
        window.addEventListener('mousedown', () => { 
            if(inGame) { 
                player.isAttacking = true; 
                player.atkFrame = 0; 
            } else {
                checkPortalClick();
            }
        });

        resize();

        function updateSlots() {
            const slots = document.querySelectorAll('.slot');
            slots.forEach((s, i) => s.className = i === selectedSlot ? 'slot active' : 'slot');
        }

        function spawnPortals() {
            portals = [
                { x: -300, z: 800, type: 'ESTELAR', color: '#00ffcc', label: 'MUNDO ESTELAR' },
                { x: 300, z: 800, type: 'TÉTRICO', color: '#ff0033', label: 'MUNDO TÉTRICO' }
            ];
            document.getElementById('menu-hint').style.display = 'none';
            addLog("Portales de realidad generados.");
        }

        function checkPortalClick() {
            portals.forEach(p => {
                let dx = p.x - player.x, dz = p.z - player.z;
                let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                if(rz > 0 && rz < 1000) {
                    initWorld(p.type);
                }
            });
        }

        class Entity {
            constructor(x, z, type) {
                this.x = x; this.z = z; this.type = type;
                this.timer = Math.random() * 10;
                this.config = {
                    bodyW: 20 + Math.random() * 80,
                    bodyH: 15 + Math.random() * 100,
                    eyeCount: Math.floor(Math.random() * 6) + 1,
                    eyeSize: 2 + Math.random() * 8,
                    legSpeed: 3 + Math.random() * 12,
                    hue: Math.random() * 360
                };
            }

            update() {
                this.timer += 0.03;
                if(this.type === 'creature') {
                    this.x += Math.sin(this.timer * 0.4) * 3;
                    this.z += Math.cos(this.timer * 0.2) * 3;
                }
            }

            draw(scale, x2d, y2d) {
                let s = scale;
                let bounce = Math.abs(Math.sin(this.timer * 2)) * 15 * s;

                if(this.type === 'creature') {
                    ctx.save();
                    ctx.fillStyle = currentWorld.accent === '#ff0033' ? '#200' : `hsl(${this.config.hue}, 80%, 40%)`;
                    ctx.shadowBlur = 20 * s;
                    ctx.shadowColor = currentWorld.accent;
                    
                    // Cuerpo
                    ctx.fillRect(x2d - (this.config.bodyW*s)/2, y2d - this.config.bodyH*s - bounce, this.config.bodyW*s, this.config.bodyH*s);

                    // Piernas deformes
                    ctx.strokeStyle = ctx.fillStyle;
                    ctx.lineWidth = 5 * s;
                    for(let i=0; i<4; i++) {
                        let lx = x2d + (i < 2 ? -this.config.bodyW/3 : this.config.bodyW/3) * s;
                        let legMov = Math.sin(this.timer * this.config.legSpeed + i) * 20 * s;
                        ctx.beginPath();
                        ctx.moveTo(lx, y2d - 5*s - bounce);
                        ctx.lineTo(lx + legMov, y2d - bounce/3);
                        ctx.stroke();
                    }

                    // OJOS (Mejorados Santino)
                    ctx.fillStyle = currentWorld.accent === '#ff0033' ? "#ff0000" : "#fff";
                    for(let i=0; i < this.config.eyeCount; i++) {
                        let ex = x2d - (this.config.bodyW/4 * s) + (i * (this.config.bodyW/this.config.eyeCount) * s);
                        let ey = y2d - this.config.bodyH*s - bounce + (10*s) + (Math.sin(i)*10*s);
                        ctx.beginPath();
                        ctx.arc(ex, ey, this.config.eyeSize * s, 0, Math.PI*2);
                        ctx.fill();
                        if(currentWorld.accent === '#ff0033') {
                            ctx.shadowBlur = 15 * s;
                            ctx.shadowColor = "red";
                        }
                    }
                    ctx.restore();
                } else {
                    ctx.fillStyle = `rgba(5, 5, 10, 0.95)`;
                    let w = 200 * s, h = 800 * s;
                    ctx.fillRect(x2d - w/2, y2d - h, w, h);
                    ctx.strokeStyle = currentWorld.accent;
                    ctx.strokeRect(x2d - w/2, y2d - h, w, h);
                }
            }
        }

        function drawHands() {
            const time = Date.now() * 0.005;
            player.bob += Math.hypot(player.vX, player.vZ) * 0.12;
            let swayX = Math.cos(player.bob * 0.5) * 15;
            let swayY = Math.sin(player.bob) * 10;
            let atkOffset = Math.sin(player.atkFrame) * 80;
            ctx.save();
            drawArm(width * 0.25 + swayX, height + 50 - swayY, true, time, 0);
            drawArm(width * 0.75 + swayX, height + 50 - swayY - atkOffset, false, time, atkOffset);
            if(player.isAttacking) {
                player.atkFrame += 0.25;
                if(player.atkFrame > Math.PI) { player.atkFrame = 0; player.isAttacking = false; }
            }
            ctx.restore();
        }

        function drawArm(x, y, isLeft, t, atk) {
            let s = isLeft ? 1 : -1;
            ctx.fillStyle = "#0a0a0c";
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - 100*s, y - 500);
            ctx.lineTo(x + 150*s, y - 500);
            ctx.lineTo(x + 60*s, y);
            ctx.fill();
            ctx.strokeStyle = currentWorld.accent;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Guante
            ctx.fillStyle = "#111";
            ctx.fillRect(x + (isLeft ? -70 : -80), y - 520, 150, 120);
            
            if(!isLeft && selectedSlot === 2) {
                ctx.fillStyle = currentWorld.accent;
                ctx.shadowBlur = 40;
                ctx.fillRect(x - 10*s, y - 850, 20, 400);
            }
        }

        function initWorld(mode) {
            inGame = true;
            portals = [];
            currentWorld.entities = [];
            currentWorld.weather = [];
            
            if(mode === 'TÉTRICO') {
                currentWorld.colors = { bg: '#050000', accent: '#ff0033', fog: '#0a0000' };
                for(let i=0; i<200; i++) currentWorld.weather.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*10+5});
            } else {
                currentWorld.colors = { bg: '#00050a', accent: '#00ffcc', fog: '#000205' };
            }

            for(let i=0; i<80; i++) {
                let type = Math.random() > 0.6 ? 'creature' : 'structure';
                let dist = 800 + Math.random() * 6000;
                let ang = Math.random() * Math.PI * 2;
                currentWorld.entities.push(new Entity(Math.cos(ang)*dist, Math.sin(ang)*dist, type));
            }

            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('world-name').innerText = "REALITY_PHASE: " + mode;
            addLog("Inmersión completa en: " + mode);
        }

        function draw() {
            ctx.fillStyle = currentWorld.colors.bg;
            ctx.fillRect(0,0,width,height);

            if(inGame) {
                // Movimiento
                let moveSpeed = keys['ShiftLeft'] ? 25 : 12;
                if(keys['KeyW']) { player.x += Math.sin(player.yaw) * moveSpeed; player.z -= Math.cos(player.yaw) * moveSpeed; }
                if(keys['KeyS']) { player.x -= Math.sin(player.yaw) * moveSpeed; player.z += Math.cos(player.yaw) * moveSpeed; }
                if(keys['KeyA']) player.yaw -= 0.05;
                if(keys['KeyD']) player.yaw += 0.05;

                let renderList = currentWorld.entities.map(e => {
                    let dx = e.x - player.x, dz = e.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    return { e, rx, rz };
                }).filter(r => r.rz > 50).sort((a,b) => b.rz - a.rz);

                renderList.forEach(r => {
                    let scale = 1200 / r.rz;
                    r.e.draw(scale, r.rx * scale + width/2, height/2 + (150 * scale));
                });

                // Clima tétrico mejorado
                if(currentWorld.accent === '#ff0033') {
                    ctx.fillStyle = "rgba(255, 0, 0, 0.05)";
                    currentWorld.weather.forEach(p => {
                        ctx.fillRect(p.x, p.y, 1, p.s * 5);
                        p.y += p.s;
                        if(p.y > height) p.y = -50;
                    });
                }

                drawHands();
            } else {
                // ESPACIO DE SELECCIÓN
                portals.forEach(p => {
                    let dx = p.x - player.x, dz = p.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    if(rz > 50) {
                        let scale = 1000 / rz;
                        let x2d = rx * scale + width/2;
                        let y2d = height/2;
                        ctx.fillStyle = p.color;
                        ctx.shadowBlur = 50 * scale;
                        ctx.shadowColor = p.color;
                        ctx.beginPath();
                        ctx.ellipse(x2d, y2d, 100*scale, 200*scale, 0, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = "white";
                        ctx.font = `${20*scale}px Arial`;
                        ctx.fillText(p.label, x2d, y2d + 250*scale);
                    }
                });
                
                if(keys['KeyA']) player.yaw -= 0.03;
                if(keys['KeyD']) player.yaw += 0.03;
            }

            frames++;
            requestAnimationFrame(draw);
        }

        setTimeout(() => {
            const container = document.getElementById('lumina-container');
            container.classList.add('visible');
            document.getElementById('ai-msg').innerText = "¡SANTINO! He mutado a las criaturas y habilitado los portales interdimensionales. Pulsa ESPACIO para empezar.";
            setTimeout(() => container.classList.remove('visible'), 6000);
        }, 1500);

        draw();
    </script>
</body>
</html>
