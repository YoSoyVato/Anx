<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Social 2.5D - Estilo Billboarding</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0c1017; }
        canvas { display: block; }
        #interface {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            background: rgba(12, 16, 23, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #4a90e2;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="interface">
        <strong style="color: #4a90e2;">MUNDO SOCIAL 2.5D</strong><br><br>
        • Controles: W, A, S, D<br>
        • Avatar: Sprite 2D Humanoide<br>
        • Motor: Físicas de Relieve Activas
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. CONFIGURACIÓN DEL UNIVERSO 3D
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x8ecae6); 
        scene.fog = new THREE.FogExp2(0x8ecae6, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 2. ILUMINACIÓN AVANZADA
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfffcee, 1.0);
        sunLight.position.set(40, 80, 30);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);

        // 3. GENERACIÓN INTEGRAL DEL TERRENO POR CÓDIGO
        const tamañoMundo = 160;
        const segmentos = 80;
        const terrainGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo, segmentos, segmentos);
        
        function obtenerAlturaTerreno(x, z) {
            // Ecuación base para colinas y valles orgánicos
            let y = Math.sin(x * 0.04) * Math.cos(z * 0.04) * 5;
            y += Math.sin(x * 0.15) * 0.7; // Textura del pasto
            
            // Barrera matemática: Crea montañas épicas en los bordes del mapa
            const distDesdeCentro = Math.sqrt(x*x + z*z);
            if (distDesdeCentro > 50) {
                const factorMontaña = Math.pow((distDesdeCentro - 50) * 0.15, 2);
                y += factorMontaña * (Math.sin(x * 0.1) * 2 + 3);
            }
            
            if (y < -3) y = -3 + (y + 3) * 0.15; // Suavizado de cuencas de lagos
            return y;
        }

        const pos = terrainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            pos.setZ(i, obtenerAlturaTerreno(x, y));
        }
        terrainGeo.computeVertexNormals();
        terrainGeo.rotateX(-Math.PI / 2);

        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x4f772d, 
            roughness: 0.9,
            flatShading: true 
        });
        const terreno = new THREE.Mesh(terrainGeo, terrainMat);
        terreno.receiveShadow = true;
        scene.add(terreno);

        // 4. LAGO DINÁMICO
        const waterGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo);
        const waterMat = new THREE.MeshStandardMaterial({ 
            color: 0x0077b6, 
            transparent: true, 
            opacity: 0.75,
            roughness: 0.1
        });
        const lago = new THREE.Mesh(waterGeo, waterMat);
        lago.rotation.x = -Math.PI / 2;
        lago.position.y = -2.2;
        scene.add(lago);

        // 5. SISTEMA DE VEGETACIÓN AUTOMÁTICA
        const crearArbol = (x, z, alturaSuelo) => {
            const arbol = new THREE.Group();
            const tronco = new THREE.Mesh(
                new THREE.CylinderGeometry(0.15, 0.3, 2.5, 4), 
                new THREE.MeshStandardMaterial({ color: 0x5c415d, flatShading: true })
            );
            tronco.position.y = 1.25;
            tronco.castShadow = true;
            arbol.add(tronco);

            const copa = new THREE.Mesh(
                new THREE.ConeGeometry(1.4, 3.5, 5), 
                new THREE.MeshStandardMaterial({ color: 0x31572c, flatShading: true })
            );
            copa.position.y = 3.5;
            copa.castShadow = true;
            arbol.add(copa);

            arbol.position.set(x, alturaSuelo, z);
            scene.add(arbol);
        };

        for (let i = 0; i < 120; i++) {
            const x = (Math.random() - 0.5) * 90;
            const z = (Math.random() - 0.5) * 90;
            const altura = obtenerAlturaTerreno(x, z);
            if (altura > -1.8) crearArbol(x, z, altura);
        }

        // 6. CREACIÓN DEL TEXTURE CANVAS EN 2D PARA EL JUGADOR (Pixel-Art por Código)
        function generarTexturaPixelArt() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            // Desactivar suavizado para preservar el pixel-art puro
            ctx.imageSmoothingEnabled = false;

            // Cabeza (Color de piel basado en tu modelo)
            ctx.fillStyle = '#f3c6a5';
            ctx.fillRect(16, 16, 32, 32);
            ctx.strokeStyle = '#2b1e17';
            ctx.lineWidth = 2;
            ctx.strokeRect(16, 16, 32, 32);

            // Ojos
            ctx.fillStyle = '#2b1e17';
            ctx.fillRect(26, 28, 4, 6);
            ctx.fillRect(38, 28, 4, 6);
            
            // Boca 
            ctx.fillRect(30, 40, 6, 2);

            // Camiseta Verde (Outfit solicitado)
            ctx.fillStyle = '#4cc9f0'; // Ropita: Camiseta Turquesa/Verde brillante
            ctx.fillRect(12, 48, 40, 40);
            ctx.strokeRect(12, 48, 40, 40);

            // Shorts Azules
            ctx.fillStyle = '#4895ef';
            ctx.fillRect(16, 88, 32, 16);
            ctx.strokeRect(16, 88, 32, 16);

            // Piernas/Pies
            ctx.fillStyle = '#f3c6a5';
            ctx.fillRect(20, 104, 8, 16);
            ctx.fillRect(36, 104, 8, 16);
            ctx.fillStyle = '#f72585'; // Zapatos llamativos
            ctx.fillRect(18, 116, 10, 6);
            ctx.fillRect(36, 116, 10, 6);

            return new THREE.CanvasTexture(canvas);
        }

        // Aplicamos la textura al Sprite 2D
        const texturaJugador = generarTexturaPixelArt();
        texturaJugador.magFilter = THREE.NearestFilter; // Multiplica los pixeles sin borrosidad
        texturaJugador.minFilter = THREE.NearestFilter;

        const spriteMat = new THREE.SpriteMaterial({ map: texturaJugador, transparent: true });
        const jugadorSprite = new THREE.Sprite(spriteMat);
        
        // Ajustamos la escala para mantener la proporción geométrica de tu dibujo original
        jugadorSprite.scale.set(2, 4, 1); 

        // Creamos un contenedor 3D vacío para controlar la lógica posicional del Jugador
        const jugadorNode = new THREE.Group();
        jugadorNode.position.set(0, 5, 0);
        jugadorNode.add(jugadorSprite);
        scene.add(jugadorNode);

        // Control de periféricos
        const teclas = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false; });

        // Parámetros Físicos y de Animación
        const velocidad = 0.25;
        let tiempoContador = 0;
        let estaCaminando = false;

        // 7. BUCLE DE RENDERIZADO, ANIMACIÓN 2D Y SEGUIMIENTO DE CÁMARA
        function animate() {
            requestAnimationFrame(animate);
            tiempoContador += 0.08; // Controlador de velocidad del ciclo de animación

            let movX = 0;
            let movZ = 0;
            estaCaminando = false;

            if (teclas.w) { movZ -= 1; estaCaminando = true; }
            if (teclas.s) { movZ += 1; estaCaminando = true; }
            if (teclas.a) { movX -= 1; estaCaminando = true; }
            if (teclas.d) { movX += 1; estaCaminando = true; }

            // Procesamiento del vector de movimiento
            if (estaCaminando) {
                jugadorNode.position.x += movX * velocidad;
                jugadorNode.position.z += movZ * velocidad;

                // Voltear horizontalmente el Sprite 2D según la dirección izquierda/derecha
                if (movX < 0) jugadorSprite.scale.x = -2; // Espejo a la izquierda
                if (movX > 0) jugadorSprite.scale.x = 2;  // Normal a la derecha
            }

            // Fijación gravitacional al relieve matemático del pasto
            const alturaSuelo = obtenerAlturaTerreno(jugadorNode.position.x, jugadorNode.position.z);
            const nivelFijo = Math.max(alturaSuelo, -2.2);
            jugadorNode.position.y = nivelFijo + 2.0; // Desfase vertical por el pivote céntrico del Sprite

            // --- MOTOR DE ANIMACIONES 2D EN TIEMPO REAL ---
            if (estaCaminando) {
                // Animación de Caminar (Walk): Oscilación vertical y balanceo rotacional rítmico
                jugadorSprite.position.y = Math.abs(Math.sin(tiempoContador * 1.5)) * 0.15;
                jugadorSprite.rotation.z = Math.sin(tiempoContador * 1.5) * 0.08;
            } else {
                // Animación de Respiración (Idle): Expansión y contracción suave cuando está quieto
                jugadorSprite.position.y = 0;
                jugadorSprite.rotation.z = 0;
                jugadorSprite.scale.y = 4.0 + Math.sin(tiempoContador * 0.4) * 0.08;
            }

            // Efecto cosmético: Simulación de movimiento sutil en el lago
            lago.position.y = -2.2 + Math.sin(tiempoContador * 0.1) * 0.03;

            // CAMARA ELÁSTICA EN TERCERA PERSONA 
            const offsetCamaraX = jugadorNode.position.x;
            const offsetCamaraY = jugadorNode.position.y + 6;
            const offsetCamaraZ = jugadorNode.position.z + 11; // Distancia para apreciar el efecto 2.5D

            camera.position.x += (offsetCamaraX - camera.position.x) * 0.06;
            camera.position.y += (offsetCamaraY - camera.position.y) * 0.06;
            camera.position.z += (offsetCamaraZ - camera.position.z) * 0.06;
            camera.lookAt(jugadorNode.position.x, jugadorNode.position.y, jugadorNode.position.z);

            renderer.render(scene, camera);
        }

        animate();

        // Escalabilidad del Canvas
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
