<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo 3D - Tercera Persona</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
        #instrucciones {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="instrucciones">
        <strong>Controles:</strong> W, A, S, D para mover al Jugador Rojo.<br>
        Cámara automática en 3ra Persona.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. CONFIGURACIÓN DEL ESCENARIO
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0c4ff); // Cielo azul claro
        scene.fog = new THREE.FogExp2(0xa0c4ff, 0.015); // Niebla para dar profundidad

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Habilitar sombras
        document.body.appendChild(renderer.domElement);

        // 2. LUCES DEL MUNDO
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfffaed, 0.8);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // 3. GENERACIÓN DEL TERRENO (Montañas y Relieves por matemáticas)
        const tamañoMundo = 120;
        const segmentos = 60;
        const terrainGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo, segmentos, segmentos);
        
        // Modificamos la altura (Z) de cada vértice usando funciones matemáticas (Seno y Coseno)
        const pos = terrainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            
            // Ecuación matemática para simular montañas grandes y colinas pequeñas
            let z = Math.sin(x * 0.05) * Math.cos(y * 0.05) * 4; // Montañas
            z += Math.sin(x * 0.2) * 0.8; // Relieve pequeño
            
            // Si el terreno es muy bajo, lo aplanamos un poco para los valles
            if (z < -2) z = -2 + (z + 2) * 0.2;

            pos.setZ(i, z);
        }
        terrainGeo.computeVertexNormals(); // Re-calcular cómo le afecta la luz al relieve

        // Rotamos y acostamos el terreno para que actúe como suelo (X, Z)
        terrainGeo.rotateX(-Math.PI / 2);

        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x557a46, // Verde Césped
            roughness: 0.8,
            flatShading: true // Estilo Low-Poly/Poligonal geométrico
        });
        const terreno = new THREE.Mesh(terrainGeo, terrainMat);
        terreno.receiveShadow = true;
        scene.add(terreno);

        // 4. EL LAGO (Agua a nivel plano estático)
        const waterGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo);
        const waterMat = new THREE.MeshStandardMaterial({ 
            color: 0x3d5a80, 
            transparent: true, 
            opacity: 0.8,
            roughness: 0.2 
        });
        const lago = new THREE.Mesh(waterGeo, waterMat);
        lago.rotation.x = -Math.PI / 2;
        lago.position.y = -1.5; // El agua corta las montañas que estén por debajo de esta altura
        scene.add(lago);

        // 5. VEGETACIÓN (Generación aleatoria de Árboles)
        const crearArbol = (x, z, alturaSuelo) => {
            const arbol = new THREE.Group();
            
            // Tronco
            const troncoGeo = new THREE.CylinderGeometry(0.2, 0.4, 2, 5);
            const troncoMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
            const tronco = new THREE.Mesh(troncoGeo, troncoMat);
            tronco.position.y = 1;
            tronco.castShadow = true;
            arbol.add(tronco);

            // Hojas (Cono geométrico)
            const hojasGeo = new THREE.ConeGeometry(1.2, 3, 5);
            const hojasMat = new THREE.MeshStandardMaterial({ color: 0x3f5e3d, flatShading: true });
            const hojas = new THREE.Mesh(hojasGeo, hojasMat);
            hojas.position.y = 3;
            hojas.castShadow = true;
            arbol.add(hojas);

            arbol.position.set(x, alturaSuelo, z);
            scene.add(arbol);
        };

        // Función auxiliar matemática para obtener la altura del relieve en cualquier punto
        function obtenerAlturaTerreno(x, z) {
            let y = Math.sin(x * 0.05) * Math.cos(z * 0.05) * 4;
            y += Math.sin(x * 0.2) * 0.8;
            if (y < -2) y = -2 + (y + 2) * 0.2;
            return y;
        }

        // Plantar 80 árboles de forma aleatoria donde no haya agua profunda
        for (let i = 0; i < 80; i++) {
            const x = (Math.random() - 0.5) * (tamañoMundo - 20);
            const z = (Math.random() - 0.5) * (tamañoMundo - 20);
            const altura = obtenerAlturaTerreno(x, z);
            
            if (altura > -1.2) { // Evitar plantar árboles adentro del lago
                crearArbol(x, z, altura);
            }
        }

        // 6. EL JUGADOR
        const jugadorGeo = new THREE.BoxGeometry(1, 2, 1);
        const jugadorMat = new THREE.MeshStandardMaterial({ color: 0xe63946 }); // Personaje Rojo
        const jugador = new THREE.Mesh(jugadorGeo, jugadorMat);
        jugador.castShadow = true;
        
        // Posición inicial del jugador
        jugador.position.set(0, 5, 0);
        scene.add(jugador);

        // Controles de teclado
        const teclas = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false; });

        // Variables de movimiento
        const velocidad = 0.2;
        let anguloJugador = 0;

        // 7. BUCLE DE ANIMACIÓN Y CÁMARA EN TERCERA PERSONA
        function animate() {
            requestAnimationFrame(animate);

            // Control de movimiento del jugador
            let movX = 0;
            let movZ = 0;

            if (teclas.w) movZ -= 1;
            if (teclas.s) movZ += 1;
            if (teclas.a) movX -= 1;
            if (teclas.d) movX += 1;

            if (movX !== 0 || movZ !== 0) {
                // Calcular dirección
                const direccionX = movX;
                const direccionZ = movZ;
                
                // Mover jugador
                jugador.position.x += direccionX * velocidad;
                jugador.position.z += direccionZ * velocidad;

                // Hacer que el bloque rote hacia donde camina
                anguloJugador = Math.atan2(direccionX, direccionZ);
                jugador.rotation.y = anguloJugador;
            }

            // Adaptar la altura del jugador al relieve del terreno actual (Físicas del suelo)
            const alturaSueloActual = obtenerAlturaTerreno(jugador.position.x, jugador.position.z);
            
            // Si está sobre tierra se queda en la superficie, si está en el lago se hunde a nivel del agua
            const alturaMinima = Math.max(alturaSueloActual, -1.5);
            jugador.position.y = alturaMinima + 1; // El "+1" es porque el origen del cubo está en su centro

            // LÓGICA DE LA CÁMARA EN TERCERA PERSONA (Cálculo matemático de persecución)
            // La cámara se posiciona detrás del jugador (en el eje Z) y arriba (en el eje Y)
            const distanciaDetras = 8;
            const distanciaArriba = 5;

            const objetivoCamaraX = jugador.position.x;
            const objetivoCamaraY = jugador.position.y + distanciaArriba;
            const objetivoCamaraZ = jugador.position.z + distanciaDetras;

            // Interpolación lineal (Lerp) para que el movimiento de la cámara sea suave y fluido
            camera.position.x += (objetivoCamaraX - camera.position.x) * 0.05;
            camera.position.y += (objetivoCamaraY - camera.position.y) * 0.05;
            camera.position.z += (objetivoCamaraZ - camera.position.z) * 0.05;

            // Hacer que la cámara siempre mire directamente al centro del jugador
            camera.lookAt(jugador.position.x, jugador.position.y, jugador.position.z);

            renderer.render(scene, camera);
        }

        animate();

        // Ajuste de pantalla
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
