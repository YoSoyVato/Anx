<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V11 (MULTIVERSE RESET)</title>
    <style>
        :root { --accent: #008cff; --bg: #000103; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,5,15,0.9); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); width: 280px; pointer-events: none; }
        #ai-log { height: 90px; overflow-y: auto; font-size: 0.7rem; margin-top: 5px; color: #7af; scrollbar-width: none; }

        #lumina-container { position: fixed; bottom: 40px; right: 50px; width: 140px; height: 220px; z-index: 1000; opacity: 0; transition: 1s; }
        #lumina-container.visible { opacity: 1; }
        .ai-core { width: 40px; height: 40px; background: #fff; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 30px var(--ai-color); }
        
        #reset-msg { position: fixed; top: 20px; width: 100%; text-align: center; color: var(--ai-color); font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="reset-msg">PULSA [ESC] PARA QUE LA IA REGENERE EL MULTIVERSO</div>
    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div style="color:var(--ai-color); font-weight:bold;">GENESIS_V11_CORE</div>
        <div id="ai-log">Conectando con el tejido de la realidad...</div>
    </div>

    <div id="lumina-container">
        <div style="position: absolute; top: -80px; right: -20px; background: white; color: black; padding: 12px; border-radius: 10px; font-size: 0.75rem; width: 200px; font-weight: bold;" id="ai-msg"></div>
        <div class="ai-core"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        
        let width, height, frames = 0;
        let player = { x: 0, z: 1000, yaw: 0, targetYaw: 0, isMoving: false };
        let world = { entities: [], animals: [], time: 0, theme: {}, dayIntensity: 0 };
        let lumina = { x: 0, z: 0, active: false, scale: 0, lastTalk: 0 };
        const keys = {};

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `> ${msg}`;
            log.prepend(div);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Escape') generateNewWorld(); // REINICIO DE MUNDO
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        class LuminaEntity {
            draw(scale, x2d, y2d) {
                if(!lumina.active) return;
                let float = Math.sin(frames * 0.15) * 15 * scale;
                if(lumina.scale < 1) lumina.scale += 0.05;
                ctx.save();
                ctx.translate(x2d, y2d - 120*scale + float);
                ctx.scale(lumina.scale, lumina.scale);
                ctx.fillStyle = "#fff";
                ctx.shadowBlur = 30 * scale; ctx.shadowColor = world.theme.accent;
                ctx.beginPath(); ctx.arc(0, 0, 30*scale, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#000";
                let blink = Math.random() > 0.98 ? 0.1 : 1;
                ctx.fillRect(-15*scale, -10*scale, 8*scale, 15*scale * blink);
                ctx.fillRect(7*scale, -10*scale, 8*scale, 15*scale * blink);
                ctx.restore();
            }
        }

        class Structure {
            constructor(x, z, color) {
                this.x = x; this.z = z;
                this.h = 200 + Math.random() * 1200;
                this.w = 50 + Math.random() * 100;
                this.color = color || `hsl(${Math.random()*360}, 70%, 50%)`;
            }
            draw(scale, x2d, y2d, brightness) {
                ctx.globalAlpha = brightness;
                ctx.strokeStyle = this.color; ctx.lineWidth = 2 * scale;
                ctx.strokeRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.fillStyle = this.color; ctx.globalAlpha = 0.05 * brightness;
                ctx.fillRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.globalAlpha = 1;
            }
        }

        class Animal {
            constructor(x, z) {
                this.x = x; this.z = z;
                this.angle = Math.random() * Math.PI * 2;
                this.size = 20 + Math.random() * 20;
                this.legCycle = 0;
            }
            update() {
                this.x += Math.cos(this.angle) * 3;
                this.z += Math.sin(this.angle) * 3;
                this.legCycle += 0.2;
                if(Math.random() > 0.98) this.angle = Math.random() * Math.PI * 2;
            }
            draw(scale, x2d, y2d) {
                let s = this.size * scale;
                let walk = Math.sin(this.legCycle) * 10 * scale;
                ctx.fillStyle = world.theme.accent;
                // Cuerpo
                ctx.fillRect(x2d - s/2, y2d - s, s, s/1.5);
                // Patas
                ctx.lineWidth = 2 * scale;
                ctx.strokeStyle = "white";
                ctx.beginPath();
                ctx.moveTo(x2d - s/3, y2d - s/3); ctx.lineTo(x2d - s/3 - walk, y2d);
                ctx.moveTo(x2d + s/3, y2d - s/3); ctx.lineTo(x2d + s/3 + walk, y2d);
                ctx.stroke();
                // Ojo
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(x2d + s/4, y2d - s + s/4, 4*scale, 0, Math.PI*2); ctx.fill();
            }
        }

        function generateNewWorld() {
            addLog("REINICIANDO MATRIZ...");
            world.entities = [];
            world.animals = [];
            player.x = 0; player.z = 1000;
            
            // Lógica de "50 mundos" (Temas aleatorios)
            const hue = Math.random() * 360;
            world.theme = {
                bg: `hsl(${hue}, 40%, 5%)`,
                accent: `hsl(${hue}, 100%, 50%)`,
                scary: Math.random() > 0.7,
                name: ["Sector Delta", "Zona Glitch", "Vacío de Santino", "Núcleo Genesis", "Plano 0"][Math.floor(Math.random()*5)] + " " + Math.floor(Math.random()*99)
            };

            for(let i=0; i<100; i++) {
                let a = Math.random()*Math.PI*2, d = 1000 + Math.random()*10000;
                world.entities.push(new Structure(Math.cos(a)*d, Math.sin(a)*d, world.theme.accent));
                if(i < 15) world.animals.push(new Animal(Math.cos(a)*d, Math.sin(a)*d));
            }
            
            document.getElementById('ai-msg').innerText = "Nuevo mundo creado: " + world.theme.name;
            document.getElementById('lumina-container').classList.add('visible');
            setTimeout(() => document.getElementById('lumina-container').classList.remove('visible'), 3000);
        }

        function draw() {
            world.time = (frames % 3000) / 3000;
            world.dayIntensity = Math.sin(world.time * Math.PI);
            
            ctx.fillStyle = world.theme.bg || "#000";
            ctx.fillRect(0,0,width,height);

            // MOVIMIENTO
            player.isMoving = keys['KeyW'] || keys['KeyS'];
            let speed = 40;
            if(keys['KeyW']) { player.x += Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
            if(keys['KeyS']) { player.x -= Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
            if(keys['KeyA']) player.targetYaw -= 0.05;
            if(keys['KeyD']) player.targetYaw += 0.05;
            player.yaw += (player.targetYaw - player.yaw) * 0.1;

            lumina.x = player.x + Math.sin(player.yaw) * 500;
            lumina.z = player.z - Math.cos(player.yaw) * 500;

            let luminaEntity = new LuminaEntity();
            let objs = [...world.entities, ...world.animals, luminaEntity].sort((a,b) => {
                let d1 = (a === luminaEntity) ? 500 : Math.hypot(a.x-player.x, a.z-player.z);
                let d2 = (b === luminaEntity) ? 500 : Math.hypot(b.x-player.x, b.z-player.z);
                return d2 - d1;
            });

            objs.forEach(e => {
                if(e.update) e.update();
                let ex = (e === luminaEntity) ? lumina.x : e.x;
                let ez = (e === luminaEntity) ? lumina.z : e.z;
                let dx = ex - player.x, dz = ez - player.z;
                let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                if(rz > 50) {
                    let s = 900 / rz;
                    e.draw(s, rx * s + width/2, height/2 + 250*s, world.dayIntensity + 0.3);
                }
            });

            // BRAZOS (HUD)
            let bob = Math.sin(frames * 0.15) * (player.isMoving ? 15 : 5);
            ctx.fillStyle = "#111"; ctx.strokeStyle = world.theme.accent;
            ctx.strokeRect(width*0.1, height-150+bob, 150, 300);
            ctx.strokeRect(width*0.9-150, height-150+bob, 150, 300);

            frames++;
            requestAnimationFrame(draw);
        }

        resize();
        generateNewWorld();
        draw();
    </script>
</body>
</html>
