<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Network</title>
    <style>
        :root {
            --accent: #008cff;
            --accent-glow: rgba(0, 140, 255, 0.4);
            --bg: #020202;
            --glass: rgba(10, 10, 10, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* SELECTOR INICIAL */
        #device-selector {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
        }

        #main-app { 
            display: none; width: 100%; height: 100%; 
            position: relative; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* RESPONSIVE */
        .mode-pc .container { max-width: 1200px; margin: 0 auto; }
        .mode-mobile .container { max-width: 450px; padding: 20px; margin: 0 auto; }
        .mode-mobile .logo { font-size: 4.5rem; }

        /* FONDO */
        .bg-animate { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #001529 0%, #020202 100%); z-index: -2; }
        .bg-mesh { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 140, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 140, 255, 0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; mask-image: radial-gradient(ellipse at center, black, transparent 80%); }

        /* BARRA DE USUARIO */
        #user-bar {
            display: none; position: fixed; top: 20px; right: 20px; z-index: 100;
            align-items: center; background: rgba(0,0,0,0.6); padding: 10px 20px;
            border-radius: 50px; border: 1px solid var(--accent); backdrop-filter: blur(10px);
        }

        /* BOTÓN CREAR (FLOTANTE) */
        #btn-create {
            display: none; position: fixed; left: 30px; bottom: 30px; z-index: 100;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--accent); color: white; border: none;
            font-size: 2rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px var(--accent-glow);
            align-items: center; justify-content: center;
        }
        #btn-create:hover { transform: scale(1.1) rotate(90deg); }

        /* FEED Y VIDEOS */
        #feed-container {
            display: none; width: 100%; height: 100vh;
            overflow-y: auto; scroll-snap-type: y mandatory;
            background: black; z-index: 50;
        }

        .video-section {
            height: 100vh; width: 100%; scroll-snap-align: start;
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        /* ACCIONES LATERALES (Like/Comentar) */
        .side-actions {
            position: absolute; right: 20px; bottom: 100px;
            display: flex; flex-direction: column; gap: 20px; z-index: 60;
        }

        .action-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            width: 50px; height: 50px; border-radius: 50%; color: white;
            cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .action-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* BOTONES GENERALES */
        .btn { padding: 16px 35px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; text-decoration: none; text-transform: uppercase; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1); }
        .btn-outline { color: #fff; background: rgba(255,255,255,0.03); backdrop-filter: blur(5px); }
        .btn-primary { background: var(--accent); color: white; border: none; box-shadow: 0 4px 15px var(--accent-glow); }
        
        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 12px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; box-sizing: border-box; }

        .fade-in { animation: fadeIn 1.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Ajustes específicos para móviles */
        @media (max-width: 600px) {
            #btn-create { left: auto; right: 20px; bottom: 20px; width: 50px; height: 50px; }
            .side-actions { right: 10px; bottom: 80px; }
        }
    </style>
</head>
<body>

    <div id="device-selector">
        <h2 style="letter-spacing: 3px; font-weight: 800;">IDENTIFICA TU PLATAFORMA</h2>
        <p style="color: #666; margin-bottom: 35px;">OPTIMIZACIÓN DE INTERFAZ ANX</p>
        <div class="btn-group">
            <div class="btn btn-outline" onclick="setMode('mobile')">📱 MÓVIL</div>
            <div class="btn btn-outline" onclick="setMode('pc')">💻 ORDENADOR</div>
        </div>
    </div>

    <div id="main-app">
        <div class="bg-animate"></div>
        <div class="bg-mesh"></div>

        <div id="user-bar">
            <span id="coin-count" style="color: #ffd700; font-weight: 800;">0 ANX Coins</span>
        </div>

        <button id="btn-create" title="Crear Video" onclick="actionCreate()">+</button>

        <div id="home-content" class="container fade-in">
            <h1 class="logo" style="margin-bottom: 10px;">AN<span>X</span></h1>
            <p class="welcome-text">Bienvenido al anexo</p>
            <div class="btn-group">
                <a href="#" class="btn btn-outline" onclick="startExploring(false)">Explorar</a>
                <a href="#" class="btn btn-primary" onclick="toggleModal(true)">Entrar</a>
            </div>
        </div>

        <div id="feed-container">
            <div class="video-section">
                <div class="fade-in" style="text-align: center;">
                    <span style="font-size: 4rem; opacity: 0.2;">🎬</span>
                    <h2 style="font-weight: 300;">Aún no hay ningún video</h2>
                    <p style="color: var(--accent); font-weight: 700; letter-spacing: 2px; font-size: 0.7rem;">SÉ EL PRIMERO EN CREAR UNO</p>
                    <button class="btn btn-outline" onclick="window.location.reload()" style="margin-top: 20px; font-size: 0.7rem;">⬅️ Volver</button>
                    <p id="access-msg" style="color: #ff4444; font-size: 0.8rem; margin-top: 20px; display: none;">Inicia sesión para interactuar</p>
                </div>

                <div class="side-actions">
                    <button class="action-btn" onclick="checkAccess('like')">❤️</button>
                    <button class="action-btn" onclick="checkAccess('comment')">💬</button>
                    <button class="action-btn" onclick="alert('Compartiendo...')">🔗</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeOutside(event)">
        <div class="modal-box">
            <h2 id="mTitle" style="margin-top:0; font-weight: 800;">ACCESO</h2>
            <input type="email" id="email" placeholder="Usuario o Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="authAction()">Conectar</button>
            <p id="mSwitch" style="font-size:0.75rem; color:#666; margin-top:25px; cursor:pointer;" onclick="switchMode()">
                ¿Nuevo? <span style="color:var(--accent)">Crea una identidad</span>
            </p>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        let coins = 0;
        let isLogin = true;
        const modal = document.getElementById('modal');

        function setMode(mode) {
            document.getElementById('device-selector').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.body.classList.add('mode-' + mode);
        }

        function startExploring(registered) {
            isLoggedIn = registered;
            document.getElementById('home-content').style.display = 'none';
            document.getElementById('feed-container').style.display = 'block';
            
            // Mostrar botón de crear y barra de usuario solo si está logueado
            if(isLoggedIn) {
                document.getElementById('user-bar').style.display = 'flex';
                document.getElementById('btn-create').style.display = 'flex';
            }
        }

        function checkAccess(type) {
            if(!isLoggedIn) {
                const msg = document.getElementById('access-msg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000);
            } else {
                if(type === 'like') {
                    coins += 10;
                    document.getElementById('coin-count').innerText = coins + " ANX Coins";
                    alert("+10 ANX Coins por tu Like");
                } else {
                    alert("Abriendo panel de comentarios...");
                }
            }
        }

        function actionCreate() {
            if(isLoggedIn) {
                alert("Preparando interfaz de carga de video...");
            }
        }

        function toggleModal(show) { modal.style.display = show ? 'flex' : 'none'; }
        function closeOutside(e) { if(e.target === modal) toggleModal(false); }

        function switchMode() {
            isLogin = !isLogin;
            document.getElementById('mTitle').innerText = isLogin ? 'ACCESO' : 'REGISTRO';
            document.getElementById('mSwitch').innerHTML = isLogin ? 
                '¿Nuevo? <span style="color:var(--accent)">Crea una identidad</span>' : 
                '¿Ya tienes identidad? <span style="color:var(--accent)">Conéctate</span>';
        }

        function authAction() {
            const mail = document.getElementById('email').value;
            if(!mail) return alert("Identificación requerida");
            alert(isLogin ? "Sincronizando..." : "Identidad registrada.");
            toggleModal(false);
            startExploring(true);
        }
    </script>
</body>
</html>
