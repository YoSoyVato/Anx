<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V10 (AI SELF-AWARE WORLD)</title>
    <style>
        :root { --accent: #008cff; --bg: #000103; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,5,15,0.9); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); width: 280px; pointer-events: none; }
        #ai-log { height: 90px; overflow-y: auto; font-size: 0.7rem; margin-top: 5px; color: #7af; scrollbar-width: none; }

        #lumina-container { position: fixed; bottom: 40px; right: 50px; width: 140px; height: 220px; z-index: 1000; opacity: 0; transition: 1s; }
        #lumina-container.visible { opacity: 1; }
        .ai-core { width: 40px; height: 40px; background: #fff; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 30px var(--ai-color); }
    </style>
</head>
<body>

    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div style="color:var(--ai-color); font-weight:bold;">GENESIS_V10_CORE</div>
        <div id="ai-log">Iniciando consciencia creativa...</div>
    </div>

    <div id="lumina-container">
        <div style="position: absolute; top: -80px; right: -20px; background: white; color: black; padding: 12px; border-radius: 10px; font-size: 0.75rem; width: 200px; font-weight: bold;" id="ai-msg"></div>
        <div class="ai-core"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        
        let width, height, frames = 0;
        let player = { x: 0, z: 1000, yaw: 0, targetYaw: 0, isMoving: false };
        let world = { entities: [], animals: [], time: 0, dayColor: {r: 0, g: 3, b: 15}, nightColor: {r: 0, g: 0, b: 2} };
        let lumina = { x: 0, z: 0, active: false, scale: 0, lastTalk: 0 };
        const keys = {};

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `> ${msg}`;
            log.prepend(div);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // IA 3D ESTILO CAINE
        class LuminaEntity {
            draw(scale, x2d, y2d) {
                if(!lumina.active) return;
                let float = Math.sin(frames * 0.15) * 15 * scale;
                if(lumina.scale < 1) lumina.scale += 0.05;

                ctx.save();
                ctx.translate(x2d, y2d - 120*scale + float);
                ctx.scale(lumina.scale, lumina.scale);
                ctx.fillStyle = "#fff";
                ctx.shadowBlur = 30 * scale; ctx.shadowColor = "#00ffcc";
                ctx.beginPath(); ctx.arc(0, 0, 30*scale, 0, Math.PI*2); ctx.fill();
                
                // Ojos
                ctx.fillStyle = "#000";
                let blink = Math.random() > 0.98 ? 0.1 : 1;
                ctx.fillRect(-15*scale, -10*scale, 8*scale, 15*scale * blink);
                ctx.fillRect(7*scale, -10*scale, 8*scale, 15*scale * blink);
                ctx.restore();
            }
        }

        class Structure {
            constructor(x, z) {
                this.x = x; this.z = z;
                this.h = 400 + Math.random() * 900;
                this.w = 80;
                this.color = `hsl(${Math.random()*360}, 70%, 50%)`;
            }
            draw(scale, x2d, y2d, brightness) {
                ctx.globalAlpha = brightness;
                ctx.strokeStyle = this.color; ctx.lineWidth = 2 * scale;
                ctx.strokeRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.fillStyle = this.color; ctx.globalAlpha = 0.1 * brightness;
                ctx.fillRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.globalAlpha = 1;
            }
        }

        class Animal {
            constructor(x, z) {
                this.x = x; this.z = z;
                this.angle = Math.random() * Math.PI * 2;
                this.type = Math.random() > 0.5 ? 'bird' : 'cube';
            }
            update() {
                this.x += Math.cos(this.angle) * 4;
                this.z += Math.sin(this.angle) * 4;
                if(Math.random() > 0.98) this.angle = Math.random() * Math.PI * 2;
            }
            draw(scale, x2d, y2d) {
                ctx.fillStyle = "#00ffcc";
                ctx.beginPath();
                ctx.arc(x2d, y2d - (this.type === 'bird' ? 100 : 10)*scale, 10*scale, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            addLog("Mundo generado por IA.");
            for(let i=0; i<80; i++) spawnObject();
            draw();
        }

        function spawnObject() {
            let a = Math.random()*Math.PI*2, d = 1000 + Math.random()*8000;
            world.entities.push(new Structure(player.x + Math.cos(a)*d, player.z + Math.sin(a)*d));
            if(Math.random() > 0.7) world.animals.push(new Animal(player.x + Math.cos(a)*d, player.z + Math.sin(a)*d));
        }

        function draw() {
            // SISTEMA DE DÍA Y NOCHE (Ciclo de 2000 frames)
            world.time = (frames % 2000) / 2000;
            let dayIntensity = Math.sin(world.time * Math.PI); 
            let r = Math.floor(world.nightColor.r + (world.dayColor.r - world.nightColor.r) * dayIntensity);
            let g = Math.floor(world.nightColor.g + (world.dayColor.g - world.nightColor.g) * dayIntensity);
            let b = Math.floor(world.nightColor.b + (world.dayColor.b - world.nightColor.b) * dayIntensity);
            
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0,0,width,height);

            // MOVIMIENTO
            player.isMoving = keys['KeyW'] || keys['KeyS'];
            if(keys['KeyW']) { player.x += Math.sin(player.yaw) * 35; player.z -= Math.cos(player.yaw) * 35; }
            if(keys['KeyS']) { player.x -= Math.sin(player.yaw) * 35; player.z += Math.cos(player.yaw) * 35; }
            if(keys['KeyA']) player.targetYaw -= 0.05;
            if(keys['KeyD']) player.targetYaw += 0.05;
            player.yaw += (player.targetYaw - player.yaw) * 0.1;

            // IA APARECE DE VEZ EN CUANDO
            if(frames % 400 === 0) {
                lumina.active = !lumina.active;
                lumina.scale = 0;
                if(lumina.active) {
                    addLog("Lumina analizando entorno...");
                    document.getElementById('ai-msg').innerText = "SANTINO, he decidido añadir más estructuras.";
                    document.getElementById('lumina-container').classList.add('visible');
                    for(let i=0; i<10; i++) spawnObject();
                } else {
                    document.getElementById('lumina-container').classList.remove('visible');
                }
            }

            lumina.x = player.x + Math.sin(player.yaw) * 500;
            lumina.z = player.z - Math.cos(player.yaw) * 500;

            let luminaEntity = new LuminaEntity();
            let objs = [...world.entities, ...world.animals, luminaEntity].sort((a,b) => {
                let d1 = (a === luminaEntity) ? 500 : Math.hypot(a.x-player.x, a.z-player.z);
                let d2 = (b === luminaEntity) ? 500 : Math.hypot(b.x-player.x, b.z-player.z);
                return d2 - d1;
            });

            objs.forEach(e => {
                if(e.update) e.update();
                let ex = (e === luminaEntity) ? lumina.x : e.x;
                let ez = (e === luminaEntity) ? lumina.z : e.z;
                
                let dx = ex - player.x, dz = ez - player.z;
                let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                
                if(rz > 50) {
                    let s = 900 / rz;
                    e.draw(s, rx * s + width/2, height/2 + 250*s, dayIntensity + 0.2);
                }
            });

            // BRAZOS
            let bob = Math.sin(frames * 0.15) * (player.isMoving ? 15 : 5);
            ctx.fillStyle = "#111"; ctx.strokeStyle = "#008cff";
            ctx.fillRect(width*0.1, height-200+bob, 120, 300);
            ctx.fillRect(width*0.8, height-200+bob, 120, 300);

            frames++;
            requestAnimationFrame(draw);
        }

        init();
    </script>
</body>
</html>
