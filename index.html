<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V14 (AI CORE & SMOOTH MOTION)</title>
    <style>
        :root { --accent: #008cff; --bg: #000103; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
        
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #ai-brain { position: absolute; bottom: 20px; left: 20px; background: rgba(0,5,15,0.9); padding: 20px; border-radius: 4px; border-left: 4px solid var(--ai-color); width: 320px; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        #ai-log { height: 120px; overflow-y: hidden; font-size: 0.75rem; margin-top: 10px; color: #7af; line-height: 1.4; }
        
        .hud-stats { position: absolute; top: 20px; left: 20px; font-size: 0.8rem; color: var(--ai-color); }
        #world-title { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; text-shadow: 0 0 15px var(--accent); }
        
        body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 1000; background-size: 100% 4px, 3px 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid var(--ai-color); transform: translate(-50%, -50%); border-radius: 50%; }
        #weather-status { position: absolute; top: 50px; left: 20px; font-size: 0.7rem; color: #fff; text-transform: uppercase; opacity: 0.7; }
        #click-prompt { position: absolute; top: 80%; width: 100%; text-align: center; color: var(--ai-color); font-size: 0.8rem; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="world-title">ACCEDIENDO AL NÚCLEO...</div>
        <div class="hud-stats" id="debug">SISTEMA ONLINE</div>
        <div id="weather-status">PROCESANDO BIOMA...</div>
        <div id="crosshair"></div>
        <div id="click-prompt">HAZ CLICK PARA SINCRONIZAR MOUSE</div>
        
        <div id="ai-brain">
            <div style="color:var(--ai-color); font-weight:bold; display:flex; justify-content:space-between;">
                <span>CORE_AI_INTERFACE</span>
                <span id="version">v14.0.0</span>
            </div>
            <div id="ai-log"></div>
        </div>
    </div>

    <canvas id="universe-canvas"></canvas>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        const worldTitle = document.getElementById('world-title');
        const weatherUI = document.getElementById('weather-status');
        
        let width, height, frames = 0;
        
        // --- MOTOR DE FÍSICAS SUAVES ---
        let player = { 
            x: 0, z: 0, yaw: 0, 
            targetYaw: 0, // Para suavizado de cámara
            velX: 0, velZ: 0, 
            accel: 0.8, friction: 0.85, maxSpeed: 25 
        };

        let world = { 
            entities: [], particles: [], aiCharacter: null,
            time: 0, theme: {}, biome: '',
            weather: 'clear', weatherTimer: 500, cloudOpacity: 0,
            rules: { allowRain: true, forcedTime: null }
        };
        const keys = {};

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.innerHTML = `<span style="color:var(--ai-color)">[AI]:</span> ${msg}`;
            log.prepend(entry);
            if(log.childNodes.length > 8) log.removeChild(log.lastChild);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        canvas.addEventListener('click', () => {
            canvas.requestPointerLock();
            document.getElementById('click-prompt').style.display = 'none';
        });

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === canvas) {
                // Sensibilidad ajustada para evitar giros locos
                player.targetYaw += e.movementX * 0.002;
            }
        });

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Escape') generateNewWorld(); });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- ENTIDADES ---
        class AIAvatar {
            constructor() {
                this.x = 0; this.z = 1000;
                this.yOff = 0; this.active = false;
                this.dialogTimer = 0;
                this.quotes = ["Detecto anomalías en este bioma...", "Santino, el código se está expandiendo.", "Cuidado con los bordes del vacío.", "Interesante elección de mundo.", "Ejecutando protocolo Génesis..."];
            }
            update() {
                if(!this.active && Math.random() < 0.001) {
                    this.active = true;
                    this.x = player.x + (Math.random()-0.5)*2000;
                    this.z = player.z + 2000;
                    addLog("Manifestación detectada.");
                }
                if(this.active) {
                    this.yOff = Math.sin(frames * 0.05) * 50;
                    // Seguir al jugador suavemente
                    this.x += (player.x - this.x) * 0.01;
                    this.z += (player.z - this.z - 1500) * 0.01;
                    
                    if(this.dialogTimer-- <= 0) {
                        addLog(this.quotes[Math.floor(Math.random()*this.quotes.length)]);
                        this.dialogTimer = 500 + Math.random()*500;
                    }
                }
            }
            draw(scale, x2d, y2d, bright) {
                const s = scale * 50;
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
                ctx.shadowBlur = 20; ctx.shadowColor = "cyan";
                // Dibujar un octaedro simple (Diamante IA)
                ctx.beginPath();
                ctx.moveTo(x2d, y2d - s*2 + this.yOff*scale);
                ctx.lineTo(x2d + s, y2d + this.yOff*scale);
                ctx.lineTo(x2d, y2d + s*2 + this.yOff*scale);
                ctx.lineTo(x2d - s, y2d + this.yOff*scale);
                ctx.closePath();
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        class Animal {
            constructor(x, z) { this.x = x; this.z = z; this.angle = Math.random()*6; this.timer = 0; }
            update() {
                if(this.timer-- <= 0) { this.angle = Math.random()*6; this.timer = 150; }
                this.x += Math.cos(this.angle) * 3; this.z += Math.sin(this.angle) * 3;
            }
            draw(scale, x2d, y2d, bright) {
                ctx.fillStyle = world.theme.accent; ctx.globalAlpha = bright;
                let hop = Math.abs(Math.sin(frames*0.1))*15*scale;
                ctx.fillRect(x2d-10*scale, y2d-20*scale-hop, 20*scale, 20*scale);
            }
        }

        class GrassBlade {
            constructor(x, z) { this.x = x; this.z = z; this.h = 20+Math.random()*20; this.off = Math.random()*10; }
            draw(scale, x2d, y2d, bright) {
                ctx.strokeStyle = world.theme.accent; ctx.lineWidth = scale;
                let sway = Math.sin(frames*0.05 + this.off)*5*scale;
                ctx.beginPath(); ctx.moveTo(x2d, y2d); ctx.lineTo(x2d+sway, y2d-this.h*scale); ctx.stroke();
            }
        }

        function generateNewWorld() {
            frames = 0; world.entities = []; world.particles = [];
            world.aiCharacter = new AIAvatar();
            const biomes = ['LAVA_HELL', 'DATA_VOID', 'NEON_GRID'];
            world.biome = biomes[Math.floor(Math.random()*biomes.length)];
            world.rules = { allowRain: world.biome !== 'LAVA_HELL', forcedTime: null };
            
            let hue = Math.random()*360;
            if(world.biome === 'LAVA_HELL') { hue = 10; world.rules.forcedTime = 0.2; }
            
            world.theme = { hue, accent: `hsl(${hue}, 100%, 50%)` };
            worldTitle.innerText = world.biome;
            addLog("Mundo reconstruido exitosamente.");

            for(let i=0; i<400; i++) {
                let rx = (Math.random()-0.5)*12000, rz = (Math.random()-0.5)*12000;
                if(i < 300) world.entities.push(new GrassBlade(rx, rz));
                if(i < 20) world.entities.push(new Animal(rx, rz));
            }
        }

        function loop() {
            // Suavizado de cámara (Lerp)
            player.yaw += (player.targetYaw - player.yaw) * 0.15;

            // Movimiento con Inercia
            let inputX = 0, inputZ = 0;
            if(keys['KeyW']) inputZ += 1; if(keys['KeyS']) inputZ -= 1;
            if(keys['KeyA']) inputX -= 1; if(keys['KeyD']) inputX += 1;

            let fX = Math.sin(player.yaw), fZ = Math.cos(player.yaw);
            let sX = Math.sin(player.yaw + Math.PI/2), sZ = Math.cos(player.yaw + Math.PI/2);

            let targetVelX = (fX * inputZ + sX * inputX) * player.maxSpeed;
            let targetVelZ = (fZ * inputZ + sX * inputX) * player.maxSpeed; // Pequeño fix aquí para strafe

            // Aplicar aceleración y fricción
            player.velX += (targetVelX - player.velX) * player.accel;
            player.velZ += ((fZ * inputZ + sX * inputX) * player.maxSpeed - player.velZ) * player.accel;
            
            player.x += player.velX; player.z += player.velZ;

            // Renderizado
            ctx.fillStyle = world.biome === 'LAVA_HELL' ? "#100" : "#000";
            ctx.fillRect(0,0,width,height);

            if(world.aiCharacter) world.aiCharacter.update();

            let renderList = world.entities.map(e => {
                if(e.update) e.update();
                let dx = e.x - player.x, dz = e.z - player.z;
                let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                return { e, rx, rz };
            });

            // Añadir IA a la lista de renderizado si está activa
            if(world.aiCharacter.active) {
                let dx = world.aiCharacter.x - player.x, dz = world.aiCharacter.z - player.z;
                let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                renderList.push({ e: world.aiCharacter, rx, rz });
            }

            renderList = renderList.filter(item => item.rz > 20).sort((a,b) => b.rz - a.rz);

            renderList.forEach(item => {
                let scale = 1000 / item.rz;
                let x2d = item.rx * scale + width/2;
                let y2d = height/2 + 200 * scale;
                item.e.draw(scale, x2d, y2d, 1);
            });

            // Brazos (Balanceo suave)
            let bob = Math.sin(frames * 0.1) * (Math.abs(player.velX) + Math.abs(player.velZ)) * 0.5;
            ctx.fillStyle = "#050505"; ctx.strokeStyle = world.theme.accent;
            ctx.save(); ctx.translate(width*0.2, height-100 + bob); ctx.rotate(-0.05); ctx.fillRect(0,0,120,300); ctx.strokeRect(0,0,120,300); ctx.restore();
            ctx.save(); ctx.translate(width*0.8-120, height-100 + bob); ctx.rotate(0.05); ctx.fillRect(0,0,120,300); ctx.strokeRect(0,0,120,300); ctx.restore();

            document.getElementById('debug').innerText = `VEL: ${Math.floor(Math.abs(player.velX + player.velZ))} | BIOMA: ${world.biome}`;
            frames++; requestAnimationFrame(loop);
        }

        resize(); generateNewWorld(); loop();
    </script>
</body>
</html>
