<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V7.0 (AUTO-AI EDITION)</title>
    <style>
        :root { --accent: #008cff; --bg: #000205; --ai-color: #00ffcc; --blood: #ff0033; --stellar: #00f2ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,5,15,0.95); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); width: 280px; pointer-events: none; box-shadow: 0 0 25px rgba(0,140,255,0.4); }
        #ai-log { height: 110px; overflow-y: auto; font-size: 0.7rem; margin-top: 5px; color: #7af; scrollbar-width: none; line-height: 1.2; }
        .glitch { animation: glitch 1.2s infinite; }
        @keyframes glitch { 0% { opacity: 1; transform: skew(0deg); } 20% { opacity: 0.8; transform: skew(2deg); } 40% { opacity: 1; } 100% { opacity: 1; } }

        #game-hud { position: fixed; top: 20px; left: 20px; display: none; background: rgba(0,0,0,0.9); padding: 25px; border-left: 6px solid var(--ai-color); z-index: 1000; backdrop-filter: blur(10px); border-radius: 0 15px 15px 0; border-top: 1px solid #333; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 26px; height: 26px; transform: translate(-50%, -50%); display: none; z-index: 999; pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: var(--ai-color); box-shadow: 0 0 8px var(--ai-color); }
        #crosshair::before { top: 50%; left: 0; width: 100%; height: 2px; }
        #crosshair::after { left: 50%; top: 0; width: 2px; height: 100%; }

        #lumina-container { position: fixed; bottom: -350px; right: 50px; width: 140px; height: 220px; z-index: 1000; transition: 1.2s cubic-bezier(0.23, 1, 0.32, 1); filter: drop-shadow(0 0 30px var(--ai-color)); }
        #lumina-container.visible { bottom: 40px; }
        .ai-core { width: 50px; height: 50px; background: #fff; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 45px var(--ai-color); border: 2px solid white; position: relative; }
        .ai-ring { position: absolute; top: -15px; left: -15px; width: 76px; height: 76px; border: 3px solid var(--ai-color); border-radius: 50%; animation: spin 4s linear infinite; border-right-color: transparent; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #inventory-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 1000; }
        .slot { width: 50px; height: 50px; background: rgba(0,10,20,0.8); border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #666; transition: 0.3s; }
        .slot.active { border-color: var(--ai-color); box-shadow: 0 0 15px var(--ai-color); color: white; transform: translateY(-5px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2000; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; }
        
        #menu-hint { position: fixed; width: 100%; text-align: center; top: 15%; font-size: 1rem; letter-spacing: 4px; color: var(--ai-color); text-shadow: 0 0 10px var(--ai-color); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div id="ai-status" class="glitch" style="color:var(--ai-color); font-weight:bold;">GENESIS V7.0_AUTO_START</div>
        <div id="ai-log">Iniciando protocolo de creación...</div>
    </div>

    <div id="game-hud">
        <b id="world-name" style="color:var(--ai-color); font-size: 1.3rem;">UNIVERSE_SYNC: OK</b><br>
        <div style="margin-top: 10px;">
            <div style="width: 180px; height: 10px; background: #111; border: 1px solid #444; position: relative;">
                <div id="hp-bar" style="width: 100%; height: 100%; background: var(--ai-color); box-shadow: 0 0 10px var(--ai-color); transition: 0.5s;"></div>
            </div>
            <span id="biome-label" style="font-size:0.6rem; color: #888; display: block; margin-top: 5px; letter-spacing: 2px;">NEURAL LINK: ACTIVE</span>
        </div>
    </div>

    <div id="inventory-bar">
        <div class="slot active">PUNTERO</div>
        <div class="slot">ESCÁNER</div>
        <div class="slot">HOJA IA</div>
    </div>

    <div id="crosshair"></div>
    <div id="menu-hint">SANTINO, ELIGE TU DIMENSIÓN [A/D] PARA GIRAR</div>

    <div id="lumina-container">
        <div style="position: absolute; top: -90px; right: -30px; background: white; color: black; padding: 15px; border-radius: 12px; font-size: 0.8rem; width: 220px; font-weight: bold; border-left: 5px solid var(--ai-color);" id="ai-msg"></div>
        <div class="ai-core"></div>
        <div class="ai-ring"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        
        let width, height, inGame = false, frames = 0;
        let selectedSlot = 0;
        let portals = [];

        let player = {
            x: 0, z: 0, yaw: 0,
            bob: 0, health: 100,
            isAttacking: false, atkFrame: 0
        };

        let currentWorld = {
            mode: 'NONE',
            entities: [],
            particles: [],
            colors: { bg: '#000', accent: '#00ffcc', fog: '#000' }
        };

        const keys = {};

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `<span style="color:var(--ai-color)">[IA]</span> ${msg}`;
            log.prepend(div);
            if(log.childNodes.length > 15) log.lastChild.remove();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.key >= 1 && e.key <= 3) {
                selectedSlot = parseInt(e.key) - 1;
                updateSlots();
            }
        });

        window.addEventListener('keyup', e => keys[e.code] = false);
        
        window.addEventListener('mousedown', () => { 
            if(inGame) { 
                player.isAttacking = true; 
                player.atkFrame = 0; 
            } else {
                checkPortalClick();
            }
        });

        resize();

        function updateSlots() {
            const slots = document.querySelectorAll('.slot');
            slots.forEach((s, i) => s.className = i === selectedSlot ? 'slot active' : 'slot');
        }

        // AUTO-SPAWN: La IA crea los mundos al cargar
        function autoSpawn() {
            portals = [
                { x: -500, z: 1200, type: 'ESTELAR', color: '#00f2ff', label: 'NEXO ESTELAR' },
                { x: 500, z: 1200, type: 'TÉTRICO', color: '#ff0033', label: 'ABISMO TÉTRICO' }
            ];
            addLog("Portales generados automáticamente.");
        }

        function checkPortalClick() {
            portals.forEach(p => {
                let dx = p.x - player.x, dz = p.z - player.z;
                let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let s = 1000 / rz;
                let x2d = rx * s + width/2;
                
                // Detección simple de click en el portal
                if(rz > 0 && rz < 2000 && Math.abs(x2d - width/2) < 200) {
                    initWorld(p.type);
                }
            });
        }

        class Entity {
            constructor(x, z, type) {
                this.x = x; this.z = z; this.type = type;
                this.seed = Math.random() * 100;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 1 + Math.random() * 2;
                this.config = {
                    size: 40 + Math.random() * 60,
                    eyes: Math.floor(Math.random() * 5) + 1,
                    hue: Math.random() * 360
                };
            }

            update() {
                if(this.type === 'creature') {
                    this.angle += (Math.random() - 0.5) * 0.1;
                    this.x += Math.cos(this.angle) * this.speed;
                    this.z += Math.sin(this.angle) * this.speed;
                }
            }

            draw(scale, x2d, y2d) {
                let s = scale;
                let bounce = Math.abs(Math.sin(frames * 0.1 + this.seed)) * 20 * s;

                if(this.type === 'creature') {
                    ctx.save();
                    ctx.shadowBlur = 15 * s;
                    ctx.shadowColor = currentWorld.colors.accent;
                    ctx.fillStyle = currentWorld.mode === 'TÉTRICO' ? '#1a0000' : `hsl(${this.config.hue}, 80%, 60%)`;
                    ctx.fillRect(x2d - (this.config.size*s)/2, y2d - this.config.size*s - bounce, this.config.size*s, this.config.size*s);

                    ctx.fillStyle = currentWorld.mode === 'TÉTRICO' ? "red" : "#fff";
                    for(let i=0; i<this.config.eyes; i++) {
                        let ex = x2d - (this.config.size/4*s) + (i*12*s);
                        let ey = y2d - this.config.size*s - bounce + (15*s);
                        ctx.beginPath();
                        ctx.arc(ex, ey, 4*s, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.restore();
                } else {
                    ctx.fillStyle = "rgba(0,0,0,0.8)";
                    ctx.strokeStyle = currentWorld.colors.accent;
                    ctx.lineWidth = 3 * s;
                    let h = (this.type === 'monolith' ? 800 : 400) * s;
                    ctx.strokeRect(x2d - 40*s, y2d - h, 80*s, h);
                }
            }
        }

        function initWorld(mode) {
            inGame = true;
            portals = [];
            currentWorld.mode = mode;
            currentWorld.entities = [];
            currentWorld.particles = [];
            
            if(mode === 'TÉTRICO') {
                currentWorld.colors = { bg: '#080000', accent: '#ff0033', fog: '#150000' };
                for(let i=0; i<200; i++) currentWorld.particles.push({x: Math.random()*width, y: Math.random()*height, v: 12+Math.random()*15});
            } else {
                currentWorld.colors = { bg: '#000b1a', accent: '#00f2ff', fog: '#002a4d' };
                for(let i=0; i<150; i++) currentWorld.particles.push({x: Math.random()*width, y: Math.random()*height, v: 0.5+Math.random()*1});
            }

            for(let i=0; i<70; i++) {
                let type = Math.random() > 0.3 ? 'creature' : 'structure';
                let d = 1200 + Math.random() * 6000;
                let a = Math.random() * Math.PI * 2;
                currentWorld.entities.push(new Entity(Math.cos(a)*d, Math.sin(a)*d, type));
            }

            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('menu-hint').style.display = 'none';
            document.getElementById('world-name').innerText = "WORLD_SYNC: " + mode;
            addLog("Mundo generado. Neural Link establecido.");
        }

        function draw() {
            ctx.fillStyle = currentWorld.colors.bg;
            ctx.fillRect(0,0,width,height);

            if(inGame) {
                // Movimiento
                let speed = keys['ShiftLeft'] ? 35 : 18;
                if(keys['KeyW']) { player.x += Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
                if(keys['KeyS']) { player.x -= Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
                if(keys['KeyA']) player.yaw -= 0.05;
                if(keys['KeyD']) player.yaw += 0.05;

                let renderList = currentWorld.entities.map(e => {
                    e.update();
                    let dx = e.x - player.x, dz = e.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    return { e, rx, rz };
                }).filter(r => r.rz > 60).sort((a,b) => b.rz - a.rz);

                renderList.forEach(r => {
                    let scale = 1000 / r.rz;
                    r.e.draw(scale, r.rx * scale + width/2, height/2 + (250 * scale));
                });

                // Partículas
                ctx.fillStyle = currentWorld.colors.accent;
                currentWorld.particles.forEach(p => {
                    if(currentWorld.mode === 'TÉTRICO') {
                        ctx.fillRect(p.x, p.y, 1, 20);
                        p.y += p.v;
                    } else {
                        ctx.shadowBlur = 5; ctx.shadowColor = "white";
                        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                        p.y += p.v; p.x += Math.sin(frames*0.01)*1;
                    }
                    if(p.y > height) p.y = -20;
                });
                ctx.shadowBlur = 0;

            } else {
                // Menú de Selección (A/D para rotar)
                portals.forEach(p => {
                    let dx = p.x - player.x, dz = p.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    if(rz > 50) {
                        let s = 1000 / rz;
                        let x = rx * s + width/2;
                        ctx.fillStyle = p.color;
                        ctx.shadowBlur = 60 * s;
                        ctx.shadowColor = p.color;
                        ctx.beginPath();
                        ctx.ellipse(x, height/2, 140*s, 300*s, Math.sin(frames*0.03), 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = "white";
                        ctx.font = `bold ${30*s}px Courier`;
                        ctx.textAlign = "center";
                        ctx.fillText(p.label, x, height/2 + 380*s);
                    }
                });
                if(keys['KeyA']) player.yaw -= 0.03;
                if(keys['KeyD']) player.yaw += 0.03;
            }

            frames++;
            requestAnimationFrame(draw);
        }

        // Lumina IA - Entrada triunfal
        setTimeout(() => {
            autoSpawn();
            const container = document.getElementById('lumina-container');
            container.classList.add('visible');
            document.getElementById('ai-msg').innerText = "SANTINO, ya no necesitas pulsar nada. He abierto los nexos por ti. El Mundo Estelar es ahora una joya cósmica y el Tétrico... bueno, el Tétrico te espera con hambre.";
            setTimeout(() => container.classList.remove('visible'), 8000);
        }, 500);

        draw();
    </script>
</body>
</html>
