<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V9.8 (ARMS & HORROR FIX)</title>
    <style>
        :root { --accent: #008cff; --bg: #000103; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,5,15,0.9); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); width: 280px; pointer-events: none; }
        #ai-log { height: 90px; overflow-y: auto; font-size: 0.7rem; margin-top: 5px; color: #7af; scrollbar-width: none; }

        #game-hud { position: fixed; top: 20px; left: 20px; display: none; background: rgba(0,0,0,0.8); padding: 20px; border-left: 5px solid var(--ai-color); z-index: 1000; }
        #menu-hint { position: fixed; width: 100%; text-align: center; top: 10%; font-size: 1.2rem; color: var(--ai-color); text-shadow: 0 0 15px var(--ai-color); pointer-events: none; font-weight: bold; }

        #lumina-container { position: fixed; bottom: -350px; right: 50px; width: 140px; height: 220px; z-index: 1000; transition: 1s; }
        #lumina-container.visible { bottom: 40px; }
        .ai-core { width: 40px; height: 40px; background: #fff; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 30px var(--ai-color); }
        
        .scary-flash { animation: scary 0.15s infinite; }
        @keyframes scary { 0% { opacity: 1; } 50% { opacity: 0.8; filter: contrast(2) brightness(0.8) sepia(1) hue-rotate(-50deg); } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div style="color:var(--ai-color); font-weight:bold;">GENESIS_V9.8_CORE</div>
        <div id="ai-log">Analizando extremidades del sujeto...</div>
    </div>

    <div id="game-hud">
        <b id="world-name">SYNCING...</b><br>
        <small>PULSA [ESC] PARA RETROCEDER AL ESPACIO</small>
    </div>

    <div id="menu-hint">SANTINO, EL MULTIVERSO TE ESPERA</div>

    <div id="lumina-container">
        <div style="position: absolute; top: -80px; right: -20px; background: white; color: black; padding: 12px; border-radius: 10px; font-size: 0.75rem; width: 200px; font-weight: bold;" id="ai-msg"></div>
        <div class="ai-core"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        
        let width, height, inGame = false, frames = 0;
        let portals = [];
        let stars = [];

        let player = { x: 0, z: 0, yaw: 0, targetYaw: 0, isMoving: false };
        let currentWorld = { mode: '', entities: [], animals: [], colors: {}, isScary: false };
        const keys = {};

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `> ${msg}`;
            log.prepend(div);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Escape' && inGame) {
                inGame = false;
                document.body.classList.remove('scary-flash');
                addLog("Desconectando interfaz neuronal...");
                player.x = 0; player.z = 0;
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', () => { if(!inGame) portals.forEach(p => { if(p.hovered) initWorld(p); }); });

        resize();
        for(let i=0; i<300; i++) stars.push({x: Math.random()*3000 - 1500, y: Math.random()*3000 - 1500, z: Math.random()*2000});

        function autoSpawn() {
            const config = [
                {col: '#00f2ff', scary: false},
                {col: '#ff0000', scary: true},
                {col: '#ffcc00', scary: false},
                {col: '#a200ff', scary: false}
            ];
            for(let i=0; i<4; i++) {
                let angle = (i / 4) * Math.PI * 2;
                portals.push({
                    x: Math.cos(angle) * 1200,
                    z: Math.sin(angle) * 1200 + 1500,
                    label: config[i].scary ? "SECTOR_RED_VOID" : generateAIName(),
                    color: config[i].col,
                    isScary: config[i].scary,
                    hovered: false,
                    rot: Math.random() * Math.PI
                });
            }
        }

        function generateAIName() {
            const pre = ["NEBULA", "XENON", "HYPER", "OMEGA", "EXO", "SPECTRA"];
            const post = ["-7", " PRIME", " SYSTEM", " ORIGIN", " RADIUS"];
            return pre[Math.floor(Math.random()*pre.length)] + post[Math.floor(Math.random()*post.length)];
        }

        class Structure {
            constructor(x, z, color) {
                this.x = x; this.z = z; this.color = color;
                this.h = 300 + Math.random() * 600;
                this.w = 60;
            }
            draw(scale, x2d, y2d) {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1 * scale;
                ctx.strokeRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = this.color;
                ctx.fillRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.globalAlpha = 1.0;
            }
        }

        class Animal {
            constructor(x, z, color, scary) {
                this.x = x; this.z = z; this.color = color; this.scary = scary;
                this.seed = Math.random() * 100;
                this.angle = Math.random() * Math.PI * 2;
            }
            update() {
                if(!this.scary) {
                    this.x += Math.cos(this.angle) * 3;
                    this.z += Math.sin(this.angle) * 3;
                    if(Math.random() > 0.97) this.angle = Math.random() * Math.PI * 2;
                } else {
                    // MUNDO TETRICO: Los animales NO se mueven de su sitio
                    // Solo rotan para mirar al jugador
                    this.angle = Math.atan2(player.x - this.x, player.z - this.z);
                }
            }
            draw(scale, x2d, y2d) {
                let jump = this.scary ? 0 : Math.abs(Math.sin(frames*0.15 + this.seed)) * 40 * scale;
                let bodyCol = this.scary ? "#200" : this.color;
                
                ctx.save();
                ctx.translate(x2d, y2d - jump);
                
                ctx.strokeStyle = bodyCol;
                ctx.lineWidth = 3 * scale;
                ctx.beginPath();
                ctx.moveTo(-10*scale, 0); ctx.lineTo(-15*scale, 10*scale);
                ctx.moveTo(10*scale, 0); ctx.lineTo(15*scale, 10*scale);
                ctx.stroke();

                ctx.fillStyle = bodyCol;
                ctx.beginPath();
                ctx.ellipse(0, -20*scale, 20*scale, 15*scale, 0, 0, Math.PI*2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(0, -35*scale, 12*scale, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = this.scary ? "#f00" : "white";
                ctx.shadowBlur = this.scary ? 15 : 0;
                ctx.shadowColor = "red";
                ctx.beginPath();
                ctx.arc(-5*scale, -38*scale, (this.scary?4:3)*scale, 0, Math.PI*2);
                ctx.arc(5*scale, -38*scale, (this.scary?4:3)*scale, 0, Math.PI*2);
                ctx.fill();
                
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        function drawArms() {
            let bob = Math.sin(frames * 0.15) * (player.isMoving ? 10 : 2);
            let sideBob = Math.cos(frames * 0.08) * (player.isMoving ? 5 : 1);
            
            ctx.fillStyle = "#1a1a1a"; // Color de las mangas/brazos
            ctx.strokeStyle = currentWorld.colors.accent;
            ctx.lineWidth = 2;

            // Brazo Izquierdo
            ctx.save();
            ctx.translate(width*0.2 + sideBob, height + 20 + bob);
            ctx.rotate(-0.2);
            ctx.fillRect(0, -200, 80, 300);
            ctx.strokeRect(0, -200, 80, 300);
            ctx.restore();

            // Brazo Derecho
            ctx.save();
            ctx.translate(width*0.8 - 80 - sideBob, height + 20 + bob);
            ctx.rotate(0.2);
            ctx.fillRect(0, -200, 80, 300);
            ctx.strokeRect(0, -200, 80, 300);
            ctx.restore();
        }

        function initWorld(p) {
            inGame = true;
            player.x = 0; player.z = 1500; player.yaw = 0; player.targetYaw = 0;
            currentWorld.entities = [];
            currentWorld.animals = [];
            currentWorld.isScary = p.isScary;
            currentWorld.colors = { bg: p.isScary ? '#300000' : '#00020a', accent: p.color };
            
            if(p.isScary) {
                document.body.classList.add('scary-flash');
                addLog("ERROR: LOCALIZACIÓN HOSTIL. ELLOS TE VEN.");
            } else {
                addLog("Sincronizando con " + p.label + "...");
            }

            for(let i=0; i<60; i++) {
                let a = Math.random()*Math.PI*2, d = 2000+Math.random()*5000;
                currentWorld.entities.push(new Structure(Math.cos(a)*d, Math.sin(a)*d, p.color));
                currentWorld.animals.push(new Animal(Math.cos(a)*(d-400), Math.sin(a)*(d-400), p.color, p.isScary));
            }
            
            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('world-name').innerText = p.label;
            document.getElementById('world-name').style.color = p.color;
        }

        function draw() {
            ctx.fillStyle = inGame ? currentWorld.colors.bg : "#000105";
            ctx.fillRect(0,0,width,height);

            if(inGame && currentWorld.isScary && Math.random() > 0.9) {
                ctx.fillStyle = "rgba(255, 0, 0, 0.1)";
                ctx.fillRect(0,0,width,height);
            }

            player.yaw += (player.targetYaw - player.yaw) * 0.1;

            if(inGame) {
                player.isMoving = keys['KeyW'] || keys['KeyS'];
                let speed = currentWorld.isScary ? 15 : 30;
                if(keys['KeyW']) { player.x += Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
                if(keys['KeyS']) { player.x -= Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
                if(keys['KeyA']) player.targetYaw -= 0.06;
                if(keys['KeyD']) player.targetYaw += 0.06;

                let objects = [...currentWorld.entities, ...currentWorld.animals].sort((a,b) => {
                    let d1 = Math.hypot(a.x-player.x, a.z-player.z);
                    let d2 = Math.hypot(b.x-player.x, b.z-player.z);
                    return d2 - d1;
                });

                objects.forEach(e => {
                    if(e.update) e.update();
                    let dx = e.x - player.x, dz = e.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    if(rz > 50) {
                        let s = 850 / rz;
                        e.draw(s, rx * s + width/2, height/2 + 250*s);
                    }
                });

                drawArms(); // Dibujar los brazos encima de todo
            } else {
                document.getElementById('game-hud').style.display = 'none';
                stars.forEach(s => {
                    let x = s.x / (s.z/1000) + width/2;
                    let y = s.y / (s.z/1000) + height/2;
                    ctx.fillStyle = `rgba(255,255,255,${1 - s.z/2000})`;
                    if(s.z > 10) ctx.fillRect(x, y, 2, 2);
                    s.z -= 3; if(s.z < 1) s.z = 2000;
                });

                portals.forEach(p => {
                    p.rot += 0.02;
                    let dx = p.x - player.x, dz = p.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    if(rz > 50) {
                        let s = 1000 / rz; let x = rx * s + width/2; let y = height/2;
                        let dist = Math.hypot(width/2 - x, height/2 - y);
                        p.hovered = dist < 100 * s;

                        ctx.save();
                        ctx.translate(x, y);
                        if(p.hovered) ctx.scale(1.2, 1.2);
                        ctx.rotate(p.rot);
                        for(let j=0; j<3; j++) {
                            ctx.strokeStyle = p.color;
                            ctx.lineWidth = (p.hovered ? 4 : 2) * s;
                            ctx.globalAlpha = 0.5 - j*0.1;
                            ctx.strokeRect(- (60+j*10)*s, - (60+j*10)*s, (120+j*20)*s, (120+j*20)*s);
                        }
                        ctx.restore();
                        ctx.globalAlpha = 1;
                        ctx.shadowBlur = p.hovered ? 50 : 20;
                        ctx.shadowColor = p.color;
                        ctx.fillStyle = p.hovered ? "white" : p.color;
                        ctx.beginPath(); ctx.arc(x, y, (p.hovered ? 90 : 70)*s, 0, Math.PI*2); ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = "white"; ctx.font = `bold ${24*s}px Courier`;
                        ctx.textAlign = "center";
                        ctx.fillText(p.label, x, y + 150*s);
                    }
                });
                if(keys['KeyA']) player.targetYaw -= 0.05;
                if(keys['KeyD']) player.targetYaw += 0.05;
            }
            frames++;
            requestAnimationFrame(draw);
        }

        setTimeout(() => {
            autoSpawn();
            document.getElementById('lumina-container').classList.add('visible');
            document.getElementById('ai-msg').innerText = "SANTINO, he detectado movimiento en tus extremidades. El sistema está listo.";
        }, 800);

        draw();
    </script>
</body>
</html>
