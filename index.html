<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V6.5 (MAX EXPANSION)</title>
    <style>
        :root { --accent: #008cff; --bg: #000205; --ai-color: #00ffcc; --blood: #ff0033; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,5,15,0.9); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); width: 280px; pointer-events: none; box-shadow: 0 0 20px rgba(0,140,255,0.3); }
        #ai-log { height: 120px; overflow-y: auto; font-size: 0.75rem; margin-top: 5px; color: #7af; scrollbar-width: none; }
        .glitch { animation: glitch 1s infinite; }
        @keyframes glitch { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.01); } }

        #game-hud { position: fixed; top: 20px; left: 20px; display: none; background: rgba(0,0,0,0.85); padding: 25px; border-left: 5px solid var(--ai-color); z-index: 1000; backdrop-filter: blur(8px); border-radius: 0 15px 15px 0; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); display: none; z-index: 999; pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: var(--ai-color); box-shadow: 0 0 5px var(--ai-color); }
        #crosshair::before { top: 50%; left: 0; width: 100%; height: 2px; }
        #crosshair::after { left: 50%; top: 0; width: 2px; height: 100%; }

        #lumina-container { position: fixed; bottom: -350px; right: 50px; width: 140px; height: 220px; z-index: 1000; transition: 1s cubic-bezier(0.19, 1, 0.22, 1); filter: drop-shadow(0 0 25px var(--ai-color)); }
        #lumina-container.visible { bottom: 40px; }
        .ai-core { width: 50px; height: 50px; background: #fff; border-radius: 50%; margin: 0 auto; position: relative; box-shadow: 0 0 40px var(--ai-color); border: 2px solid white; }
        .ai-ring { position: absolute; top: -15px; left: -15px; width: 76px; height: 76px; border: 3px solid var(--ai-color); border-radius: 50%; animation: spin 4s linear infinite; border-top-color: transparent; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #inventory-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1000; }
        .slot { width: 45px; height: 45px; background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
        .slot.active { border-color: var(--ai-color); box-shadow: 0 0 10px var(--ai-color); }
    </style>
</head>
<body>

    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div id="ai-status" class="glitch" style="color:var(--ai-color); font-weight:bold; font-size: 0.9rem;">GENESIS V6.5_OVERLOAD</div>
        <div id="ai-log">Inyectando librerías de expansión...</div>
    </div>

    <div id="game-hud">
        <b id="world-name" style="color:var(--ai-color); font-size: 1.4rem;">SCANNING...</b><br>
        <div id="status-bars" style="margin-top: 10px;">
            <div style="width: 150px; height: 8px; background: #222; border: 1px solid #444;">
                <div id="hp-fill" style="width: 100%; height: 100%; background: var(--ai-color); transition: 0.3s;"></div>
            </div>
            <span id="biome-label" style="font-size:0.65rem; color: #888; text-transform: uppercase; margin-top: 5px; display: block;">BIOMA: DATA_MISSING</span>
        </div>
    </div>
    
    <div id="inventory-bar">
        <div class="slot active" id="slot-1">FISTS</div>
        <div class="slot" id="slot-2">SCANNER</div>
        <div class="slot" id="slot-3">DATA_BLADE</div>
    </div>

    <div id="crosshair"></div>

    <div id="lumina-container">
        <div style="position: absolute; top: -80px; right: -20px; background: rgba(255,255,255,0.95); color: #000; padding: 12px; border-radius: 15px; font-size: 0.75rem; width: 220px; font-weight: bold; line-height: 1.4; border-bottom: 4px solid var(--ai-color);" id="ai-msg"></div>
        <div class="ai-core"></div>
        <div class="ai-ring"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        
        let width, height;
        let inGame = false;
        let frames = 0;
        let selectedSlot = 1;

        // --- SISTEMA DE JUGADOR COMPLETO ---
        let player = {
            x: 0, z: 0, yaw: 0, pitch: 0,
            vX: 0, vZ: 0,
            bob: 0, bobSpeed: 0,
            health: 100, maxHealth: 100,
            stamina: 100,
            weaponAnim: 0,
            isAttacking: false
        };

        let currentWorld = {
            objects: [],
            weather: [],
            biome: 'neutral',
            colors: { fog: '#000', ground: '#050505', accent: '#00ffcc' },
            seed: Math.random() * 9999
        };

        const keys = {};

        function addLog(t) {
            const d = document.createElement('div');
            d.innerHTML = `<span style="color:var(--ai-color)">>></span> ${t}`;
            log.prepend(d);
            if(log.childNodes.length > 25) log.lastChild.remove();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.key >= 1 && e.key <= 3) selectSlot(parseInt(e.key));
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', () => { if(inGame) player.isAttacking = true; });
        resize();

        function selectSlot(n) {
            selectedSlot = n;
            document.querySelectorAll('.slot').forEach((s, i) => {
                s.classList.toggle('active', i === n-1);
            });
            addLog("Equipado: " + document.getElementById(`slot-${n}`).innerText);
        }

        // --- CLASE DE ENTIDADES MEJORADA ---
        class Entity {
            constructor(x, z, type, meta = {}) {
                this.x = x; this.z = z; this.type = type;
                this.meta = meta;
                this.id = Math.random();
                this.life = 100;
                this.state = 'idle';
                this.timer = Math.random() * 100;
            }

            update() {
                this.timer += 0.02;
                if(this.type === 'creature') {
                    // IA de merodeo
                    this.x += Math.sin(this.timer) * 1.5;
                    this.z += Math.cos(this.timer * 0.8) * 1.5;
                    
                    // Reacción al jugador
                    let dist = Math.hypot(this.x - player.x, this.z - player.z);
                    if(dist < 300) {
                        this.state = 'alert';
                        this.x += (this.x - player.x) * 0.02; // Huye del jugador
                        this.z += (this.z - player.z) * 0.02;
                    } else { this.state = 'idle'; }
                }
            }

            draw(scale, x2d, y2d) {
                let s = (this.meta.size || 40) * scale;
                let hover = Math.sin(this.timer * 4) * 15 * scale;

                if(this.type === 'creature') {
                    ctx.fillStyle = this.state === 'alert' ? '#ff4400' : '#ffffff';
                    // Cuerpo Segmentado
                    ctx.fillRect(x2d - s/2, y2d - s - hover, s, s*0.7);
                    // Piernas procedurales (4 patas)
                    ctx.strokeStyle = ctx.fillStyle;
                    ctx.lineWidth = 3 * scale;
                    for(let i=0; i<4; i++) {
                        let lx = x2d + (i < 2 ? -s/2.5 : s/2.5);
                        let move = Math.sin(this.timer * 10 + i) * 12 * scale;
                        ctx.beginPath();
                        ctx.moveTo(lx, y2d - s*0.3 - hover);
                        ctx.lineTo(lx + move, y2d - hover/2);
                        ctx.stroke();
                    }
                    // Ojos con "Glow"
                    ctx.fillStyle = currentWorld.colors.accent;
                    ctx.shadowBlur = 10 * scale;
                    ctx.fillRect(x2d - s/3, y2d - s*0.8 - hover, 6*scale, 6*scale);
                    ctx.fillRect(x2d + s/10, y2d - s*0.8 - hover, 6*scale, 6*scale);
                    ctx.shadowBlur = 0;
                } 
                else if (this.type === 'structure') {
                    // Edificio complejo
                    ctx.fillStyle = this.meta.color || '#111';
                    ctx.fillRect(x2d - s/2, y2d - s, s, s);
                    // Detalles (Antena)
                    ctx.strokeStyle = "#444";
                    ctx.beginPath();
                    ctx.moveTo(x2d, y2d - s);
                    ctx.lineTo(x2d, y2d - s - (s*0.5));
                    ctx.stroke();
                    // Luces de ventanas
                    ctx.fillStyle = frames % 60 < 30 ? currentWorld.colors.accent : "#000";
                    for(let i=0; i<3; i++) {
                        ctx.fillRect(x2d - s/4, y2d - s + (i*s/4) + 10, s/2, 2*scale);
                    }
                }
            }
        }

        // --- RENDERIZADO DE BRAZOS (FPS ULTRA) ---
        function drawFPSView() {
            const t = Date.now() * 0.004;
            player.bobSpeed = Math.hypot(player.vX, player.vZ) * 0.15;
            player.bob += player.bobSpeed;

            const bY = Math.sin(player.bob) * 12;
            const bX = Math.cos(player.bob * 0.5) * 8;
            const recoil = player.isAttacking ? Math.sin(player.weaponAnim * 10) * 30 : 0;

            ctx.save();
            ctx.shadowBlur = 35;
            ctx.shadowColor = "#000";

            // BRAZO IZQUIERDO
            drawCustomArm(width * 0.25 + bX, height + 80 - bY + recoil, true, t);
            
            // BRAZO DERECHO (Con arma según slot)
            drawCustomArm(width * 0.75 + bX, height + 80 - bY + recoil, false, t);

            if(player.isAttacking) {
                player.weaponAnim += 0.2;
                if(player.weaponAnim > Math.PI) { player.weaponAnim = 0; player.isAttacking = false; }
            }

            ctx.restore();
        }

        function drawCustomArm(x, y, isLeft, t) {
            let s = isLeft ? 1 : -1;
            
            // Manga Táctica
            ctx.fillStyle = "#0a0a0c";
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - 100*s, y - 450);
            ctx.lineTo(x + 140*s, y - 450);
            ctx.lineTo(x + 60*s, y);
            ctx.fill();

            // Guante
            ctx.fillStyle = "#1a1a1e";
            ctx.beginPath();
            ctx.roundRect(x + (isLeft ? -60 : -80), y - 480 + Math.sin(t)*3, 130, 90, 15);
            ctx.fill();

            // Detalles de Neón en brazos
            ctx.strokeStyle = currentWorld.colors.accent;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Reloj Holográfico (Solo Izquierda)
            if(isLeft) {
                ctx.fillStyle = "rgba(0, 255, 204, 0.2)";
                ctx.fillRect(x - 30, y - 440, 60, 30);
                ctx.fillStyle = "#fff";
                ctx.font = "8px Monospace";
                ctx.fillText("STAMINA", x - 25, y - 425);
                ctx.fillRect(x - 25, y - 420, 50 * (player.stamina/100), 3);
            }

            // Arma (Solo Derecha)
            if(!isLeft && selectedSlot === 3) {
                ctx.fillStyle = currentWorld.colors.accent;
                ctx.shadowBlur = 20;
                ctx.fillRect(x - 10, y - 650, 20, 200);
                ctx.shadowBlur = 0;
            }
        }

        // --- MOTOR DE MUNDO ---
        function generateSector(mode) {
            inGame = true;
            currentWorld.objects = [];
            currentWorld.weather = [];
            currentWorld.biome = mode;

            if(mode === 'TÉTRICO') {
                currentWorld.colors = { fog: '#0a0000', ground: '#020000', accent: '#ff0033' };
                addLog("ADVERTENCIA: Sector hostil cargado.");
                // Partículas de "Sangre/Ceniza"
                for(let i=0; i<150; i++) currentWorld.weather.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*3 + 1});
            } else {
                currentWorld.colors = { fog: '#00050a', ground: '#000205', accent: '#00ffcc' };
                addLog("Sector estelar calibrado correctamente.");
            }

            // Generación masiva
            for(let i=0; i<120; i++) {
                let type = Math.random() > 0.8 ? 'creature' : 'structure';
                let dist = 500 + Math.random() * 6000;
                let ang = Math.random() * Math.PI * 2;
                currentWorld.objects.push(new Entity(
                    Math.cos(ang)*dist, Math.sin(ang)*dist, 
                    type, 
                    { size: 50 + Math.random()*150, color: `hsl(${Math.random()*360}, 30%, 10%)` }
                ));
            }

            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('world-name').innerText = "SECTOR " + (Math.random()*1000).toFixed(0);
            document.getElementById('biome-label').innerText = "BIOMA: " + mode;
        }

        function update() {
            if(inGame) {
                const speed = keys['ShiftLeft'] ? 14 : 7;
                if(keys['KeyW']) { player.vX += Math.sin(player.yaw) * 1.1; player.vZ -= Math.cos(player.yaw) * 1.1; }
                if(keys['KeyS']) { player.vX -= Math.sin(player.yaw) * 1.1; player.vZ += Math.cos(player.yaw) * 1.1; }
                if(keys['KeyA']) player.yaw -= 0.055;
                if(keys['KeyD']) player.yaw += 0.055;

                player.x += player.vX; player.z += player.vZ;
                player.vX *= 0.84; player.vZ *= 0.84;

                currentWorld.objects.forEach(o => o.update());
                
                // Clima
                currentWorld.weather.forEach(p => {
                    p.y += p.s * 2;
                    if(p.y > height) p.y = -10;
                });
            }
            frames++;
        }

        function draw() {
            // Fondo / Cielo
            let grad = ctx.createLinearGradient(0,0,0,height);
            grad.addColorStop(0, '#000');
            grad.addColorStop(0.5, currentWorld.colors.fog);
            grad.addColorStop(1, currentWorld.colors.ground);
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,width,height);

            if(inGame) {
                // Raycasting / Proyección 3D
                let renderStack = currentWorld.objects.map(o => {
                    let dx = o.x - player.x, dz = o.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    return { o, rx, rz };
                }).filter(r => r.rz > 15).sort((a,b) => b.rz - a.rz);

                renderStack.forEach(r => {
                    let scale = 1200 / r.rz;
                    let x2d = r.rx * scale + width/2;
                    let y2d = height/2 + (50 * scale); // Offset de suelo
                    r.o.draw(scale, x2d, y2d);
                });

                // Render Clima
                ctx.fillStyle = currentWorld.colors.accent;
                currentWorld.weather.forEach(p => ctx.fillRect(p.x, p.y, 2, p.s * 4));

                drawFPSView();

                // Efecto Viñeta
                let v = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width*0.9);
                v.addColorStop(0, "transparent");
                v.addColorStop(1, "rgba(0,0,0,0.8)");
                ctx.fillStyle = v; ctx.fillRect(0,0,width,height);
            } else {
                // MENÚ SANTINO
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "30px Courier New";
                ctx.fillText("GENESIS ENGINE OVERLOAD", width/2, height/2 - 40);
                ctx.font = "15px Courier New";
                ctx.fillStyle = currentWorld.colors.accent;
                ctx.fillText("[W] INICIAR SIMULACIÓN ESTELAR | [T] MUNDO TÉTRICO", width/2, height/2 + 20);
                if(keys['KeyW']) generateSector('NORMAL');
                if(keys['KeyT']) generateSector('TÉTRICO');
            }

            update();
            requestAnimationFrame(draw);
        }

        // IA Lumina Intro
        setTimeout(() => {
            const lumina = document.getElementById('lumina-container');
            const msg = document.getElementById('ai-msg');
            lumina.classList.add('visible');
            msg.innerText = "SANTINO: El motor ha superado los límites de renderizado. He añadido IA a las criaturas y un sistema de armas holográficas. ¡Cuidado con el bioma tétrico!";
            setTimeout(() => lumina.classList.remove('visible'), 7000);
        }, 1500);

        draw();
    </script>
</body>
</html>
