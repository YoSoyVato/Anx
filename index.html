<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V8.5 (AI IMAGINATION)</title>
    <style>
        :root { --accent: #008cff; --bg: #000103; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,5,15,0.9); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); width: 280px; pointer-events: none; }
        #ai-log { height: 90px; overflow-y: auto; font-size: 0.7rem; margin-top: 5px; color: #7af; scrollbar-width: none; }

        #game-hud { position: fixed; top: 20px; left: 20px; display: none; background: rgba(0,0,0,0.8); padding: 20px; border-left: 5px solid var(--ai-color); z-index: 1000; }
        #menu-hint { position: fixed; width: 100%; text-align: center; top: 10%; font-size: 1rem; color: var(--ai-color); text-shadow: 0 0 10px var(--ai-color); pointer-events: none; }

        #lumina-container { position: fixed; bottom: -350px; right: 50px; width: 140px; height: 220px; z-index: 1000; transition: 1s; }
        #lumina-container.visible { bottom: 40px; }
        .ai-core { width: 40px; height: 40px; background: #fff; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 30px var(--ai-color); }
        
        /* Efecto de miedo */
        .scary-flash { animation: scary 0.15s infinite; }
        @keyframes scary { 0% { opacity: 1; } 50% { opacity: 0.8; filter: grayscale(1) contrast(2); } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div style="color:var(--ai-color); font-weight:bold;">GENESIS_V8.5_AI</div>
        <div id="ai-log">Iniciando redes neuronales...</div>
    </div>

    <div id="game-hud">
        <b id="world-name">SYNCING...</b><br>
        <small>PULSA [ESC] PARA SALIR</small>
    </div>

    <div id="menu-hint">SANTINO, ELIGE UNA DIMENSIÓN GENERADA POR IA</div>

    <div id="lumina-container">
        <div style="position: absolute; top: -80px; right: -20px; background: white; color: black; padding: 12px; border-radius: 10px; font-size: 0.75rem; width: 200px; font-weight: bold;" id="ai-msg"></div>
        <div class="ai-core"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        
        let width, height, inGame = false, frames = 0;
        let portals = [];
        let stars = [];

        let player = { x: 0, z: 0, yaw: 0 };
        let currentWorld = { mode: '', entities: [], animals: [], colors: {}, isScary: false };
        const keys = {};

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `> ${msg}`;
            log.prepend(div);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Escape') {
                inGame = false;
                document.body.classList.remove('scary-flash');
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        
        window.addEventListener('mousedown', (e) => { 
            if(!inGame) portals.forEach(p => { if(p.hovered) initWorld(p); });
        });

        resize();
        for(let i=0; i<200; i++) stars.push({x: Math.random()*2000 - 1000, y: Math.random()*2000 - 1000, z: Math.random()*2000});

        // IA INVENTANDO NOMBRES
        function generateAIName() {
            const pre = ["ASTRA", "VOID", "KRONOS", "NEO", "CYBER", "ZETA", "PHANTOM", "GLITCH"];
            const post = ["-THETA", " CORE", " PRIME", " NEXUS", " ZERO", "-99", " SHADOW", " ALPHA"];
            return pre[Math.floor(Math.random()*pre.length)] + post[Math.floor(Math.random()*post.length)];
        }

        function autoSpawn() {
            const colors = ['#00f2ff', '#ff0033', '#ffcc00', '#a200ff'];
            for(let i=0; i<4; i++) {
                let angle = (i / 4) * Math.PI * 2;
                let worldName = generateAIName();
                portals.push({
                    x: Math.cos(angle) * 800,
                    z: Math.sin(angle) * 800 + 1000,
                    label: worldName,
                    color: colors[i],
                    isScary: colors[i] === '#ff0033', // El rojo siempre da miedo
                    hovered: false
                });
            }
            addLog("Mundos aleatorios generados.");
        }

        class Structure {
            constructor(x, z, color) {
                this.x = x; this.z = z; this.color = color;
                this.h = 200 + Math.random() * 500;
                this.w = 50;
            }
            draw(scale, x2d, y2d) {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2 * scale;
                ctx.strokeRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
            }
        }

        class Animal {
            constructor(x, z, color, scary) {
                this.x = x; this.z = z; this.color = color; this.scary = scary;
                this.seed = Math.random() * 100;
                this.angle = Math.random() * Math.PI * 2;
            }
            update() {
                if(!this.scary) {
                    this.x += Math.cos(this.angle) * 2;
                    this.z += Math.sin(this.angle) * 2;
                    if(Math.random() > 0.98) this.angle = Math.random() * Math.PI * 2;
                }
            }
            draw(scale, x2d, y2d) {
                let jump = this.scary ? 0 : Math.abs(Math.sin(frames*0.1 + this.seed)) * 30 * scale;
                ctx.fillStyle = this.scary ? "red" : this.color;
                ctx.beginPath();
                ctx.arc(x2d, y2d - 20*scale - jump, 15*scale, 0, Math.PI*2); // Cuerpo
                ctx.fill();
                // Ojos
                ctx.fillStyle = "black";
                ctx.fillRect(x2d - 8*scale, y2d - 25*scale - jump, 4*scale, 4*scale);
                ctx.fillRect(x2d + 4*scale, y2d - 25*scale - jump, 4*scale, 4*scale);
            }
        }

        function initWorld(p) {
            inGame = true;
            currentWorld.mode = p.label;
            currentWorld.entities = [];
            currentWorld.animals = [];
            currentWorld.isScary = p.isScary;
            currentWorld.colors = { bg: p.isScary ? '#050000' : '#000', accent: p.color };
            
            if(p.isScary) document.body.classList.add('scary-flash');

            for(let i=0; i<40; i++) {
                let a = Math.random()*Math.PI*2, d = 800+Math.random()*3000;
                currentWorld.entities.push(new Structure(Math.cos(a)*d, Math.sin(a)*d, p.color));
                currentWorld.animals.push(new Animal(Math.cos(a)*(d+200), Math.sin(a)*(d+200), p.color, p.isScary));
            }
            
            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('world-name').innerText = p.label;
            document.getElementById('world-name').style.color = p.color;
            addLog("Entrando a: " + p.label);
        }

        function draw() {
            ctx.fillStyle = inGame ? currentWorld.colors.bg : "#000103";
            ctx.fillRect(0,0,width,height);

            if(inGame) {
                let speed = 20;
                if(keys['KeyW']) { player.x += Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
                if(keys['KeyS']) { player.x -= Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
                if(keys['KeyA']) player.yaw -= 0.05;
                if(keys['KeyD']) player.yaw += 0.05;

                // Dibujar animales y estructuras
                [...currentWorld.entities, ...currentWorld.animals].forEach(e => {
                    if(e.update) e.update();
                    let dx = e.x - player.x, dz = e.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    if(rz > 50) {
                        let s = 800 / rz;
                        e.draw(s, rx * s + width/2, height/2 + 200*s);
                    }
                });
            } else {
                document.getElementById('game-hud').style.display = 'none';
                stars.forEach(s => {
                    let x = s.x / (s.z/1000) + width/2;
                    let y = s.y / (s.z/1000) + height/2;
                    ctx.fillStyle = "white";
                    if(s.z > 10) ctx.fillRect(x, y, 1, 1);
                    s.z -= 1; if(s.z < 1) s.z = 2000;
                });

                portals.forEach(p => {
                    let dx = p.x - player.x, dz = p.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    if(rz > 50) {
                        let s = 1000 / rz; let x = rx * s + width/2; let y = height/2;
                        let dist = Math.hypot(width/2 - x, height/2 - y);
                        p.hovered = dist < 100 * s;
                        ctx.shadowBlur = p.hovered ? 50 : 20;
                        ctx.shadowColor = p.color;
                        ctx.fillStyle = p.hovered ? "white" : p.color;
                        ctx.beginPath(); ctx.arc(x, y, (p.hovered ? 70 : 60)*s, 0, Math.PI*2); ctx.fill();
                        ctx.shadowBlur = 0; ctx.fillStyle = "white";
                        ctx.font = `${20*s}px Courier`;
                        ctx.fillText(p.label, x - 50*s, y + 100*s);
                    }
                });
                if(keys['KeyA']) player.yaw -= 0.02;
                if(keys['KeyD']) player.yaw += 0.02;
            }
            frames++;
            requestAnimationFrame(draw);
        }

        setTimeout(() => {
            autoSpawn();
            const container = document.getElementById('lumina-container');
            container.classList.add('visible');
            document.getElementById('ai-msg').innerText = "SANTINO, he imaginado mundos nuevos para ti. Ten cuidado con el portal rojo... detecto anomalías de terror ahí.";
        }, 800);

        draw();
    </script>
</body>
</html>
