<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Network</title>
    <style>
        :root {
            --accent: #008cff;
            --accent-glow: rgba(0, 140, 255, 0.4);
            --bg: #020202;
            --glass: rgba(10, 10, 10, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* FONDO ANIMADO PRO */
        .bg-animate {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #001529 0%, #020202 100%);
            z-index: -2;
        }

        .bg-mesh {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 140, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 140, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        /* LOGO ANX */
        .logo {
            font-size: clamp(4rem, 15vw, 7rem);
            font-weight: 900;
            letter-spacing: -5px;
            color: #fff;
            margin: 0;
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        .logo span {
            color: var(--accent);
        }

        .welcome-text {
            font-size: 1rem;
            color: #aaa;
            margin-top: -10px;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 300;
        }

        /* BOTONES APP PRO */
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 16px 35px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-outline {
            color: #fff;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(5px);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        /* MODAL GLASSMORPISM */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: var(--glass);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
        }

        .btn-block { width: 100%; margin-top: 15px; border: none; }

        .fade-in { animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div class="bg-mesh"></div>

    <div class="container fade-in">
        <h1 class="logo">AN<span>X</span></h1>
        <p class="welcome-text">Bienvenido al anexo</p>
        
        <div class="btn-group">
            <a href="#" class="btn btn-outline" onclick="alert('Iniciando exploración...')">Explorar</a>
            <a href="#" class="btn btn-primary" onclick="toggleModal(true)">Entrar</a>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeOutside(event)">
        <div class="modal-box fade-in">
            <h2 id="mTitle" style="margin-top:0; font-weight: 800; letter-spacing: -1px;">ACCESO</h2>
            <input type="email" id="email" placeholder="Usuario o Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn btn-primary btn-block" onclick="authAction()">Conectar</button>
            <p id="mSwitch" style="font-size:0.75rem; color:#666; margin-top:25px; cursor:pointer; text-align:center" onclick="switchMode()">
                ¿Nuevo aquí? <span style="color:var(--accent)">Crea una identidad</span>
            </p>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        let isLogin = true;

        function toggleModal(show) {
            modal.style.display = show ? 'flex' : 'none';
        }

        function closeOutside(e) {
            if(e.target === modal) toggleModal(false);
        }

        function switchMode() {
            isLogin = !isLogin;
            document.getElementById('mTitle').innerText = isLogin ? 'ACCESO' : 'REGISTRO';
            document.getElementById('mSwitch').innerHTML = isLogin ? 
                '¿Nuevo aquí? <span style="color:var(--accent)">Crea una identidad</span>' : 
                '¿Ya tienes identidad? <span style="color:var(--accent)">Conéctate</span>';
        }

        function authAction() {
            const mail = document.getElementById('email').value;
            if(!mail) return alert("Identificación requerida");
            alert(isLogin ? "Sincronizando con el anexo..." : "Identidad creada en la red ANX.");
            toggleModal(false);
        }
    </script>

</body>
</html>
