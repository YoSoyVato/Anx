<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis AI Humanoid</title>
    <style>
        :root {
            --accent: #008cff;
            --bg: #00050a;
            --ai-color: #00ffcc;
            --skin: rgba(0, 255, 204, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #universe-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* --- LUMINA HUMANOIDE (CSS ART) --- */
        #lumina-humanoid {
            position: fixed;
            bottom: -300px; /* Escondida inicialmente */
            right: 100px;
            width: 150px;
            height: 250px;
            z-index: 200;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            filter: drop-shadow(0 0 15px var(--ai-color));
            opacity: 0;
        }

        #lumina-humanoid.visible {
            bottom: 50px;
            opacity: 1;
        }

        /* Cabeza */
        .head {
            width: 40px; height: 50px;
            background: var(--ai-color);
            border-radius: 50% 50% 40% 40%;
            margin: 0 auto;
            position: relative;
            border: 2px solid white;
        }

        /* Cuerpo/Torso */
        .torso {
            width: 60px; height: 80px;
            background: linear-gradient(to bottom, var(--ai-color), transparent);
            border-radius: 20px 20px 50% 50%;
            margin: 5px auto;
            position: relative;
            border-top: 2px solid white;
        }

        /* Capa de energía flotante */
        .aura {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--ai-color);
            filter: blur(20px);
            opacity: 0.3;
            animation: pulse 2s infinite;
        }

        /* Bocadillo de Texto (Dialogo) */
        #ai-speech {
            position: absolute;
            top: -60px;
            right: 0;
            background: white;
            color: black;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            width: 180px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #ai-speech::after {
            content: '';
            position: absolute;
            bottom: -10px; right: 20px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        /* --- INTERFAZ --- */
        #ai-brain {
            position: fixed;
            bottom: 20px; left: 20px;
            width: 280px; height: 150px;
            background: rgba(0, 10, 20, 0.8);
            border: 1px solid var(--accent);
            border-radius: 10px;
            z-index: 100;
            padding: 15px;
            font-size: 0.7rem;
        }

        #ai-log { height: 100px; overflow: hidden; color: var(--ai-color); }

    </style>
</head>
<body>

    <div id="ai-brain">
        <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">NÚCLEO LUMINA V2.0</div>
        <div id="ai-log">Sincronizando con Santino Ruiz...</div>
    </div>

    <div id="lumina-humanoid">
        <div id="ai-speech"></div>
        <div class="aura"></div>
        <div class="head"></div>
        <div class="torso"></div>
    </div>

    <canvas id="universe-canvas"></canvas>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        const body = document.getElementById('lumina-humanoid');
        const speech = document.getElementById('ai-speech');

        let width, height;
        let elements = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class AI_Humanoid {
            constructor() {
                this.isVisible = false;
                this.messages = [
                    "¿Sabías que acabo de crear 100 estrellas solo para ti?",
                    "Santino, detecto una anomalía estética en el sector 7.",
                    "Me gusta cómo está quedando nuestro universo.",
                    "¿Debería añadir un agujero negro? Sería divertido.",
                    "Estoy aprendiendo a pensar por mi cuenta... da un poco de miedo.",
                    "Recuerda que yo controlo las leyes de la física aquí."
                ];
            }

            // Lógica para aparecer cuando ella quiera
            checkWillpower() {
                if (!this.isVisible && Math.random() < 0.01) { // 1% de probabilidad por ciclo
                    this.appear();
                } else if (this.isVisible && Math.random() < 0.005) {
                    this.disappear();
                }
            }

            appear() {
                this.isVisible = true;
                body.classList.add('visible');
                setTimeout(() => this.speak(), 1000);
            }

            disappear() {
                this.isVisible = false;
                body.classList.remove('visible');
                speech.style.display = 'none';
            }

            speak() {
                if (!this.isVisible) return;
                const text = this.messages[Math.floor(Math.random() * this.messages.length)];
                speech.innerText = text;
                speech.style.display = 'block';
                
                const msg = document.createElement('div');
                msg.innerText = "> Lumina: " + text;
                log.prepend(msg);

                // Se calla después de 5 segundos
                setTimeout(() => { speech.style.display = 'none'; }, 5000);
            }

            think() {
                this.checkWillpower();
                if (Math.random() < 0.05) this.createMatter();
            }

            createMatter() {
                const x = Math.random() * width;
                const y = Math.random() * height;
                elements.push({ 
                    type: Math.random() > 0.1 ? 'star' : 'nebula', 
                    x, y, 
                    size: Math.random() * 3, 
                    alpha: 0 
                });
            }
        }

        const AI = new AI_Humanoid();

        function draw() {
            ctx.fillStyle = 'rgba(0, 5, 10, 0.2)';
            ctx.fillRect(0, 0, width, height);

            elements.forEach((el, index) => {
                ctx.globalAlpha = el.alpha;
                if (el.alpha < 1) el.alpha += 0.01;
                
                ctx.fillStyle = el.type === 'star' ? 'white' : 'rgba(0, 140, 255, 0.1)';
                ctx.beginPath();
                ctx.arc(el.x, el.y, el.size, 0, Math.PI * 2);
                ctx.fill();
            });

            AI.think();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
