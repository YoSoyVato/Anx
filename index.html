<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V11 (PULISHED WORLD)</title>
    <style>
        :root { --accent: #008cff; --bg: #000103; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,5,15,0.9); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); width: 280px; pointer-events: none; }
        #ai-log { height: 90px; overflow-y: auto; font-size: 0.7rem; margin-top: 5px; color: #7af; scrollbar-width: none; }

        #lumina-container { position: fixed; bottom: 40px; right: 50px; width: 140px; height: 220px; z-index: 1000; opacity: 0; transition: 1s; }
        #lumina-container.visible { opacity: 1; }
        .ai-core { width: 40px; height: 40px; background: #fff; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 30px var(--ai-color); }
        
        #reset-msg { position: fixed; top: 20px; width: 100%; text-align: center; color: var(--ai-color); font-size: 0.8rem; letter-spacing: 2px; text-shadow: 0 0 10px black; }
        #world-info { position: fixed; top: 50px; width: 100%; text-align: center; font-size: 1.2rem; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div id="reset-msg">PULSA [ESC] PARA REGENERAR EL MULTIVERSO | W,A,S,D PARA MOVERTE</div>
    <div id="world-info"></div>
    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div style="color:var(--ai-color); font-weight:bold;">GENESIS_V11_CORE</div>
        <div id="ai-log">Conectando con el tejido de la realidad...</div>
    </div>

    <div id="lumina-container">
        <div style="position: absolute; top: -80px; right: -20px; background: white; color: black; padding: 12px; border-radius: 10px; font-size: 0.75rem; width: 200px; font-weight: bold;" id="ai-msg"></div>
        <div class="ai-core"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        
        let width, height, frames = 0;
        let player = { x: 0, z: 1000, yaw: 0, targetYaw: 0, isMoving: false };
        let world = { entities: [], animals: [], grass: [], water: [], time: 0, theme: {}, dayIntensity: 0 };
        const keys = {};

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `> ${msg}`;
            log.prepend(div);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Escape') generateNewWorld();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- CLASES MEJORADAS ---

        class Grass {
            constructor(x, z) {
                this.x = x; this.z = z;
                this.h = 15 + Math.random() * 20;
                this.tilt = Math.random() * 5;
            }
            draw(scale, x2d, y2d, brightness) {
                let sway = Math.sin(frames * 0.05 + this.x) * 5 * scale;
                ctx.strokeStyle = world.theme.accent;
                ctx.lineWidth = 1 * scale;
                ctx.beginPath();
                ctx.moveTo(x2d, y2d);
                ctx.quadraticCurveTo(x2d + sway, y2d - this.h*scale/2, x2d + sway*1.5, y2d - this.h*scale);
                ctx.globalAlpha = brightness;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        class WaterBlock {
            constructor(x, z) {
                this.x = x; this.z = z;
                this.size = 300;
            }
            draw(scale, x2d, y2d, brightness) {
                let wave = Math.sin(frames * 0.03 + this.x) * 10 * scale;
                ctx.fillStyle = world.theme.accent;
                ctx.globalAlpha = 0.2 * brightness;
                ctx.fillRect(x2d - (this.size*scale)/2, y2d + wave, this.size*scale, 100*scale);
                ctx.globalAlpha = 1;
            }
        }

        class Structure {
            constructor(x, z, type) {
                this.x = x; this.z = z;
                this.type = type; // 'tower', 'cube', 'monolith'
                this.h = type === 'tower' ? 800 + Math.random()*1000 : 200 + Math.random()*400;
                this.w = type === 'tower' ? 60 : 150;
                this.color = world.theme.accent;
            }
            draw(scale, x2d, y2d, brightness) {
                ctx.globalAlpha = brightness;
                ctx.strokeStyle = this.color; ctx.lineWidth = 2 * scale;
                ctx.strokeRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.fillStyle = this.color; ctx.globalAlpha = 0.1 * brightness;
                ctx.fillRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.globalAlpha = 1;
            }
        }

        class Animal {
            constructor(x, z) {
                this.x = x; this.z = z;
                this.angle = Math.random() * Math.PI * 2;
                this.legCycle = 0;
            }
            update() {
                this.x += Math.cos(this.angle) * 3;
                this.z += Math.sin(this.angle) * 3;
                this.legCycle += 0.2;
                if(Math.random() > 0.98) this.angle = Math.random() * Math.PI * 2;
            }
            draw(scale, x2d, y2d) {
                let s = 30 * scale;
                let walk = Math.sin(this.legCycle) * 8 * scale;
                ctx.fillStyle = world.theme.accent;
                ctx.fillRect(x2d - s/2, y2d - s, s, s/1.5);
                ctx.strokeStyle = "white"; ctx.beginPath();
                ctx.moveTo(x2d-s/4, y2d-s/3); ctx.lineTo(x2d-s/4-walk, y2d);
                ctx.moveTo(x2d+s/4, y2d-s/3); ctx.lineTo(x2d+s/4+walk, y2d);
                ctx.stroke();
            }
        }

        function generateNewWorld() {
            addLog("RECALIBRANDO CONSTANTES UNIVERSALES...");
            world.entities = []; world.animals = []; world.grass = []; world.water = [];
            player.x = 0; player.z = 1000;
            
            const hue = Math.random() * 360;
            const type = Math.random(); // Decidir bioma

            world.theme = {
                sky: `hsl(${hue}, 60%, 10%)`,
                horizon: `hsl(${hue}, 100%, 50%)`,
                accent: `hsl(${hue}, 100%, 50%)`,
                name: ["Océano de Neón", "Bosque de Datos", "Valle del Silicio", "Abismo Código", "Ruinas de Santino"][Math.floor(Math.random()*5)]
            };

            document.getElementById('world-info').innerText = world.theme.name;
            document.getElementById('world-info').style.color = world.theme.accent;

            // Población del mundo
            for(let i=0; i<300; i++) {
                let x = (Math.random()-0.5) * 20000;
                let z = (Math.random()-0.5) * 20000;
                
                if (type < 0.4) { // Bioma de Estructuras
                    if(i < 50) world.entities.push(new Structure(x, z, 'tower'));
                } else if (type < 0.7) { // Bioma de "Césped"
                    world.grass.push(new Grass(x, z));
                } else { // Bioma de Agua/Datos
                    if(i < 40) world.water.push(new WaterBlock(x, z));
                }
                
                if(i < 20) world.animals.push(new Animal(x, z));
            }

            addLog("MUNDO GENERADO: " + world.theme.name);
        }

        function draw() {
            // CICLO DÍA/NOCHE (basado en frames)
            world.time = (frames % 2000) / 2000;
            world.dayIntensity = Math.max(0.1, Math.sin(world.time * Math.PI));
            
            // Cielo dinámico
            let grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, "#000");
            grad.addColorStop(1, world.theme.sky);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            // MOVIMIENTO
            player.isMoving = keys['KeyW'] || keys['KeyS'];
            let speed = 50;
            if(keys['KeyW']) { player.x += Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
            if(keys['KeyS']) { player.x -= Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
            if(keys['KeyA']) player.targetYaw -= 0.06;
            if(keys['KeyD']) player.targetYaw += 0.06;
            player.yaw += (player.targetYaw - player.yaw) * 0.1;

            // Renderizado de objetos (Sorting por profundidad Z)
            let allObjs = [...world.entities, ...world.animals, ...world.grass, ...world.water]
                .map(obj => {
                    let dx = obj.x - player.x, dz = obj.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    return { obj, rx, rz };
                })
                .filter(o => o.rz > 50)
                .sort((a, b) => b.rz - a.rz);

            allObjs.forEach(item => {
                let s = 1000 / item.rz;
                let x2d = item.rx * s + width / 2;
                let y2d = height / 2 + 300 * s;
                if(item.obj.update) item.obj.update();
                item.obj.draw(s, x2d, y2d, world.dayIntensity);
            });

            // HUD / BRAZOS
            let bob = Math.sin(frames * 0.2) * (player.isMoving ? 20 : 5);
            ctx.strokeStyle = world.theme.accent; ctx.lineWidth = 4;
            ctx.strokeRect(width*0.1, height-100+bob, 100, 200);
            ctx.strokeRect(width*0.85, height-100+bob, 100, 200);

            frames++;
            requestAnimationFrame(draw);
        }

        resize();
        generateNewWorld();
        draw();
    </script>
</body>
</html>
