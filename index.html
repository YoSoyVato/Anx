<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Social HD-2D Profesional</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0f19; user-select: none; }
        canvas { display: block; }
        #interface {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #f0f3f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(11, 15, 25, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #bloqueo-pantalla {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            color: white;
            font-family: sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="bloqueo-pantalla">
        Haga clic en la pantalla para activar la cámara libre con el ratón
    </div>

    <div id="interface">
        <strong style="color: #4cc9f0; font-size: 1.1rem;">PROTOTIPO HD-2D ENGINE</strong><br><br>
        • <strong>Click Izquierdo:</strong> Capturar Ratón y Mirar<br>
        • <strong>Moverse:</strong> W, A, S, D (Relativo a la Cámara)<br>
        • <strong>Render:</strong> Sprite Fiel a Referencia con Animación
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. CONFIGURACIÓN DEL ESPACIO RENDER
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xbde0fe); 
        scene.fog = new THREE.FogExp2(0xbde0fe, 0.015);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 2. ILUMINACIÓN CINEMÁTICA
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        sunLight.position.set(60, 100, 40);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);

        // 3. GENERACIÓN DEL MAPA CON RELIEVES SUAVES Y MÚLTIPLES LAGOS
        const tamañoMundo = 200;
        const segmentos = 100;
        const terrainGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo, segmentos, segmentos);
        
        function obtenerAlturaTerreno(x, z) {
            // Relieve sutil y pequeñas colinas caminables (frecuencia más baja y menos amplitud)
            let y = Math.sin(x * 0.04) * Math.cos(z * 0.04) * 2.5;
            
            // Frecuencia secundaria para crear cuencas orgánicas de múltiples lagos
            let cuencasLagos = Math.sin(x * 0.07 + 2) * Math.sin(z * 0.06 * z * 0.01) * 3.5;
            y += cuencasLagos;

            // Micro-relieve para imperfecciones naturales de la tierra
            y += Math.sin(x * 0.2) * Math.cos(z * 0.2) * 0.3;

            // Nivelación del fondo del agua para que los lagos sean planos y caminables en las orillas
            if (y < -2.5) y = -2.5 + (y + 2.5) * 0.15; 
            return y;
        }

        const pos = terrainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            pos.setZ(i, obtenerAlturaTerreno(x, y));
        }
        terrainGeo.computeVertexNormals();
        terrainGeo.rotateX(-Math.PI / 2);

        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x7da453, 
            roughness: 0.9,
            flatShading: true 
        });
        const terreno = new THREE.Mesh(terrainGeo, terrainMat);
        terreno.receiveShadow = true;
        scene.add(terreno);

        // Sistema de Lagos (Capa de agua uniforme que inunda las cuencas bajas a la altura justa)
        const waterGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo);
        const waterMat = new THREE.MeshStandardMaterial({ 
            color: 0x22577a, 
            transparent: true, 
            opacity: 0.75,
            roughness: 0.1,
            metalness: 0.1
        });
        const aguaSuelo = new THREE.Mesh(waterGeo, waterMat);
        aguaSuelo.rotation.x = -Math.PI / 2;
        aguaSuelo.position.y = -1.2; // Genera varios lagos en zonas donde el relieve baje de este nivel
        scene.add(aguaSuelo);

        // 4. ENTIDADES DEL MUNDO (ÁRBOLES REDUCIDOS Y CASITAS)
        const crearArbolEstilizado = (x, z, h) => {
            const grupo = new THREE.Group();
            const tronco = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12, 0.25, 2, 5),
                new THREE.MeshStandardMaterial({ color: 0x4a3525, roughness: 0.9 })
            );
            tronco.position.y = 1;
            tronco.castShadow = true;
            grupo.add(tronco);

            const copa = new THREE.Mesh(
                new THREE.ConeGeometry(1.2, 2.5, 5),
                new THREE.MeshStandardMaterial({ color: 0x386641, flatShading: true })
            );
            copa.position.y = 2.5;
            copa.castShadow = true;
            grupo.add(copa);

            grupo.position.set(x, h, z);
            scene.add(grupo);
        };

        const crearCasita = (x, z, h) => {
            const casa = new THREE.Group();
            
            // Base/Estructura de la casa
            const baseGeo = new THREE.BoxGeometry(3, 2.5, 3);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0xf4f1de, roughness: 0.8, flatShading: true });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 1.25;
            base.castShadow = true;
            base.receiveShadow = true;
            casa.add(base);

            // Techo de la casa con caída a dos aguas
            const techoGeo = new THREE.ConeGeometry(2.5, 1.8, 4);
            const techoMat = new THREE.MeshStandardMaterial({ color: 0xe07a5f, roughness: 0.7, flatShading: true });
            const techo = new THREE.Mesh(techoGeo, techoMat);
            techo.position.y = 2.5 + 0.5;
            techo.rotation.y = Math.PI / 4; // Rotar para que encaje alineado al cubo
            techo.castShadow = true;
            casa.add(techo);

            // Pequeña puerta oscura decorativa
            const puertaGeo = new THREE.PlaneGeometry(0.7, 1.3);
            const puertaMat = new THREE.MeshStandardMaterial({ color: 0x3d1a04 });
            const puerta = new THREE.Mesh(puertaGeo, puertaMat);
            puerta.position.set(0, 0.65, 1.51); // Justo al frente de la pared
            casa.add(puerta);

            casa.position.set(x, h, z);
            scene.add(casa);
        };

        // Distribución del decorado del mapa
        for (let i = 0; i < 60; i++) { // Cantidad de árboles reducida a la mitad
            const x = (Math.random() - 0.5) * 120;
            const z = (Math.random() - 0.5) * 120;
            const h = obtenerAlturaTerreno(x, z);
            if (h > -0.8) crearArbolEstilizado(x, z, h);
        }

        for (let i = 0; i < 12; i++) { // Generar pequeñas casitas en zonas elevadas secas
            const x = (Math.random() - 0.5) * 100;
            const z = (Math.random() - 0.5) * 100;
            const h = obtenerAlturaTerreno(x, z);
            // Evitar construir directamente dentro o muy cerca de los lagos
            if (h > 0.5 && (Math.abs(x) > 8 || Math.abs(z) > 8)) {
                crearCasita(x, z, h);
            }
        }

        // 5. GENERADOR ARTÍSTICO FIEL A TU IMAGEN REFE (Pixel-Art con Sombras)
        function crearSpritesheetFiel() {
            const canvas = document.createElement('canvas');
            canvas.width = 192; // 3 cuadros de 64x128 píxeles
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;

            function dibujarCuadroPersonaje(offsetX, estado) {
                // Paleta exacta de tu imagen
                const colorPiel = '#eab295';
                const colorSombraPiel = '#cf9174';
                const colorContorno = '#181216';

                // --- 1. CABEZA CÚBICA CON SOMBREADO ---
                // Base contorno de la cabeza
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 14, 16, 36, 36);
                
                // Fondo base piel de la cabeza
                ctx.fillStyle = colorPiel;
                ctx.fillRect(offsetX + 16, 18, 32, 32);

                // Sombra de volumen del lado izquierdo y parte baja (como en tu foto)
                ctx.fillStyle = colorSombraPiel;
                ctx.fillRect(offsetX + 16, 18, 6, 32);  // Lado izquierdo sombreado
                ctx.fillRect(offsetX + 16, 44, 32, 6);   // Barbilla baja sombreada

                // Oreja izquierda (baja y sombreada)
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 10, 32, 6, 12);
                ctx.fillStyle = colorSombraPiel;
                ctx.fillRect(offsetX + 12, 34, 4, 8);

                // Rostro: Ojos, Cejas y Expresión Neutra
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 25, 28, 4, 6);  // Ojo izquierdo
                ctx.fillRect(offsetX + 37, 28, 4, 6);  // Ojo derecho
                ctx.fillRect(offsetX + 24, 24, 6, 2);  // Ceja izquierda
                ctx.fillRect(offsetX + 36, 24, 6, 2);  // Ceja derecha
                ctx.fillRect(offsetX + 30, 38, 8, 2);  // Boca plana exacta

                // --- 2. CUERPO HUMANOIDE ---
                // Cuello contorno y relleno
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 24, 52, 16, 4);

                // Contorno del torso entero
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 18, 56, 28, 40);

                // Relleno de piel del Torso
                ctx.fillStyle = colorPiel;
                ctx.fillRect(offsetX + 20, 58, 24, 36);
                
                // Sombra del lado izquierdo del torso
                ctx.fillStyle = colorSombraPiel;
                ctx.fillRect(offsetX + 20, 58, 6, 36);

                // Brazos pegados al cuerpo
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 14, 60, 5, 24); // Brazo izq contorno
                ctx.fillRect(offsetX + 45, 60, 5, 24); // Brazo der contorno
                ctx.fillStyle = colorSombraPiel;
                ctx.fillRect(offsetX + 15, 61, 3, 22); // Brazo izq relleno (sombra)
                ctx.fillStyle = colorPiel;
                ctx.fillRect(offsetX + 46, 61, 3, 22); // Brazo der relleno

                // --- 3. PIERNAS CON CICLO DE CAMINAR ---
                let izqOffsety = 0;
                let derOffsety = 0;

                if (estado === 'paso1') { izqOffsety = -4; }
                if (estado === 'paso2') { derOffsety = -4; }

                // Pierna Izquierda
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 21, 96 + izqOffsety, 8, 22);
                ctx.fillStyle = colorSombraPiel; // Pierna izquierda va al fondo en sombra
                ctx.fillRect(offsetX + 23, 98 + izqOffsety, 4, 18);

                // Pierna Derecha
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 35, 96 + derOffsety, 8, 22);
                ctx.fillStyle = colorPiel;
                ctx.fillRect(offsetX + 37, 98 + derOffsety, 4, 18);
            }

            // Renderizar los tres estados en la tira horizontal de la textura
            dibujarCuadroPersonaje(0, 'idle');
            dibujarCuadroPersonaje(64, 'paso1');
            dibujarCuadroPersonaje(128, 'paso2');

            return new THREE.CanvasTexture(canvas);
        }

        // Carga y mapeo UV del sprite unificado
        const spritesheetTexture = crearSpritesheetFiel();
        spritesheetTexture.magFilter = THREE.NearestFilter;
        spritesheetTexture.minFilter = THREE.NearestFilter;
        spritesheetTexture.repeat.set(1/3, 1); // Encuadrar sólo un frame de 64 píxeles

        const spriteMat = new THREE.SpriteMaterial({ map: spritesheetTexture, transparent: true });
        const jugadorSprite = new THREE.Sprite(spriteMat);
        jugadorSprite.scale.set(2, 4, 1);

        const jugadorNode = new THREE.Group();
        jugadorNode.position.set(0, 4, 0);
        jugadorNode.add(jugadorSprite);
        scene.add(jugadorNode);

        // 6. CONTROLADORES DE ENTRADA Y POINTER LOCK
        const teclas = { w: false, a: false, s: false, d: false };
        let mouseCamara = { horizontal: 0, vertical: 0.25 };

        const divBloqueo = document.getElementById('bloqueo-pantalla');
        
        window.addEventListener('click', () => { document.body.requestPointerLock(); });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                divBloqueo.style.opacity = '0';
                divBloqueo.style.pointerEvents = 'none';
            } else {
                divBloqueo.style.opacity = '1';
                divBloqueo.style.pointerEvents = 'auto';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                mouseCamara.horizontal -= e.movementX * 0.0035;
                mouseCamara.vertical -= e.movementY * 0.0035;
                mouseCamara.vertical = Math.max(0.05, Math.min(Math.PI / 2.6, mouseCamara.vertical));
            }
        });

        window.addEventListener('keydown', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false; });

        const velocidad = 0.2;
        let cronometroAnim = 0;

        // 7. BUCLE DINÁMICO DE RENDER
        function animate() {
            requestAnimationFrame(animate);

            let vectorDireccion = new THREE.Vector3();
            let camaraFrente = new THREE.Vector3();
            let camaraDerecha = new THREE.Vector3();

            camera.getWorldDirection(camaraFrente);
            camaraFrente.y = 0;
            camaraFrente.normalize();
            camaraDerecha.crossVectors(camaraFrente, camera.up).normalize().negate();

            let estaCaminando = false;

            if (teclas.w) { vectorDireccion.add(camaraFrente); estaCaminando = true; }
            if (teclas.s) { vectorDireccion.add(camaraFrente.clone().negate()); estaCaminando = true; }
            if (teclas.a) { vectorDireccion.add(camaraDerecha.clone().negate()); estaCaminando = true; }
            if (teclas.d) { vectorDireccion.add(camaraDerecha); estaCaminando = true; }

            if (estaCaminando) {
                vectorDireccion.normalize();
                jugadorNode.position.addScaledVector(vectorDireccion, velocidad);

                const proyeccionLateral = vectorDireccion.dot(camaraDerecha);
                if (proyeccionLateral < -0.1) jugadorSprite.scale.x = -2; // Espejo a la izquierda
                if (proyeccionLateral > 0.1) jugadorSprite.scale.x = 2;   // Vista normal a la derecha
            }

            // Fijación de físicas de relieve al suelo plano / colinas / lagos
            const hSuelo = obtenerAlturaTerreno(jugadorNode.position.x, jugadorNode.position.z);
            const nivelFisico = Math.max(hSuelo, -1.2); // Colisión física con la superficie del agua/fondos
            jugadorNode.position.y = nivelFisico + 2.0;

            // --- ANIMACIÓN DE FOTOGRAMAS SPRITESHEET PIXEL-ART ---
            cronometroAnim += 0.14;
            if (estaCaminando) {
                // Alterna entre el frame 1 (offset x = 1/3) y el frame 2 (offset x = 2/3) de la imagen virtual
                let frameId = Math.floor(cronometroAnim % 2) + 1;
                spritesheetTexture.offset.x = frameId / 3;
                jugadorSprite.position.y = Math.abs(Math.sin(cronometroAnim * 1.5)) * 0.08; // Pequeño bamboleo al andar
            } else {
                // Frame 0 estático
                spritesheetTexture.offset.x = 0.0;
                jugadorSprite.position.y = Math.sin(cronometroAnim * 0.25) * 0.03; // Respiración sutil
            }

            // ÓRBITA SUAVE DE CÁMARA CON MOUSE LOOK
            const radioCamara = 11;
            const objetivoCamaraX = jugadorNode.position.x + radioCamara * Math.sin(mouseCamara.horizontal) * Math.cos(mouseCamara.vertical);
            const objetivoCamaraY = jugadorNode.position.y + radioCamara * Math.sin(mouseCamara.vertical);
            const objetivoCamaraZ = jugadorNode.position.z + radioCamara * Math.cos(mouseCamara.horizontal) * Math.cos(mouseCamara.vertical);

            camera.position.x += (objetivoCamaraX - camera.position.x) * 0.09;
            camera.position.y += (objetivoCamaraY - camera.position.y) * 0.09;
            camera.position.z += (objetivoCamaraZ - camera.position.z) * 0.09;
            
            camera.lookAt(jugadorNode.position.x, jugadorNode.position.y + 0.5, jugadorNode.position.z);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
