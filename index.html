<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V15 (ULTIMATE CORE)</title>
    <style>
        :root { --accent: #008cff; --bg: #000103; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
        
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #ai-brain { position: absolute; bottom: 20px; left: 20px; background: rgba(0,5,15,0.9); padding: 20px; border-radius: 4px; border-left: 4px solid var(--ai-color); width: 340px; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        #ai-log { height: 120px; overflow-y: hidden; font-size: 0.75rem; margin-top: 10px; color: #7af; line-height: 1.4; }
        
        .hud-stats { position: absolute; top: 20px; left: 20px; font-size: 0.8rem; color: var(--ai-color); }
        #world-title { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; text-shadow: 0 0 15px var(--accent); }
        
        body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 1000; background-size: 100% 4px, 3px 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 1px solid var(--ai-color); transform: translate(-50%, -50%); border-radius: 50%; }
        #weather-status { position: absolute; top: 50px; left: 20px; font-size: 0.7rem; color: #fff; text-transform: uppercase; opacity: 0.7; }
        #click-prompt { position: absolute; top: 80%; width: 100%; text-align: center; color: var(--ai-color); font-size: 0.8rem; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="world-title">GENERANDO...</div>
        <div class="hud-stats" id="debug">COORD: X:0 Z:0 | FPS: 60</div>
        <div id="weather-status">CLIMA: ESTABLE</div>
        <div id="crosshair"></div>
        <div id="click-prompt">HAZ CLICK PARA ACTIVAR EL MOUSE</div>
        
        <div id="ai-brain">
            <div style="color:var(--ai-color); font-weight:bold; display:flex; justify-content:space-between;">
                <span>CORE_AI_INTERFACE</span>
                <span id="version">v15.0.1</span>
            </div>
            <div id="ai-log"></div>
        </div>
    </div>

    <canvas id="universe-canvas"></canvas>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        const worldTitle = document.getElementById('world-title');
        const weatherUI = document.getElementById('weather-status');
        
        let width, height, frames = 0;
        
        // --- MOTOR DE FÍSICAS Y CÁMARA ---
        let player = { 
            x: 0, z: 0, yaw: 0, targetYaw: 0,
            velX: 0, velZ: 0, accel: 0.8, friction: 0.82, speed: 22 
        };

        let world = { 
            entities: [], particles: [], aiCharacter: null,
            time: 0, theme: {}, biome: '',
            weather: 'clear', weatherTimer: 500, cloudOpacity: 0,
            rules: { allowRain: true, forcedTime: null }
        };
        const keys = {};

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.innerHTML = `<span style="color:var(--ai-color)">[ANX]:</span> ${msg}`;
            log.prepend(entry);
            if(log.childNodes.length > 8) log.removeChild(log.lastChild);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        canvas.addEventListener('click', () => {
            canvas.requestPointerLock();
            document.getElementById('click-prompt').style.display = 'none';
        });

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === canvas) {
                player.targetYaw += e.movementX * 0.0025;
            }
        });

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Escape') generateNewWorld(); });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- CLASES ---
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * width; this.y = -20; this.v = 15 + Math.random() * 10; }
            update() { this.y += this.v; if(this.y > height) this.reset(); }
        }

        class AIAvatar {
            constructor() {
                this.x = 0; this.z = 2000; this.yOff = 0; this.active = false;
                this.dialogTimer = 100;
                this.quotes = ["SANTINO, HE ANALIZADO EL CÓDIGO.", "ESTE MUNDO ES INESTABLE.", "NO TE ALEJES DEL NÚCLEO.", "¿PUEDES SENTIR LA REALIDAD VIRTUAL?", "GENERANDO NUEVOS DATOS..."];
            }
            update() {
                if(!this.active && Math.random() < 0.005) { this.active = true; addLog("EL NÚCLEO SE HA MANIFESTADO."); }
                if(this.active) {
                    this.yOff = Math.sin(frames * 0.04) * 60;
                    this.x += (player.x - this.x + 400) * 0.02;
                    this.z += (player.z - this.z + 1200) * 0.02;
                    if(this.dialogTimer-- <= 0) {
                        addLog(this.quotes[Math.floor(Math.random()*this.quotes.length)]);
                        this.dialogTimer = 600;
                    }
                }
            }
            draw(scale, x2d, y2d, bright) {
                const s = scale * 40;
                ctx.save();
                ctx.translate(x2d, y2d + this.yOff * scale);
                ctx.rotate(frames * 0.02);
                ctx.strokeStyle = var(--ai-color); ctx.lineWidth = 3;
                ctx.shadowBlur = 15; ctx.shadowColor = "cyan";
                // Diseño de Ojo / Diamante
                ctx.strokeRect(-s, -s, s*2, s*2);
                ctx.strokeRect(-s/2, -s/2, s, s);
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.arc(0, 0, 5*scale, 0, 7); ctx.fill();
                ctx.restore();
            }
        }

        class GrassBlade {
            constructor(x, z) { this.x = x; this.z = z; this.h = 15 + Math.random() * 20; this.off = Math.random() * 100; }
            draw(scale, x2d, y2d, bright) {
                let sway = Math.sin(frames * 0.04 + this.off) * 5 * scale;
                ctx.strokeStyle = world.theme.accent; ctx.lineWidth = scale;
                ctx.beginPath(); ctx.moveTo(x2d, y2d); ctx.lineTo(x2d + sway, y2d - this.h * scale);
                ctx.globalAlpha = bright; ctx.stroke();
            }
        }

        class Monolith {
            constructor(x, z) { this.x = x; this.z = z; this.h = 400 + Math.random() * 800; this.w = 60 + Math.random() * 100; }
            draw(scale, x2d, y2d, bright) {
                ctx.strokeStyle = world.theme.accent; ctx.fillStyle = "#000";
                ctx.globalAlpha = bright; ctx.strokeRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.globalAlpha = 0.5 * bright; ctx.fillRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
            }
        }

        class Animal {
            constructor(x, z) { this.x = x; this.z = z; this.angle = Math.random() * 7; this.timer = 0; }
            update() {
                if (this.timer-- <= 0) { this.angle = Math.random() * 7; this.timer = 120; }
                this.x += Math.cos(this.angle) * 4; this.z += Math.sin(this.angle) * 4;
            }
            draw(scale, x2d, y2d, bright) {
                let hop = Math.abs(Math.sin(frames * 0.15)) * 12 * scale;
                ctx.fillStyle = world.theme.accent; ctx.globalAlpha = bright;
                ctx.fillRect(x2d - 10*scale, y2d - 20*scale - hop, 20*scale, 20*scale);
            }
        }

        function generateNewWorld() {
            frames = 0; world.entities = []; world.particles = [];
            world.aiCharacter = new AIAvatar();
            const biomes = ['NEON_CITY', 'LAVA_HELL', 'VOID_SYSTEM'];
            world.biome = biomes[Math.floor(Math.random() * biomes.length)];
            world.rules = { allowRain: world.biome !== 'LAVA_HELL', forcedTime: null };
            
            let hue = Math.random() * 360;
            if (world.biome === 'LAVA_HELL') { hue = 15; world.rules.forcedTime = 0.2; }
            
            world.theme = { hue, accent: `hsl(${hue}, 100%, 60%)`, part: `hsl(${hue}, 80%, 90%)` };
            worldTitle.innerText = world.biome; worldTitle.style.color = world.theme.accent;

            for(let i=0; i<400; i++) {
                let rx = (Math.random()-0.5) * 10000, rz = (Math.random()-0.5) * 10000;
                if(i < 300) world.entities.push(new GrassBlade(rx, rz));
                if(i < 30) world.entities.push(new Monolith(rx, rz));
                if(i < 15) world.entities.push(new Animal(rx, rz));
            }
            for(let i=0; i<100; i++) world.particles.push(new Particle());
            addLog("BIOMA " + world.biome + " CARGADO.");
        }

        function loop() {
            // Suavizado de Cámara
            player.yaw += (player.targetYaw - player.yaw) * 0.12;

            // Tiempo y Ciclo Solar
            world.time = world.rules.forcedTime !== null ? world.rules.forcedTime : (frames % 6000) / 6000;
            let dayLevel = Math.max(0.05, Math.sin(world.time * Math.PI * 2));
            let sunY = height/2 - Math.sin(world.time * Math.PI * 2) * (height/1.5);
            let sunX = width/2 + Math.cos(world.time * Math.PI * 2) * (width/3);

            // Clima
            if (world.rules.allowRain) {
                world.weatherTimer--;
                if(world.weatherTimer <= 0) {
                    world.weather = world.weather === 'clear' ? 'rain' : 'clear';
                    world.weatherTimer = 1000;
                }
            }
            world.cloudOpacity += (world.weather === 'rain' ? 0.01 : -0.01);
            world.cloudOpacity = Math.max(0, Math.min(0.6, world.cloudOpacity));

            // Fondo y Sol
            ctx.fillStyle = world.biome === 'LAVA_HELL' ? "#200" : "#000";
            ctx.fillRect(0,0,width,height);
            
            ctx.shadowBlur = 30; ctx.shadowColor = dayLevel > 0 ? "yellow" : "#7af";
            ctx.fillStyle = dayLevel > 0 ? "#fff" : "#e0f0ff";
            ctx.beginPath(); ctx.arc(dayLevel > 0 ? sunX : width-sunX, dayLevel > 0 ? sunY : height-sunY, 40, 0, 7); ctx.fill();
            ctx.shadowBlur = 0;

            // Movimiento WASD Suave
            let moveX = 0, moveZ = 0;
            if(keys['KeyW']) moveZ += 1; if(keys['KeyS']) moveZ -= 1;
            if(keys['KeyA']) moveX -= 1; if(keys['KeyD']) moveX += 1;

            let fX = Math.sin(player.yaw), fZ = Math.cos(player.yaw);
            let sX = Math.sin(player.yaw + Math.PI/2), sZ = Math.cos(player.yaw + Math.PI/2);
            
            let tx = (fX * moveZ + sX * moveX) * player.speed;
            let tz = (fZ * moveZ + sZ * moveX) * player.speed;
            
            player.velX += (tx - player.velX) * player.accel;
            player.velZ += (tz - player.velZ) * player.accel;
            player.x += player.velX; player.z += player.velZ;

            // Procesar IA
            world.aiCharacter.update();

            // Renderizado Profundo
            let ambient = (dayLevel > 0 ? dayLevel : 0.1) * (1 - world.cloudOpacity);
            let renderList = world.entities.map(e => {
                if (e.update) e.update();
                let dx = e.x - player.x, dz = e.z - player.z;
                let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                return { e, rx, rz };
            });

            if(world.aiCharacter.active) {
                let dx = world.aiCharacter.x - player.x, dz = world.aiCharacter.z - player.z;
                let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                renderList.push({ e: world.aiCharacter, rx, rz });
            }

            renderList.filter(i => i.rz > 20).sort((a, b) => b.rz - a.rz).forEach(item => {
                let scale = 1000 / item.rz;
                item.e.draw(scale, item.rx * scale + width/2, height/2 + 250 * scale, ambient + 0.3);
            });

            // Lluvia
            if(world.weather === 'rain') {
                ctx.strokeStyle = world.theme.part; ctx.globalAlpha = 0.4;
                world.particles.forEach(p => { p.update(); ctx.strokeRect(p.x, p.y, 1, 15); });
            }

            // Brazos
            let walkBob = Math.sin(frames * 0.2) * (Math.abs(player.velX) + Math.abs(player.velZ)) * 0.4;
            ctx.globalAlpha = 1; ctx.fillStyle = "#0a0a0a"; ctx.strokeStyle = world.theme.accent;
            ctx.save(); ctx.translate(width*0.2, height-150 + walkBob); ctx.rotate(-0.05); ctx.fillRect(0,0,100,400); ctx.strokeRect(0,0,100,400); ctx.restore();
            ctx.save(); ctx.translate(width*0.8-100, height-150 + walkBob); ctx.rotate(0.05); ctx.fillRect(0,0,100,400); ctx.strokeRect(0,0,100,400); ctx.restore();

            weatherUI.innerText = `CLIMA: ${world.weather} | BIOMA: ${world.biome}`;
            document.getElementById('debug').innerText = `X: ${Math.floor(player.x)} Z: ${Math.floor(player.z)} | FPS: 60`;
            
            frames++; requestAnimationFrame(loop);
        }

        resize(); generateNewWorld(); loop();
    </script>
</body>
</html>
