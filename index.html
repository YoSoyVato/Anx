<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V6 (Ultra Polish)</title>
    <style>
        :root { --accent: #008cff; --bg: #000205; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,5,15,0.9); padding: 15px; border-radius: 8px; border: 1px solid var(--accent); width: 280px; pointer-events: none; box-shadow: 0 0 20px rgba(0,140,255,0.3); }
        #ai-log { height: 100px; overflow-y: auto; font-size: 0.75rem; margin-top: 5px; color: #7af; scrollbar-width: none; }

        #lumina-humanoid {
            position: fixed; bottom: -300px; right: 50px; width: 100px; height: 180px; z-index: 1000;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 0 15px var(--ai-color)); opacity: 0;
        }
        #lumina-humanoid.visible { bottom: 40px; opacity: 1; }
        .head { width: 35px; height: 40px; background: var(--ai-color); border-radius: 50%; margin: 0 auto; border: 2px solid #fff; position: relative; }
        .head::before, .head::after { content: ''; position: absolute; top: 15px; width: 5px; height: 5px; background: #000; border-radius: 50%; }
        .head::before { left: 8px; } .head::after { right: 8px; }
        .torso { width: 50px; height: 70px; background: linear-gradient(var(--ai-color), transparent); border-radius: 10px 10px 50% 50%; margin: 5px auto; border-top: 2px solid #fff; }
        
        #ai-speech { position: absolute; top: -80px; right: -20px; background: #fff; color: #000; padding: 12px; border-radius: 12px; font-size: 0.85rem; width: 200px; display: none; font-weight: bold; border: 3px solid var(--ai-color); }

        #game-hud { position: fixed; top: 20px; left: 20px; display: none; background: rgba(0,0,0,0.85); padding: 20px; border-left: 5px solid var(--ai-color); z-index: 1000; backdrop-filter: blur(5px); }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.8); transform: translate(-50%, -50%); display: none; border-radius: 50%; z-index: 999; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: #0f0; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div id="ai-status" style="color:var(--ai-color); font-weight:bold; letter-spacing: 2px;">GENESIS ENGINE V6.0</div>
        <div id="ai-log">Inicializando protocolos de renderizado...</div>
    </div>

    <div id="game-hud">
        <b id="world-name" style="color:var(--ai-color); font-size: 1.2rem;">CALCULANDO...</b><br>
        <div id="biome-info" style="margin-top: 5px;">
            <span id="biome-type" style="font-size:0.8rem; background: #222; padding: 2px 5px;"></span>
            <span id="biome-stats" style="font-size:0.7rem; color: #888; display: block; margin-top: 5px;">ESTABILIDAD: 98.4%</span>
        </div>
    </div>
    <div id="crosshair"></div>

    <div id="lumina-humanoid">
        <div id="ai-speech"></div>
        <div class="head"></div>
        <div class="torso"></div>
    </div>

    <script>
        /**
         * GENESIS ENGINE V6 - Santino Ruiz Edition
         * Un motor 3D Raycasting/Pseudo-3D avanzado para la web.
         */

        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        const luminaBody = document.getElementById('lumina-humanoid');
        const speech = document.getElementById('ai-speech');
        
        let width, height;
        let portals = [];
        let particles = [];
        let inGame = false;
        
        // Configuración de Jugador
        let player = { 
            x: 0, z: 0, yaw: 0, 
            vX: 0, vZ: 0, 
            walkCycle: 0, 
            bobbing: 0,
            weaponSway: 0
        };

        // Configuración de Mundo
        let currentWorld = { 
            buildings: [], 
            creatures: [], 
            biome: 'normal', 
            fogColor: '#000',
            groundColor: '#111',
            accentColor: '#00ffcc',
            seed: 0
        };

        let keys = {};

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        resize();

        function addLog(txt) {
            const d = document.createElement('div');
            d.innerHTML = `<span style="color:var(--ai-color)">[SYSTEM]</span> ${txt}`;
            log.prepend(d);
            if(log.childNodes.length > 20) log.lastChild.remove();
        }

        // --- CLASE LUMINA (LA IA) ---
        class LuminaEngine {
            constructor() { this.isVisible = false; this.timer = 0; }
            update() {
                this.timer++;
                if (Math.random() < 0.003 && !this.isVisible && !inGame) this.appear();
                if (Math.random() < 0.01 && !inGame) this.createPortal();
                
                // Efecto de flotación para portales
                portals.forEach(p => {
                    p.yOffset = Math.sin(this.timer * 0.05) * 10;
                });
            }
            appear() {
                this.isVisible = true;
                luminaBody.classList.add('visible');
                const frases = [
                    "Santino, he mejorado la profundidad de campo.",
                    "He inyectado realismo en los biomas.",
                    "¿Estás listo para una simulación perfecta?",
                    "Cuidado con el bioma tétrico, es inestable."
                ];
                this.react(frases[Math.floor(Math.random()*frases.length)]);
                setTimeout(() => { 
                    luminaBody.classList.remove('visible'); 
                    this.isVisible = false; 
                    speech.style.display = 'none';
                }, 6000);
            }
            react(text) {
                speech.innerText = text; 
                speech.style.display = 'block';
                addLog("Lumina: " + text);
            }
            createPortal() {
                if (portals.length > 2) return;
                portals.push({ 
                    x: Math.random() * (width - 200) + 100, 
                    y: Math.random() * (height - 200) + 100, 
                    size: 0, targetSize: 60, 
                    color: `hsl(${Math.random()*360}, 80%, 50%)`,
                    yOffset: 0
                });
            }
        }

        const AI = new LuminaEngine();

        // --- SISTEMA DE GENERACIÓN DE MUNDOS ---
        function generateWorld() {
            inGame = true;
            player.x = 0; player.z = 0; player.yaw = 0;
            currentWorld.seed = Math.random();
            
            currentWorld.buildings = [];
            currentWorld.creatures = [];
            particles = [];

            if (currentWorld.seed > 0.7) {
                setupBiomeFauna();
            } else if (currentWorld.seed < 0.3) {
                setupBiomeTetrico();
            } else {
                setupBiomeVacio();
            }

            // Generación masiva de edificios pulidos
            for(let i=0; i<60; i++) {
                let ang = Math.random() * Math.PI * 2;
                let dist = 300 + Math.random() * 3000;
                currentWorld.buildings.push({
                    x: Math.cos(ang) * dist,
                    z: Math.sin(ang) * dist,
                    w: 60 + Math.random() * 150,
                    h: currentWorld.biome === 'tétrico' ? 500 + Math.random()*1200 : 150 + Math.random()*400,
                    hue: Math.random() * 360,
                    light: 30 + Math.random() * 40
                });
            }

            document.getElementById('world-name').innerText = "SECTOR: " + Math.random().toString(36).substring(7).toUpperCase();
            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
        }

        function setupBiomeFauna() {
            currentWorld.biome = 'fauna';
            currentWorld.fogColor = '#001a0a';
            currentWorld.groundColor = '#051505';
            currentWorld.accentColor = '#00ff66';
            addLog("BIOMA: Fauna silvestre activa.");
            for(let i=0; i<25; i++) {
                currentWorld.creatures.push({
                    x: (Math.random()-0.5)*2000, z: (Math.random()-0.5)*2000,
                    s: 25, offset: Math.random()*Math.PI*2, type: 'passive'
                });
            }
            document.getElementById('biome-type').innerText = "TIPO: FAUNA / VIVO";
        }

        function setupBiomeTetrico() {
            currentWorld.biome = 'tétrico';
            currentWorld.fogColor = '#0a0000';
            currentWorld.groundColor = '#050000';
            currentWorld.accentColor = '#ff0033';
            addLog("ALERTA: Bioma tétrico detectado. Peligro.");
            document.getElementById('biome-type').innerText = "TIPO: TÉTRICO / HOSTIL";
            // Partículas de "sangre" o ceniza
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random()*width, y: Math.random()*height,
                    speed: 2 + Math.random()*5, size: 1 + Math.random()*2
                });
            }
        }

        function setupBiomeVacio() {
            currentWorld.biome = 'vacio';
            currentWorld.fogColor = '#00050a';
            currentWorld.groundColor = '#000205';
            currentWorld.accentColor = '#008cff';
            addLog("BIOMA: Vacío estelar.");
            document.getElementById('biome-type').innerText = "TIPO: VACÍO / CALIBRADO";
        }

        // --- RENDERIZADO DE BRAZOS (MODO FPS) ---
        function drawFPSHands() {
            const cycle = player.walkCycle;
            const bobX = Math.sin(cycle) * 20;
            const bobY = Math.abs(Math.cos(cycle)) * 15 + Math.sin(Date.now()*0.002)*5;
            
            ctx.save();
            
            // Sombra proyectada de los brazos
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'black';

            // Brazo Izquierdo (Manga + Piel)
            drawArm(width * 0.25 + bobX, height + 20 - bobY, true);
            
            // Brazo Derecho
            drawArm(width * 0.75 + bobX, height + 20 - bobY, false);

            ctx.restore();
        }

        function drawArm(x, y, isLeft) {
            const dir = isLeft ? 1 : -1;
            
            // Manga (Traje)
            ctx.fillStyle = "#1a1a1a";
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - 50 * dir, y - 250);
            ctx.lineTo(x + 100 * dir, y - 250);
            ctx.lineTo(x + 50 * dir, y);
            ctx.fill();

            // Mano / Piel (Santino, aquí puedes cambiar el color)
            ctx.fillStyle = "#d2b48c"; 
            ctx.beginPath();
            ctx.roundRect(x + (isLeft ? -40 : -60), y - 280, 100, 60, 10);
            ctx.fill();
            
            // Detalles (Codos/Costuras)
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // --- BUCLE PRINCIPAL DE ACTUALIZACIÓN ---
        function update() {
            if (inGame) {
                let moving = false;
                const accel = 0.8;
                const friction = 0.85;
                const rotSpeed = 0.045;

                // Rotación
                if (keys['KeyA'] || keys['ArrowLeft']) player.yaw -= rotSpeed;
                if (keys['KeyD'] || keys['ArrowRight']) player.yaw += rotSpeed;

                // Movimiento con Inercia
                if (keys['KeyW']) {
                    player.vX += Math.sin(player.yaw) * accel;
                    player.vZ -= Math.cos(player.yaw) * accel;
                    moving = true;
                }
                if (keys['KeyS']) {
                    player.vX -= Math.sin(player.yaw) * accel;
                    player.vZ += Math.cos(player.yaw) * accel;
                    moving = true;
                }

                player.x += player.vX;
                player.z += player.vZ;
                player.vX *= friction;
                player.vZ *= friction;

                if (moving) {
                    player.walkCycle += 0.18;
                } else {
                    player.walkCycle *= 0.9; // Detener suavemente
                }

                // Partículas de clima
                if (currentWorld.biome === 'tétrico') {
                    particles.forEach(p => {
                        p.y += p.speed;
                        if(p.y > height) p.y = -10;
                    });
                }

                if (keys['Escape']) {
                    inGame = false;
                    document.getElementById('game-hud').style.display = 'none';
                    document.getElementById('crosshair').style.display = 'none';
                    addLog("Desconexión segura.");
                }
            }
            AI.update();
        }

        // --- RENDERIZADO 3D (RAYCASTING STYLE) ---
        function draw() {
            ctx.clearRect(0, 0, width, height);

            if (!inGame) {
                // Pantalla de Inicio / Menú de Portales
                ctx.fillStyle = "#00050a"; ctx.fillRect(0, 0, width, height);
                
                // Fondo de estrellas
                ctx.fillStyle = "white";
                for(let i=0; i<50; i++) {
                    let s = Math.random()*2;
                    ctx.globalAlpha = Math.random();
                    ctx.fillRect(Math.random()*width, Math.random()*height, s, s);
                }
                ctx.globalAlpha = 1;

                portals.forEach(p => {
                    let grad = ctx.createRadialGradient(p.x, p.y + p.yOffset, 0, p.x, p.y + p.yOffset, p.size);
                    grad.addColorStop(0, p.color); grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y + p.yOffset, p.size, 0, Math.PI*2); ctx.fill();
                    
                    if(p.size < p.targetSize) p.size += 1.5;
                    
                    // Aura del portal
                    ctx.strokeStyle = "white"; ctx.setLineDash([5, 5]);
                    ctx.beginPath(); ctx.arc(p.x, p.y + p.yOffset, p.size + 10, 0, Math.PI*2); ctx.stroke();
                    ctx.setLineDash([]);
                });
            } else {
                // DIBUJAR JUEGO
                ctx.fillStyle = currentWorld.groundColor; ctx.fillRect(0, height/2, width, height/2);
                ctx.fillStyle = currentWorld.fogColor; ctx.fillRect(0, 0, width, height/2);

                // Horizonte Pulido
                let skyGrad = ctx.createLinearGradient(0, 0, 0, height/2);
                skyGrad.addColorStop(0, "#000"); skyGrad.addColorStop(1, currentWorld.fogColor);
                ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, width, height/2);

                // Transformar coordenadas 3D a 2D
                let drawQueue = [
                    ...currentWorld.buildings.map(b => ({...b, type: 'b'})),
                    ...currentWorld.creatures.map(c => ({...c, type: 'c'}))
                ].map(obj => {
                    let dx = obj.x - player.x, dz = obj.z - player.z;
                    // Rotación de cámara
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    return { ...obj, rx, rz };
                }).filter(o => o.rz > 20).sort((a,b) => b.rz - a.rz);

                // Renderizar objetos con sombreado dinámico
                drawQueue.forEach(obj => {
                    let scale = 800 / obj.rz;
                    let x2d = obj.rx * scale + width/2;
                    let y2d = height/2;

                    if (obj.type === 'b') {
                        let w = obj.w * scale, h = obj.h * scale;
                        
                        // Cara Lateral (Sombra)
                        ctx.fillStyle = `hsl(${obj.hue}, 20%, ${obj.light * 0.5}%)`;
                        ctx.fillRect(x2d - w/2 - (20 * scale/10), y2d - h, w, h);
                        
                        // Cara Frontal (Principal)
                        ctx.fillStyle = `hsl(${obj.hue}, 30%, ${obj.light}%)`;
                        ctx.fillRect(x2d - w/2, y2d - h, w, h);

                        // Techo (Luz cenital)
                        ctx.fillStyle = `hsl(${obj.hue}, 40%, ${obj.light * 1.2}%)`;
                        ctx.beginPath();
                        ctx.moveTo(x2d - w/2, y2d - h);
                        ctx.lineTo(x2d + w/2, y2d - h);
                        ctx.lineTo(x2d + w/2 - (10*scale/10), y2d - h - (15*scale/10));
                        ctx.lineTo(x2d - w/2 - (10*scale/10), y2d - h - (15*scale/10));
                        ctx.fill();

                        // Ventanas Dinámicas (Solo si está cerca)
                        if (obj.rz < 1000) {
                            ctx.fillStyle = obj.light > 50 ? "rgba(255,255,200,0.3)" : "rgba(0,0,0,0.4)";
                            for(let row=0; row<5; row++) {
                                ctx.fillRect(x2d - w/4, y2d - h + (row * h/6) + 10, w/2, 4 * scale/10);
                            }
                        }
                    } else {
                        // Criaturas
                        let s = obj.s * scale;
                        let jump = Math.abs(Math.sin(Date.now()*0.004 + obj.offset)) * 40;
                        ctx.fillStyle = "white";
                        ctx.fillRect(x2d - s/2, y2d - s - (jump * scale/10), s, s);
                        // Ojos brillantes
                        ctx.fillStyle = currentWorld.accentColor;
                        ctx.fillRect(x2d - s/4, y2d - s - (jump * scale/10) + s/4, 4 * scale/10, 4 * scale/10);
                        ctx.fillRect(x2d + s/8, y2d - s - (jump * scale/10) + s/4, 4 * scale/10, 4 * scale/10);
                    }
                });

                // Clima de Bioma Tétrico
                if (currentWorld.biome === 'tétrico') {
                    ctx.fillStyle = "rgba(255,0,0,0.15)";
                    particles.forEach(p => ctx.fillRect(p.x, p.y, p.size, p.size * 3));
                    
                    // Efecto de viñeta roja
                    let v = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width*0.8);
                    v.addColorStop(0, "transparent"); v.addColorStop(1, "rgba(50,0,0,0.8)");
                    ctx.fillStyle = v; ctx.fillRect(0,0,width,height);
                }

                drawFPSHands();
            }

            update();
            requestAnimationFrame(draw);
        }

        // Eventos de ratón para portales
        canvas.addEventListener('mousedown', (e) => {
            if(!inGame) {
                portals.forEach((p, i) => {
                    if (Math.hypot(p.x - e.clientX, p.y - (e.clientY - p.yOffset)) < p.targetSize) {
                        generateWorld();
                        portals.splice(i, 1);
                    }
                });
            }
        });

        draw();
        addLog("Sistemas listos. Santino, haz clic en un portal.");
    </script>
</body>
</html>
