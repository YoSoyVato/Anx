<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Network</title>
    <style>
        :root {
            --accent: #008cff;
            --accent-glow: rgba(0, 140, 255, 0.4);
            --bg: #020202;
            --glass: rgba(10, 10, 10, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* SELECTOR INICIAL */
        #device-selector {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
        }

        #main-app { 
            display: none; width: 100%; height: 100%; 
            position: relative; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* RESPONSIVE */
        .mode-pc .container { max-width: 1200px; margin: 0 auto; }
        .mode-mobile .container { max-width: 450px; padding: 20px; margin: 0 auto; }
        .mode-mobile .logo { font-size: 4.5rem; }

        /* FONDO */
        .bg-animate { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #001529 0%, #020202 100%); z-index: -2; }
        .bg-mesh { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 140, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 140, 255, 0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; mask-image: radial-gradient(ellipse at center, black, transparent 80%); }

        /* BARRA DE MONEDAS (OCULTA INICIALMENTE) */
        #user-bar {
            display: none; 
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(0, 140, 255, 0.1); 
            padding: 10px 20px;
            border-radius: 50px; 
            border: 1px solid var(--accent); 
            backdrop-filter: blur(15px);
            font-size: 0.85rem;
            box-shadow: 0 0 15px rgba(0, 140, 255, 0.2);
        }

        /* BOTÓN CREAR MEJORADO */
        #btn-create {
            display: none;
            position: fixed;
            bottom: 35px;
            right: 35px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--accent), #005bb5);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            font-size: 2.2rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 8px 25px var(--accent-glow), inset 0 0 10px rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #btn-create:hover { 
            transform: scale(1.15) rotate(180deg);
            box-shadow: 0 12px 35px var(--accent-glow);
        }

        /* FEED Y ACCIONES */
        #feed-container { display: none; width: 100%; height: 100vh; background: black; z-index: 50; }
        .video-section { height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }

        .side-actions {
            display: none; 
            position: absolute; right: 25px; bottom: 130px;
            flex-direction: column; gap: 18px; z-index: 60;
        }

        .action-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            width: 50px; height: 50px; border-radius: 50%; color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .action-btn:hover { background: var(--accent); transform: scale(1.1); }

        /* GENERAL */
        .logo { font-size: clamp(4rem, 15vw, 7.5rem); font-weight: 900; letter-spacing: -5px; color: #fff; margin: 0; filter: drop-shadow(0 0 15px var(--accent-glow)); }
        .logo span { color: var(--accent); }
        .welcome-text { font-size: 1.1rem; color: #aaa; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 5px; font-weight: 300; }
        .btn-group { display: flex; gap: 20px; justify-content: center; }
        .btn { padding: 16px 35px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; text-decoration: none; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .btn-outline { color: #fff; background: rgba(255,255,255,0.03); }
        .btn-primary { background: var(--accent); color: white; border: none; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 12px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; box-sizing: border-box; }

        .fade-in { animation: fadeIn 1.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="device-selector">
        <h2 style="letter-spacing: 3px; font-weight: 800; color: white;">IDENTIFICA TU PLATAFORMA</h2>
        <div class="btn-group">
            <div class="btn btn-outline" onclick="setMode('mobile')">📱 MÓVIL</div>
            <div class="btn btn-outline" onclick="setMode('pc')">💻 ORDENADOR</div>
        </div>
    </div>

    <div id="main-app">
        <div class="bg-animate"></div>
        <div class="bg-mesh"></div>

        <div id="user-bar">
            <span id="coin-count" style="color: #ffd700; font-weight: 800; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);">0 ANX Coins</span>
        </div>

        <button id="btn-create" title="Subir Video" onclick="actionCreate()">+</button>

        <div id="home-content" class="container fade-in" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
            <h1 class="logo">AN<span>X</span></h1>
            <p class="welcome-text">Bienvenido al anexo</p>
            <div class="btn-group">
                <a href="#" class="btn btn-outline" onclick="startExploring(false)">Explorar</a>
                <a href="#" class="btn btn-primary" onclick="toggleModal(true)">Entrar</a>
            </div>
        </div>

        <div id="feed-container">
            <div class="video-section">
                <div id="empty-msg" class="fade-in" style="text-align: center;">
                    <span style="font-size: 4rem; opacity: 0.2;">🎬</span>
                    <h2 style="font-weight: 300;">Aún no hay ningún video</h2>
                    <p style="color: var(--accent); font-weight: 700; font-size: 0.7rem; letter-spacing: 2px;">SÉ EL PRIMERO EN CREAR UNO</p>
                    <button class="btn btn-outline" onclick="window.location.reload()" style="margin-top:20px; font-size:0.7rem;">⬅️ Volver</button>
                </div>

                <div id="video-actions" class="side-actions">
                    <button class="action-btn" onclick="addCoin()">❤️</button>
                    <button class="action-btn">💬</button>
                    <button class="action-btn">🔗</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeOutside(event)">
        <div class="modal-box">
            <h2 id="mTitle" style="margin-top:0; font-weight: 800;">ACCESO</h2>
            <input type="email" id="email" placeholder="Usuario o Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn btn-primary" style="width:100%;" onclick="authAction()">Conectar</button>
            <p id="mSwitch" style="font-size:0.75rem; color:#666; margin-top:25px; cursor:pointer;" onclick="switchMode()">
                ¿Nuevo? <span style="color:var(--accent)">Crea una identidad</span>
            </p>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        let coins = 0;
        let isLogin = true;
        const modal = document.getElementById('modal');

        function setMode(mode) {
            document.getElementById('device-selector').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.body.classList.add('mode-' + mode);
        }

        function startExploring(registered) {
            isLoggedIn = registered;
            document.getElementById('home-content').style.display = 'none';
            document.getElementById('feed-container').style.display = 'block';
            
            // SOLO mostramos elementos de usuario si se logueó
            if(isLoggedIn) {
                document.getElementById('user-bar').style.display = 'block';
                document.getElementById('btn-create').style.display = 'flex';
            }
        }

        function onVideoLoaded() {
            document.getElementById('empty-msg').style.display = 'none';
            document.getElementById('video-actions').style.display = 'flex';
        }

        function addCoin() {
            coins += 10;
            document.getElementById('coin-count').innerText = coins + " ANX Coins";
        }

        function actionCreate() {
            alert("Accediendo a la cámara y archivos de ANX...");
            onVideoLoaded(); 
        }

        function toggleModal(show) { modal.style.display = show ? 'flex' : 'none'; }
        function closeOutside(e) { if(e.target === modal) toggleModal(false); }
        function switchMode() {
            isLogin = !isLogin;
            document.getElementById('mTitle').innerText = isLogin ? 'ACCESO' : 'REGISTRO';
        }

        function authAction() {
            if(!document.getElementById('email').value) return alert("Email requerido");
            toggleModal(false);
            startExploring(true); // Activa la sesión y muestra Coins/Botón Crear
        }
    </script>
</body>
</html>
