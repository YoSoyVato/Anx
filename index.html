<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Social HD-2D Profesional - Water Update</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0f19; user-select: none; }
        canvas { display: block; }
        #interface {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #f0f3f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(11, 15, 25, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #bloqueo-pantalla {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            color: white;
            font-family: sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="bloqueo-pantalla">
        Haga clic en la pantalla para activar la cámara libre con el ratón
    </div>

    <div id="interface">
        <strong style="color: #4cc9f0; font-size: 1.1rem;">PROTOTIPO HD-2D ENGINE V2</strong><br><br>
        • <strong>Moverse:</strong> W, A, S, D (Relativo a la Cámara)<br>
        • <strong>Navegación:</strong> Explora los lagos para ver la animación de nado.<br>
        • <strong>Entorno:</strong> Densidad de árboles aumentada + Físicas de Oleaje.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. CONFIGURACIÓN DEL ESPACIO RENDER
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xbde0fe); 
        scene.fog = new THREE.FogExp2(0xbde0fe, 0.015);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 2. ILUMINACIÓN CINEMÁTICA
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        sunLight.position.set(60, 100, 40);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);

        // 3. GENERACIÓN DEL MAPA CON RELIEVES SUAVES Y MÚLTIPLES LAGOS
        const tamañoMundo = 200;
        const segmentos = 100;
        const terrainGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo, segmentos, segmentos);
        
        function obtenerAlturaTerreno(x, z) {
            let y = Math.sin(x * 0.04) * Math.cos(z * 0.04) * 2.5;
            let cuencasLagos = Math.sin(x * 0.07 + 2) * Math.sin(z * 0.06 * z * 0.01) * 3.5;
            y += cuencasLagos;
            y += Math.sin(x * 0.2) * Math.cos(z * 0.2) * 0.3;

            if (y < -2.5) y = -2.5 + (y + 2.5) * 0.15; 
            return y;
        }

        const pos = terrainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            pos.setZ(i, obtenerAlturaTerreno(x, y));
        }
        terrainGeo.computeVertexNormals();
        terrainGeo.rotateX(-Math.PI / 2);

        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x7da453, 
            roughness: 0.9,
            flatShading: true 
        });
        const terreno = new THREE.Mesh(terrainGeo, terrainMat);
        terreno.receiveShadow = true;
        scene.add(terreno);

        // Sistema de Lagos Animados
        const waterGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo, 40, 40);
        const waterMat = new THREE.MeshStandardMaterial({ 
            color: 0x1d4ed8, 
            transparent: true, 
            opacity: 0.8,
            roughness: 0.15,
            metalness: 0.2,
            flatShading: true
        });
        const aguaSuelo = new THREE.Mesh(waterGeo, waterMat);
        aguaSuelo.rotation.x = -Math.PI / 2;
        aguaSuelo.position.y = -1.2; 
        aguaSuelo.receiveShadow = true;
        scene.add(aguaSuelo);

        const posicionOriginalAgua = waterGeo.attributes.position.clone();

        // 4. ENTIDADES DEL MUNDO (MÁS ÁRBOLES Y CASITAS)
        const crearArbolEstilizado = (x, z, h) => {
            const grupo = new THREE.Group();
            const escalaAleatoria = 0.8 + Math.random() * 0.5;

            const tronco = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12 * escalaAleatoria, 0.25 * escalaAleatoria, 2 * escalaAleatoria, 5),
                new THREE.MeshStandardMaterial({ color: 0x4a3525, roughness: 0.9 })
            );
            tronco.position.y = 1 * escalaAleatoria;
            tronco.castShadow = true;
            grupo.add(tronco);

            const copa = new THREE.Mesh(
                new THREE.ConeGeometry(1.2 * escalaAleatoria, 2.5 * escalaAleatoria, 5),
                new THREE.MeshStandardMaterial({ color: 0x2d5a27, flatShading: true })
            );
            copa.position.y = (2.5 * escalaAleatoria);
            copa.castShadow = true;
            grupo.add(copa);

            grupo.position.set(x, h, z);
            scene.add(grupo);
        };

        const crearCasita = (x, z, h) => {
            const casa = new THREE.Group();
            const baseGeo = new THREE.BoxGeometry(3, 2.5, 3);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0xf4f1de, roughness: 0.8, flatShading: true });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 1.25;
            base.castShadow = true;
            base.receiveShadow = true;
            casa.add(base);

            const techoGeo = new THREE.ConeGeometry(2.5, 1.8, 4);
            const techoMat = new THREE.MeshStandardMaterial({ color: 0xe07a5f, roughness: 0.7, flatShading: true });
            const techo = new THREE.Mesh(techoGeo, techoMat);
            techo.position.y = 3.0;
            techo.rotation.y = Math.PI / 4; 
            techo.castShadow = true;
            casa.add(techo);

            const puertaGeo = new THREE.PlaneGeometry(0.7, 1.3);
            const puertaMat = new THREE.MeshStandardMaterial({ color: 0x3d1a04 });
            const puerta = new THREE.Mesh(puertaGeo, puertaMat);
            puerta.position.set(0, 0.65, 1.51); 
            casa.add(puerta);

            casa.position.set(x, h, z);
            scene.add(casa);
        };

        // Distribución: ¡Aumentada a 140 árboles!
        for (let i = 0; i < 140; i++) { 
            const x = (Math.random() - 0.5) * 150;
            const z = (Math.random() - 0.5) * 150;
            const h = obtenerAlturaTerreno(x, z);
            if (h > -0.8) crearArbolEstilizado(x, z, h);
        }

        for (let i = 0; i < 12; i++) { 
            const x = (Math.random() - 0.5) * 100;
            const z = (Math.random() - 0.5) * 100;
            const h = obtenerAlturaTerreno(x, z);
            if (h > 0.5 && (Math.abs(x) > 8 || Math.abs(z) > 8)) {
                crearCasita(x, z, h);
            }
        }

        // 5. GENERADOR ARTÍSTICO (Pixel-Art: Añadida Ropa, Pelo y Animación de Nado)
        function crearSpritesheetFiel() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; // 4 cuadros de 64x128 píxeles (Idle, Paso1, Paso2, Nadar)
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;

            function dibujarCuadroPersonaje(offsetX, estado) {
                const colorPiel = '#eab295';
                const colorSombraPiel = '#cf9174';
                const colorContorno = '#181216';
                const colorPelo = '#4a3525';
                const colorCamiseta = '#00b4d8';
                const colorPantalon = '#242423';

                if (estado === 'nadar') {
                    // --- ANIMACIÓN DE NADAR (Cuerpo hundido, interactuando con el agua) ---
                    // Pelo trasero
                    ctx.fillStyle = colorPelo;
                    ctx.fillRect(offsetX + 14, 34, 36, 16);

                    // Cabeza (flotando un poco más alta que los hombros simulados)
                    ctx.fillStyle = colorContorno;
                    ctx.fillRect(offsetX + 16, 38, 32, 32);
                    ctx.fillStyle = colorPiel;
                    ctx.fillRect(offsetX + 18, 40, 28, 28);
                    
                    // Flequillo
                    ctx.fillStyle = colorPelo;
                    ctx.fillRect(offsetX + 16, 38, 32, 8);
                    ctx.fillRect(offsetX + 16, 46, 6, 8);

                    // Rostro asomando en el agua
                    ctx.fillStyle = colorContorno;
                    ctx.fillRect(offsetX + 24, 50, 4, 6); // Ojo izq
                    ctx.fillRect(offsetX + 36, 50, 4, 6); // Ojo der
                    ctx.fillRect(offsetX + 29, 58, 6, 2); // Boca

                    // Brazos abiertos braceando en el agua (Izquierdo y derecho extendidos)
                    ctx.fillStyle = colorContorno;
                    ctx.fillRect(offsetX + 4, 66, 12, 8);
                    ctx.fillRect(offsetX + 48, 66, 12, 8);
                    ctx.fillStyle = colorCamiseta;
                    ctx.fillRect(offsetX + 6, 68, 10, 4);
                    ctx.fillRect(offsetX + 48, 68, 10, 4);
                    return;
                }

                // --- ESTADOS EN TIERRA (Idle, Caminar) ---
                // Cabeza Contorno y Base
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 14, 16, 36, 36);
                ctx.fillStyle = colorPiel;
                ctx.fillRect(offsetX + 16, 18, 32, 32);

                // Sombra de volumen cabeza
                ctx.fillStyle = colorSombraPiel;
                ctx.fillRect(offsetX + 16, 18, 6, 32);
                ctx.fillRect(offsetX + 16, 44, 32, 6);

                // NUEVO: Pelo castaño con volumen
                ctx.fillStyle = colorPelo;
                ctx.fillRect(offsetX + 14, 14, 36, 10); // Techo del pelo
                ctx.fillRect(offsetX + 14, 24, 6, 16);  // Lateral izquierdo
                ctx.fillRect(offsetX + 44, 24, 6, 12);  // Lateral derecho
                ctx.fillRect(offsetX + 20, 24, 12, 4);   // Flequillo chic

                // Rostro
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 25, 30, 4, 6); 
                ctx.fillRect(offsetX + 37, 30, 4, 6); 
                ctx.fillRect(offsetX + 30, 40, 8, 2); 

                // Cuello
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 24, 52, 16, 4);

                // NUEVO: Ropa - Torso (Camiseta Azul)
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 18, 56, 28, 40); // Base de cuerpo
                ctx.fillStyle = colorCamiseta;
                ctx.fillRect(offsetX + 20, 58, 24, 26); // Relleno Camiseta

                // NUEVO: Ropa - Pantalones cortos
                ctx.fillStyle = colorPantalon;
                ctx.fillRect(offsetX + 20, 84, 24, 10);

                // Sombra de la ropa (Lado izquierdo)
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(offsetX + 20, 58, 5, 36);

                // Brazos con Mangas Cortas
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 14, 60, 5, 24); 
                ctx.fillRect(offsetX + 45, 60, 5, 24); 
                
                // Relleno manga e inicio de brazo
                ctx.fillStyle = colorCamiseta; // Manga izquierda
                ctx.fillRect(offsetX + 15, 61, 3, 10);
                ctx.fillRect(offsetX + 46, 61, 3, 10); // Manga derecha
                
                ctx.fillStyle = colorSombraPiel; 
                ctx.fillRect(offsetX + 15, 71, 3, 12); // Brazo piel izq
                ctx.fillStyle = colorPiel;
                ctx.fillRect(offsetX + 46, 71, 3, 12); // Brazo piel der

                // Piernas Dinámicas
                let izqOffsety = 0;
                let derOffsety = 0;
                if (estado === 'paso1') { izqOffsety = -4; }
                if (estado === 'paso2') { derOffsety = -4; }

                // Pierna Izquierda
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 21, 96 + izqOffsety, 8, 22);
                ctx.fillStyle = colorSombraPiel; 
                ctx.fillRect(offsetX + 23, 98 + izqOffsety, 4, 18);

                // Pierna Derecha
                ctx.fillStyle = colorContorno;
                ctx.fillRect(offsetX + 35, 96 + derOffsety, 8, 22);
                ctx.fillStyle = colorPiel;
                ctx.fillRect(offsetX + 37, 98 + derOffsety, 4, 18);
            }

            // Renderizar los 4 estados en la tira horizontal de la textura
            dibujarCuadroPersonaje(0, 'idle');
            dibujarCuadroPersonaje(64, 'paso1');
            dibujarCuadroPersonaje(128, 'paso2');
            dibujarCuadroPersonaje(192, 'nadar');

            return new THREE.CanvasTexture(canvas);
        }

        const spritesheetTexture = crearSpritesheetFiel();
        spritesheetTexture.magFilter = THREE.NearestFilter;
        spritesheetTexture.minFilter = THREE.NearestFilter;
        spritesheetTexture.repeat.set(1/4, 1); // Ahora son 4 cuadros, dividimos por 4 el encuadre UV

        const spriteMat = new THREE.SpriteMaterial({ map: spritesheetTexture, transparent: true });
        const jugadorSprite = new THREE.Sprite(spriteMat);
        jugadorSprite.scale.set(2, 4, 1);

        const jugadorNode = new THREE.Group();
        jugadorNode.position.set(0, 4, 0);
        jugadorNode.add(jugadorSprite);
        scene.add(jugadorNode);

        // 6. CONTROLADORES DE ENTRADA
        const teclas = { w: false, a: false, s: false, d: false };
        let mouseCamara = { horizontal: 0, vertical: 0.25 };

        const divBloqueo = document.getElementById('bloqueo-pantalla');
        window.addEventListener('click', () => { document.body.requestPointerLock(); });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                divBloqueo.style.opacity = '0';
                divBloqueo.style.pointerEvents = 'none';
            } else {
                divBloqueo.style.opacity = '1';
                divBloqueo.style.pointerEvents = 'auto';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                mouseCamara.horizontal -= e.movementX * 0.0035;
                mouseCamara.vertical -= e.movementY * 0.0035;
                mouseCamara.vertical = Math.max(0.05, Math.min(Math.PI / 2.6, mouseCamara.vertical));
            }
        });

        window.addEventListener('keydown', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false; });

        let cronometroAnim = 0;

        // 7. BUCLE DINÁMICO DE RENDER
        function animate() {
            requestAnimationFrame(animate);

            const tiempo = performance.now() * 0.002;

            // --- FÍSICAS DE OLEAJE DE AGUA SIMULADAS ---
            const posicionAgua = waterGeo.attributes.position;
            for (let i = 0; i < posicionAgua.count; i++) {
                const u = posicionOriginalAgua.getX(i);
                const v = posicionOriginalAgua.getY(i);
                // Onda compleja matemática para deformar la malla en tiempo real
                const zMod = Math.sin(u * 0.1 + tiempo) * Math.cos(v * 0.1 + tiempo) * 0.15 + Math.sin(u * 0.05 - tiempo) * 0.1;
                posicionAgua.setZ(i, zMod);
            }
            waterGeo.computeVertexNormals();
            posicionAgua.needsUpdate = true;

            // Vectores de movimiento respecto a la cámara
            let vectorDireccion = new THREE.Vector3();
            let camaraFrente = new THREE.Vector3();
            let camaraDerecha = new THREE.Vector3();

            camera.getWorldDirection(camaraFrente);
            camaraFrente.y = 0;
            camaraFrente.normalize();
            camaraDerecha.crossVectors(camaraFrente, camera.up).normalize().negate();

            let estaCaminando = false;

            if (teclas.w) { vectorDireccion.add(camaraFrente); estaCaminando = true; }
            if (teclas.s) { vectorDireccion.add(camaraFrente.clone().negate()); estaCaminando = true; }
            if (teclas.a) { vectorDireccion.add(camaraDerecha.clone().negate()); estaCaminando = true; }
            if (teclas.d) { vectorDireccion.add(camaraDerecha); estaCaminando = true; }

            // Comprobación de físicas y estado del agua
            const hSuelo = obtenerAlturaTerreno(jugadorNode.position.x, jugadorNode.position.z);
            const enElAgua = hSuelo < -1.2; // Altura de la superficie del agua fija
            
            // Variación de velocidad adaptativa (Fricción en el agua)
            const velocidadActual = enElAgua ? 0.09 : 0.2; 

            if (estaCaminando) {
                vectorDireccion.normalize();
                jugadorNode.position.addScaledVector(vectorDireccion, velocidadActual);

                const proyeccionLateral = vectorDireccion.dot(camaraDerecha);
                if (proyeccionLateral < -0.1) jugadorSprite.scale.x = -2; 
                if (proyeccionLateral > 0.1) jugadorSprite.scale.x = 2;   
            }

            // Control de altura física del jugador
            if (enElAgua) {
                // El jugador flota en el agua (Nivel del mar + sutil balanceo)
                const balanceoNado = Math.sin(tiempo * 3) * 0.08;
                jugadorNode.position.y = -1.2 + 0.8 + balanceoNado; 
            } else {
                // El jugador camina sobre las colinas normales
                jugadorNode.position.y = hSuelo + 2.0;
            }

            // --- MÁQUINA DE ESTADOS Y ANIMACIÓN DEL SPRITE ---
            cronometroAnim += 0.14;
            if (enElAgua) {
                // Estado 3: Frame de Nadar (offset x = 3/4)
                spritesheetTexture.offset.x = 3 / 4;
                jugadorSprite.position.y = 0; // Controlado por el nodo global de flotación
            } else if (estaCaminando) {
                // Ciclo alterno entre frame 1 y frame 2
                let frameId = Math.floor(cronometroAnim % 2) + 1;
                spritesheetTexture.offset.x = frameId / 4;
                jugadorSprite.position.y = Math.abs(Math.sin(cronometroAnim * 1.5)) * 0.08; 
            } else {
                // Estado 0: Idle estático
                spritesheetTexture.offset.x = 0.0;
                jugadorSprite.position.y = Math.sin(cronometroAnim * 0.25) * 0.03; 
            }

            // ÓRBITA SUAVE DE CÁMARA CON MOUSE LOOK
            const radioCamara = 11;
            const objetivoCamaraX = jugadorNode.position.x + radioCamara * Math.sin(mouseCamara.horizontal) * Math.cos(mouseCamara.vertical);
            const objetivoCamaraY = jugadorNode.position.y + radioCamara * Math.sin(mouseCamara.vertical);
            const objetivoCamaraZ = jugadorNode.position.z + radioCamara * Math.cos(mouseCamara.horizontal) * Math.cos(mouseCamara.vertical);

            camera.position.x += (objetivoCamaraX - camera.position.x) * 0.09;
            camera.position.y += (objetivoCamaraY - camera.position.y) * 0.09;
            camera.position.z += (objetivoCamaraZ - camera.position.z) * 0.09;
            
            camera.lookAt(jugadorNode.position.x, jugadorNode.position.y + (enElAgua ? 0.1 : 0.5), jugadorNode.position.z);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
