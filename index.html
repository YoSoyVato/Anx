<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V12 (WEATHER & MOTION)</title>
    <style>
        :root { --accent: #008cff; --bg: #000103; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
        
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #ai-brain { position: absolute; bottom: 20px; left: 20px; background: rgba(0,5,15,0.85); padding: 20px; border-radius: 4px; border-left: 4px solid var(--ai-color); width: 320px; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        #ai-log { height: 120px; overflow-y: hidden; font-size: 0.75rem; margin-top: 10px; color: #7af; line-height: 1.4; }
        
        .hud-stats { position: absolute; top: 20px; left: 20px; font-size: 0.8rem; color: var(--ai-color); }
        #world-title { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; text-shadow: 0 0 15px var(--accent); }
        
        body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 1000; background-size: 100% 4px, 3px 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 1px solid rgba(0,255,204,0.5); transform: translate(-50%, -50%); border-radius: 50%; }
        #weather-status { position: absolute; top: 50px; left: 20px; font-size: 0.7rem; color: #fff; text-transform: uppercase; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="world-title">INICIALIZANDO...</div>
        <div class="hud-stats" id="debug">COORD: X:0 Z:0 | FPS: 60</div>
        <div id="weather-status">CLIMA: DESPEJADO</div>
        <div id="crosshair"></div>
        
        <div id="ai-brain">
            <div style="color:var(--ai-color); font-weight:bold; display:flex; justify-content:space-between;">
                <span>GENESIS_V12_CORE</span>
                <span id="version">v12.0.1</span>
            </div>
            <div id="ai-log"></div>
        </div>
    </div>

    <canvas id="universe-canvas"></canvas>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        const worldTitle = document.getElementById('world-title');
        const weatherUI = document.getElementById('weather-status');
        
        let width, height, frames = 0;
        // Ajuste de Yaw para que 0 sea "hacia adelante"
        let player = { x: 0, z: 0, yaw: 0, velX: 0, velZ: 0, speed: 1.5 };
        let world = { 
            chunks: [], entities: [], particles: [], 
            time: 0, theme: {}, biome: 'forest',
            weather: 'clear', weatherTimer: 500, cloudOpacity: 0
        };
        const keys = {};

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.innerHTML = `<span style="color:white">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            log.prepend(entry);
            if(log.childNodes.length > 8) log.removeChild(log.lastChild);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Escape') generateNewWorld(); });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- CLASES DE OBJETOS ---
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * width; this.y = -20; this.len = 15 + Math.random() * 20; this.v = 15 + Math.random() * 10; }
            update() { this.y += this.v; if(this.y > height) this.reset(); }
        }

        class GrassBlade {
            constructor(x, z) { this.x = x; this.z = z; this.h = 20 + Math.random() * 30; this.off = Math.random() * 100; }
            draw(scale, x2d, y2d, bright) {
                let sway = Math.sin(frames * 0.04 + this.off) * 8 * scale;
                ctx.strokeStyle = world.theme.accent;
                ctx.lineWidth = 2 * scale;
                ctx.beginPath(); ctx.moveTo(x2d, y2d);
                ctx.quadraticCurveTo(x2d + sway, y2d - this.h*scale/2, x2d + sway*1.2, y2d - this.h*scale);
                ctx.globalAlpha = bright; ctx.stroke();
            }
        }

        class Monolith {
            constructor(x, z) { this.x = x; this.z = z; this.h = 400 + Math.random() * 1500; this.w = 80 + Math.random() * 100; }
            draw(scale, x2d, y2d, bright) {
                ctx.lineWidth = 2 * scale; ctx.strokeStyle = world.theme.accent;
                ctx.fillStyle = "#000"; ctx.globalAlpha = bright;
                ctx.strokeRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
                ctx.globalAlpha = 0.3 * bright;
                ctx.fillRect(x2d - (this.w*scale)/2, y2d - this.h*scale, this.w*scale, this.h*scale);
            }
        }

        function generateNewWorld() {
            frames = 0; world.entities = []; world.particles = [];
            world.biome = ['NEON_CITY', 'VOID_PLAINS', 'DATA_CYBER'][Math.floor(Math.random()*3)];
            const hue = Math.random() * 360;
            world.theme = { hue, accent: `hsl(${hue}, 100%, 60%)`, part: `hsl(${hue}, 80%, 90%)` };
            worldTitle.innerText = world.biome; worldTitle.style.color = world.theme.accent;
            addLog("MUNDO GENERADO: " + world.biome);

            for(let i=0; i<300; i++) {
                let rx = (Math.random()-0.5) * 12000, rz = (Math.random()-0.5) * 12000;
                if(i < 250) world.entities.push(new GrassBlade(rx, rz));
                if(i < 30) world.entities.push(new Monolith(rx, rz));
            }
            for(let i=0; i<150; i++) world.particles.push(new Particle());
        }

        function loop() {
            // Tiempo y Luces
            world.time = (frames % 6000) / 6000;
            let dayLevel = Math.max(0.05, Math.sin(world.time * Math.PI * 2)); // Ciclo circular
            let sunY = height/2 - Math.sin(world.time * Math.PI * 2) * (height/1.5);
            let sunX = width/2 + Math.cos(world.time * Math.PI * 2) * (width/3);

            // Clima
            world.weatherTimer--;
            if(world.weatherTimer <= 0) {
                world.weather = world.weather === 'clear' ? 'rain' : 'clear';
                world.weatherTimer = 1000 + Math.random() * 1000;
                addLog(world.weather === 'rain' ? "AVISO: TORMENTA DE DATOS" : "AVISO: CIELO DESPEJADO");
            }
            world.cloudOpacity += (world.weather === 'rain' ? 0.005 : -0.005);
            world.cloudOpacity = Math.max(0, Math.min(0.6, world.cloudOpacity));

            // Fondo y Cielo
            let ambient = (dayLevel > 0 ? dayLevel : 0.1) * (1 - world.cloudOpacity);
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,width,height);
            
            // Dibujar Sol / Luna
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 40;
            if(dayLevel > 0) {
                ctx.shadowColor = "yellow"; ctx.fillStyle = "#fffde0";
                ctx.beginPath(); ctx.arc(sunX, sunY, 40, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.shadowColor = "#7af"; ctx.fillStyle = "#e0f0ff";
                ctx.beginPath(); ctx.arc(width - sunX, height - sunY, 30, 0, Math.PI*2); ctx.fill();
            }
            ctx.shadowBlur = 0;

            // Nubes de lluvia
            if(world.cloudOpacity > 0) {
                ctx.fillStyle = `rgba(50, 50, 60, ${world.cloudOpacity})`;
                ctx.fillRect(0, 0, width, height / 2);
            }

            // --- MEJORA MOVIMIENTO WASD ---
            let moveX = 0, moveZ = 0;
            if(keys['KeyW']) moveZ += 1;
            if(keys['KeyS']) moveZ -= 1;
            if(keys['KeyA']) moveX -= 1;
            if(keys['KeyD']) moveX += 1;
            if(keys['ArrowLeft']) player.yaw -= 0.04;
            if(keys['ArrowRight']) player.yaw += 0.04;

            // Vector de movimiento relativo a la cámara
            let forwardX = Math.sin(player.yaw), forwardZ = Math.cos(player.yaw);
            let sideX = Math.sin(player.yaw + Math.PI/2), sideZ = Math.cos(player.yaw + Math.PI/2);

            player.velX = (forwardX * moveZ + sideX * moveX) * player.speed * 10;
            player.velZ = (forwardZ * moveZ + sideZ * moveX) * player.speed * 10;

            player.x += player.velX; player.z += player.velZ;

            // Renderizado de Mundo
            let renderList = world.entities.map(e => {
                let dx = e.x - player.x, dz = e.z - player.z;
                let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                return { e, rx, rz };
            }).filter(item => item.rz > 20);

            renderList.sort((a, b) => b.rz - a.rz);
            renderList.forEach(item => {
                let scale = 1000 / item.rz;
                let x2d = item.rx * scale + width/2;
                let y2d = height/2 + 250 * scale;
                item.e.draw(scale, x2d, y2d, ambient + 0.2);
            });

            // Lluvia
            if(world.weather === 'rain') {
                ctx.strokeStyle = world.theme.part; ctx.globalAlpha = 0.5;
                world.particles.forEach(p => { p.update(); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y + p.len); ctx.stroke(); });
            }

            // Brazos
            let bob = Math.sin(frames * 0.15) * (Math.abs(moveZ) + Math.abs(moveX)) * 5;
            ctx.globalAlpha = 1; ctx.fillStyle = "#050505"; ctx.strokeStyle = world.theme.accent; ctx.lineWidth = 4;
            // Brazo Izq
            ctx.save(); ctx.translate(width*0.2, height-150 + bob); ctx.rotate(-0.1); ctx.fillRect(0,0,100,400); ctx.strokeRect(0,0,100,400); ctx.restore();
            // Brazo Der
            ctx.save(); ctx.translate(width*0.8-100, height-150 + bob); ctx.rotate(0.1); ctx.fillRect(0,0,100,400); ctx.strokeRect(0,0,100,400); ctx.restore();

            weatherUI.innerText = `CLIMA: ${world.weather} | AMBIENTE: ${Math.floor(ambient*100)}%`;
            document.getElementById('debug').innerText = `X: ${Math.floor(player.x)} Z: ${Math.floor(player.z)} | YAW: ${player.yaw.toFixed(2)}`;
            
            frames++; requestAnimationFrame(loop);
        }

        resize(); generateNewWorld(); loop();
    </script>
</body>
</html>
