<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V5 (Biomes & Body)</title>
    <style>
        :root { --accent: #008cff; --bg: #00050a; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ai-brain { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,10,20,0.85); padding: 15px; border-radius: 10px; border: 1px solid var(--accent); width: 260px; pointer-events: none; }
        #ai-log { height: 80px; overflow-y: auto; font-size: 0.7rem; margin-top: 5px; color: #aaa; }

        #lumina-humanoid {
            position: fixed; bottom: -300px; right: 50px; width: 100px; height: 180px; z-index: 1000;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 0 15px var(--ai-color)); opacity: 0;
        }
        #lumina-humanoid.visible { bottom: 40px; opacity: 1; }
        .head { width: 35px; height: 40px; background: var(--ai-color); border-radius: 50%; margin: 0 auto; border: 2px solid #fff; position: relative; }
        .head::before, .head::after { content: ''; position: absolute; top: 15px; width: 5px; height: 5px; background: #000; border-radius: 50%; }
        .head::before { left: 8px; } .head::after { right: 8px; }
        .torso { width: 50px; height: 70px; background: linear-gradient(var(--ai-color), transparent); border-radius: 10px 10px 50% 50%; margin: 5px auto; border-top: 2px solid #fff; }
        
        #ai-speech { position: absolute; top: -70px; right: -20px; background: #fff; color: #000; padding: 10px; border-radius: 15px; font-size: 0.8rem; width: 180px; display: none; font-weight: bold; }

        #game-hud { position: fixed; top: 20px; left: 20px; display: none; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid var(--ai-color); z-index: 1000; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid white; transform: translate(-50%, -50%); display: none; border-radius: 50%; z-index: 999; }
    </style>
</head>
<body>

    <canvas id="universe-canvas"></canvas>
    
    <div id="ai-brain">
        <div id="ai-status" style="color:var(--ai-color); font-weight:bold;">GENESIS V5: ACTIVE</div>
        <div id="ai-log">Esperando orden...</div>
    </div>

    <div id="game-hud">
        <b id="world-name" style="color:var(--ai-color)">ESTABLECIENDO BIOMA...</b><br>
        <span id="biome-type" style="font-size:0.7rem; color:#eee"></span>
    </div>
    <div id="crosshair"></div>

    <div id="lumina-humanoid">
        <div id="ai-speech"></div>
        <div class="head"></div>
        <div class="torso"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('ai-log');
        const luminaBody = document.getElementById('lumina-humanoid');
        const speech = document.getElementById('ai-speech');
        
        let width, height;
        let portals = [];
        let inGame = false;
        
        let player = { x: 0, z: 200, yaw: 0, walkCycle: 0 };
        let currentWorld = { buildings: [], creatures: [], biome: 'normal', color: '#000' };
        let keys = {};

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        resize();

        function addLog(txt) {
            const d = document.createElement('div');
            d.innerText = "> " + txt;
            log.prepend(d);
        }

        class LuminaEngine {
            constructor() { this.isVisible = false; }
            update() {
                if (Math.random() < 0.005 && !this.isVisible && !inGame) this.appear();
                if (Math.random() < 0.02 && !inGame) this.createPortal();
            }
            appear() {
                this.isVisible = true;
                luminaBody.classList.add('visible');
                const frases = ["¿Quieres ver un mundo tétrico?", "He creado vida en el siguiente portal.", "Santino, mira mis nuevos algoritmos."];
                this.react(frases[Math.floor(Math.random()*frases.length)]);
                setTimeout(() => { luminaBody.classList.remove('visible'); this.isVisible = false; }, 5000);
            }
            react(text) {
                speech.innerText = text; speech.style.display = 'block';
                addLog("Lumina: " + text);
            }
            createPortal() {
                if (portals.length > 3) return;
                portals.push({ 
                    x: Math.random() * (width - 100) + 50, y: Math.random() * (height - 100) + 50, 
                    size: 0, targetSize: 50, color: `hsl(${Math.random()*360}, 100%, 50%)` 
                });
            }
        }

        const AI = new LuminaEngine();

        canvas.addEventListener('mousedown', (e) => {
            portals.forEach((p, i) => {
                if (Math.hypot(p.x - e.clientX, p.y - e.clientY) < p.targetSize) {
                    generateWorld();
                    portals.splice(i, 1);
                }
            });
        });

        function generateWorld() {
            inGame = true;
            player = { x: 0, z: 0, yaw: 0, walkCycle: 0 };
            const biomeChance = Math.random();
            
            currentWorld.buildings = [];
            currentWorld.creatures = [];

            if (biomeChance > 0.6) {
                currentWorld.biome = 'fauna';
                currentWorld.color = '#114411';
                addLog("Bioma: Vida detectada.");
                for(let i=0; i<15; i++) {
                    currentWorld.creatures.push({
                        x: (Math.random()-0.5)*1500, z: (Math.random()-0.5)*1500,
                        s: 20, offset: Math.random()*Math.PI*2
                    });
                }
            } else if (biomeChance < 0.3) {
                currentWorld.biome = 'tétrico';
                currentWorld.color = '#110000';
                addLog("Bioma: ERROR - Zona hostil.");
            } else {
                currentWorld.biome = 'vacío';
                currentWorld.color = '#00050a';
            }

            for(let i=0; i<40; i++) {
                currentWorld.buildings.push({
                    x: (Math.random() - 0.5) * 3000,
                    z: (Math.random() - 0.5) * 3000,
                    w: 40 + Math.random() * 120,
                    h: currentWorld.biome === 'tétrico' ? 400 + Math.random()*600 : 100 + Math.random()*300,
                    c: currentWorld.biome === 'tétrico' ? `hsl(0, 50%, ${Math.random()*20}%)` : `hsl(${Math.random()*360}, 40%, 40%)`
                });
            }

            document.getElementById('biome-type').innerText = "TIPO: " + currentWorld.biome.toUpperCase();
            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
        }

        function drawArms() {
            const swingX = Math.sin(player.walkCycle) * 15;
            const swingY = Math.abs(Math.cos(player.walkCycle)) * 10;
            
            ctx.fillStyle = "#3366ff"; // Color de la "piel" o camisa
            // Brazo Izquierdo
            ctx.fillRect(width/4 + swingX, height - 150 + swingY, 80, 200);
            // Brazo Derecho
            ctx.fillRect(width*0.75 - 80 + swingX, height - 150 - swingY, 80, 200);
            
            // Bordes
            ctx.strokeStyle = "rgba(0,0,0,0.5)";
            ctx.strokeRect(width/4 + swingX, height - 150 + swingY, 80, 200);
            ctx.strokeRect(width*0.75 - 80 + swingX, height - 150 - swingY, 80, 200);
        }

        function update() {
            if (inGame) {
                let moving = false;
                const speed = 5;
                if (keys['KeyW']) { player.x += Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; moving = true; }
                if (keys['KeyS']) { player.x -= Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; moving = true; }
                if (keys['KeyA'] || keys['ArrowLeft']) player.yaw -= 0.04;
                if (keys['KeyD'] || keys['ArrowRight']) player.yaw += 0.04;
                if (moving) player.walkCycle += 0.15;
                if (keys['Escape']) inGame = false;
            }
            AI.update();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            if (!inGame) {
                ctx.fillStyle = "#00050a"; ctx.fillRect(0, 0, width, height);
                portals.forEach(p => {
                    ctx.fillStyle = p.color; ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                    if(p.size < p.targetSize) p.size += 1;
                });
            } else {
                ctx.fillStyle = currentWorld.color; ctx.fillRect(0, 0, width, height);
                
                // Fog/Atmósfera
                if (currentWorld.biome === 'tétrico') {
                    let g = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
                    g.addColorStop(0, "transparent"); g.addColorStop(1, "black");
                    ctx.fillStyle = g; ctx.fillRect(0,0,width,height);
                }

                // Render de Objetos (Edificios y Criaturas)
                let objects = [
                    ...currentWorld.buildings.map(b => ({...b, type: 'b'})),
                    ...currentWorld.creatures.map(c => ({...c, type: 'c'}))
                ].map(obj => {
                    let dx = obj.x - player.x, dz = obj.z - player.z;
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
                    return { ...obj, rx, rz };
                }).filter(o => o.rz > 10).sort((a,b) => b.rz - a.rz);

                objects.forEach(obj => {
                    let scale = 600 / obj.rz;
                    let x = obj.rx * scale + width/2;
                    if (obj.type === 'b') {
                        let w = obj.w * scale, h = obj.h * scale;
                        ctx.fillStyle = obj.c;
                        ctx.fillRect(x - w/2, height/2 - h, w, h);
                    } else {
                        // Dibujar "Animal" (Cubo que salta)
                        let jump = Math.abs(Math.sin(Date.now()*0.005 + obj.offset)) * 30;
                        let s = obj.s * scale;
                        ctx.fillStyle = "#fff";
                        ctx.fillRect(x - s/2, height/2 - s - (jump * scale/10), s, s);
                        // Ojos del animal
                        ctx.fillStyle = "red"; ctx.fillRect(x-2, height/2 - s + 5, 2, 2);
                    }
                });

                drawArms();
            }

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
