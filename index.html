<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANX - Genesis Engine V3 (FPS & Procedural)</title>
    <style>
        :root { --accent: #008cff; --bg: #00050a; --ai-color: #00ffcc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #lumina-humanoid {
            position: fixed; bottom: -300px; right: 50px; width: 100px; height: 180px;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 0 15px var(--ai-color)); opacity: 0;
        }
        #lumina-humanoid.visible { bottom: 40px; opacity: 1; }
        .head { width: 35px; height: 40px; background: var(--ai-color); border-radius: 50%; margin: 0 auto; border: 2px solid #fff; }
        .torso { width: 50px; height: 70px; background: linear-gradient(var(--ai-color), transparent); border-radius: 10px 10px 50% 50%; margin: 5px auto; border-top: 2px solid #fff; }
        #ai-speech { position: absolute; top: -70px; right: -20px; background: #fff; color: #000; padding: 10px; border-radius: 15px; font-size: 0.8rem; width: 180px; display: none; font-weight: bold; }

        #game-hud { position: fixed; top: 20px; left: 20px; display: none; background: rgba(0,20,40,0.8); padding: 15px; border: 1px solid var(--ai-color); }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid white; transform: translate(-50%, -50%); display: none; border-radius: 50%; }
    </style>
</head>
<body>

    <canvas id="universe-canvas"></canvas>
    
    <div id="ui-layer">
        <div id="game-hud">
            <b id="world-name" style="color:var(--ai-color)">GENERANDO MUNDO...</b><br>
            FPS MODE: WASD para caminar | ESC para salir
        </div>
        <div id="crosshair"></div>

        <div id="lumina-humanoid">
            <div id="ai-speech"></div>
            <div class="head"></div>
            <div class="torso"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        const luminaBody = document.getElementById('lumina-humanoid');
        const speech = document.getElementById('ai-speech');
        
        let width, height;
        let elements = [];
        let inGame = false;
        
        // Variables FPS
        let player = { x: 0, y: 0, z: 0, yaw: 0 };
        let currentBuildings = [];
        let keys = {};

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        resize();

        class LuminaEngine {
            constructor() { this.isVisible = false; }
            update() {
                if (Math.random() < 0.005 && !this.isVisible) this.appear();
                if (Math.random() < 0.015) this.createPortal();
            }
            appear() {
                this.isVisible = true;
                luminaBody.classList.add('visible');
                const frases = ["Explora mis creaciones, Santino.", "Cada mundo es un sueño distinto.", "¿Ves esa estructura? La hice hoy."];
                this.react(frases[Math.floor(Math.random()*frases.length)]);
                setTimeout(() => { luminaBody.classList.remove('visible'); this.isVisible = false; }, 6000);
            }
            react(text) {
                speech.innerText = text; speech.style.display = 'block';
            }
            createPortal() {
                if (elements.length > 3) return;
                elements.push({ 
                    type: 'portal', x: Math.random() * width, y: Math.random() * height, 
                    size: 0, targetSize: 60, color: `hsl(${Math.random()*360}, 100%, 50%)` 
                });
            }
        }

        const AI = new LuminaEngine();

        canvas.addEventListener('mousedown', (e) => {
            elements.forEach((el, i) => {
                if (Math.hypot(el.x - e.clientX, el.y - e.clientY) < el.targetSize) {
                    generateNewWorld();
                    elements.splice(i, 1);
                }
            });
        });

        function generateNewWorld() {
            inGame = true;
            player = { x: 0, y: 0, z: 200, yaw: 0 };
            currentBuildings = [];
            
            // GENERACIÓN PROCEDURAL: Construcciones que no se repiten
            const colorWorld = `hsl(${Math.random()*360}, 70%, 50%)`;
            document.getElementById('world-name').innerText = "MUNDO: " + (Math.random().toString(36).substring(7)).toUpperCase();
            
            for(let i=0; i<15; i++) {
                currentBuildings.push({
                    x: (Math.random() - 0.5) * 1000,
                    z: (Math.random() - 0.5) * 1000,
                    w: 40 + Math.random() * 60,
                    h: 100 + Math.random() * 300,
                    color: colorWorld
                });
            }
            document.getElementById('game-hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
        }

        function updateFPS() {
            if (!inGame) return;
            const speed = 3;
            if (keys['KeyW']) { player.x += Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
            if (keys['KeyS']) { player.x -= Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
            if (keys['KeyA']) player.yaw -= 0.03;
            if (keys['KeyD']) player.yaw += 0.03;
            if (keys['Escape']) { inGame = false; document.getElementById('game-hud').style.display = 'none'; document.getElementById('crosshair').style.display = 'none'; }
        }

        function draw() {
            if (!inGame) {
                ctx.fillStyle = 'rgba(0, 5, 10, 0.4)';
                ctx.fillRect(0, 0, width, height);
                elements.forEach(el => {
                    ctx.fillStyle = el.color; ctx.beginPath();
                    ctx.arc(el.x, el.y, el.size, 0, Math.PI*2); ctx.fill();
                    if(el.size < el.targetSize) el.size += 2;
                });
            } else {
                // RENDER FPS (Pseudo-3D)
                ctx.fillStyle = "#00050a"; ctx.fillRect(0, 0, width, height);
                
                // Dibujar suelo
                ctx.strokeStyle = "#112233";
                for(let i=-10; i<10; i++) {
                    ctx.beginPath(); ctx.moveTo(0, height/2 + i*20); ctx.lineTo(width, height/2 + i*20); ctx.stroke();
                }

                // Renderizar edificios con perspectiva
                currentBuildings.forEach(b => {
                    // Transformación simple de coordenadas
                    let dx = b.x - player.x;
                    let dz = b.z - player.z;
                    
                    // Rotación de cámara
                    let rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
                    let rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);

                    if (rz > 10) { // Solo dibujar si está frente a la cámara
                        let screenX = (rx / rz) * width + width / 2;
                        let screenY = height / 2;
                        let size = (1 / rz) * 500;
                        let bH = b.h * (1 / rz) * 5;

                        ctx.fillStyle = b.color;
                        ctx.globalAlpha = Math.min(1, 500/rz);
                        ctx.fillRect(screenX - (b.w * size / 10), screenY - bH, b.w * size / 5, bH);
                        ctx.strokeStyle = "white";
                        ctx.strokeRect(screenX - (b.w * size / 10), screenY - bH, b.w * size / 5, bH);
                        ctx.globalAlpha = 1;
                    }
                });
            }

            updateFPS();
            AI.update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
