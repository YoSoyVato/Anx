<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Social HD-2D Profesional</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0f19; user-select: none; }
        canvas { display: block; }
        #interface {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #f0f3f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(11, 15, 25, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #bloqueo-pantalla {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            color: white;
            font-family: sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="bloqueo-pantalla">
        Haga clic en la pantalla para activar la cámara libre con el ratón
    </div>

    <div id="interface">
        <strong style="color: #4cc9f0; font-size: 1.1rem;">PROTOTIPO HD-2D ENGINE</strong><br><br>
        • <strong>Click Izquierdo:</strong> Capturar Ratón y Mirar<br>
        • <strong>Moverse:</strong> W, A, S, D (Relativo a la Cámara)<br>
        • <strong>Render:</strong> Sprite 2D Animado por Fotogramas
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. CONFIGURACIÓN DEL ESPACIO RENDER
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xbde0fe); 
        scene.fog = new THREE.FogExp2(0xbde0fe, 0.015);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 2. ILUMINACIÓN CINEMÁTICA
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        sunLight.position.set(60, 100, 40);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);

        // 3. GENERACIÓN DEL MAPA AVANZADO
        const tamañoMundo = 200;
        const segmentos = 100;
        const terrainGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo, segmentos, segmentos);
        
        function obtenerAlturaTerreno(x, z) {
            // Capa colinas suaves
            let y = Math.sin(x * 0.03) * Math.cos(z * 0.03) * 6;
            // Capa micro-relieve para imperfecciones naturales
            y += Math.sin(x * 0.12) * Math.cos(z * 0.12) * 0.8;
            
            // Muralla montañosa en bordes para delimitar el nivel de juego
            const distCentro = Math.sqrt(x*x + z*z);
            if (distCentro > 60) {
                const rampa = Math.pow((distCentro - 60) * 0.18, 2);
                y += rampa * (Math.sin(x * 0.08) * 3 + 4);
            }
            if (y < -4) y = -4 + (y + 4) * 0.2; // Fondo del lago suavizado
            return y;
        }

        const pos = terrainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            pos.setZ(i, obtenerAlturaTerreno(x, y));
        }
        terrainGeo.computeVertexNormals();
        terrainGeo.rotateX(-Math.PI / 2);

        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x606c38, 
            roughness: 0.85,
            flatShading: true 
        });
        const terreno = new THREE.Mesh(terrainGeo, terrainMat);
        terreno.receiveShadow = true;
        scene.add(terreno);

        // Agua Estilizada
        const waterGeo = new THREE.PlaneGeometry(tamañoMundo, tamañoMundo);
        const waterMat = new THREE.MeshStandardMaterial({ 
            color: 0x1d3557, 
            transparent: true, 
            opacity: 0.8,
            roughness: 0.1,
            metalness: 0.1
        });
        const lago = new THREE.Mesh(waterGeo, waterMat);
        lago.rotation.x = -Math.PI / 2;
        lago.position.y = -3.0;
        scene.add(lago);

        // Vegetación Mejorada (Árboles estilizados con degradados)
        const crearArbolEstilizado = (x, z, h) => {
            const grupo = new THREE.Group();
            const tronco = new THREE.Mesh(
                new THREE.CylinderGeometry(0.15, 0.35, 3, 5),
                new THREE.MeshStandardMaterial({ color: 0x3d2616, roughness: 0.9 })
            );
            tronco.position.y = 1.5;
            tronco.castShadow = true;
            grupo.add(tronco);

            // Copa en capas de polígonos
            for(let i=0; i<3; i++) {
                const copa = new THREE.Mesh(
                    new THREE.ConeGeometry(1.6 - i*0.3, 2.2, 5),
                    new THREE.MeshStandardMaterial({ color: new THREE.Color(0x283618).multiplyScalar(1 + i*0.15), flatShading: true })
                );
                copa.position.y = 3.0 + (i * 1.2);
                copa.castShadow = true;
                grupo.add(copa);
            }
            grupo.position.set(x, h, z);
            scene.add(grupo);
        };

        for (let i = 0; i < 150; i++) {
            const x = (Math.random() - 0.5) * 110;
            const z = (Math.random() - 0.5) * 110;
            const h = obtenerAlturaTerreno(x, z);
            if (h > -2.5) crearArbolEstilizado(x, z, h);
        }

        // 4. GENERADOR PROFESIONAL DE TEXTURAS (Spritesheet Pixel-Art)
        function crearSpritesheetAvatar() {
            const canvas = document.createElement('canvas');
            canvas.width = 192; // 3 cuadros de 64x128 píxeles de alto
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;

            // Función interna para dibujar un frame específico
            function dibujarFrame(offsetX, estadoAnim) {
                // Sombra proyectada en los pies dentro del propio sprite
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.beginPath();
                ctx.ellipse(offsetX + 32, 120, 14, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Cabeza Humanoide Proporcionada
                ctx.fillStyle = '#fcd5b5'; // Piel
                ctx.fillRect(offsetX + 18, 20, 28, 28);
                ctx.strokeStyle = '#1e1a17';
                ctx.lineWidth = 2;
                ctx.strokeRect(offsetX + 18, 20, 28, 28);

                // Cabello con Volumen Marrón (Como la foto enviada)
                ctx.fillStyle = '#5c3d24';
                ctx.fillRect(offsetX + 16, 16, 32, 10);
                ctx.fillRect(offsetX + 16, 26, 6, 12);
                ctx.fillRect(offsetX + 42, 26, 6, 12);

                // Ojos y Expresión Minimalista Profesional
                ctx.fillStyle = '#1e1a17';
                ctx.fillRect(offsetX + 25, 30, 4, 4);
                ctx.fillRect(offsetX + 35, 30, 4, 4);
                ctx.fillRect(offsetX + 29, 40, 6, 2); // Boca

                // Ropa: Camiseta Verde con Sombreado
                ctx.fillStyle = '#2a9d8f'; // Cuerpo base verde
                ctx.fillRect(offsetX + 16, 48, 32, 36);
                ctx.strokeRect(offsetX + 16, 48, 32, 36);
                ctx.fillStyle = '#264653'; // Mangas/Detalles
                ctx.fillRect(offsetX + 12, 48, 4, 16);
                ctx.fillRect(offsetX + 48, 48, 4, 16);

                // Ropa: Pantalón Corto/Short Azul
                ctx.fillStyle = '#e76f51'; // Cambiamos a un tono complementario para balance de diseño
                ctx.fillStyle = '#457b9d'; // Azul Denim
                ctx.fillRect(offsetX + 18, 84, 28, 14);
                ctx.strokeRect(offsetX + 18, 84, 28, 14);

                // Piernas Dinámicas según Estado de Animación
                ctx.fillStyle = '#fcd5b5'; // Color de Piel
                let piernaIzqY = 98, piernaDerY = 98;
                
                if (estadoAnim === 'walk1') { piernaIzqY -= 4; }
                if (estadoAnim === 'walk2') { piernaDerY -= 4; }

                // Pierna Izquierda y Zapato
                ctx.fillRect(offsetX + 22, piernaIzqY, 6, 16);
                ctx.fillStyle = '#e63946'; // Zapato Rojo
                ctx.fillRect(offsetX + 20, piernaIzqY + 12, 8, 6);

                // Pierna Derecha y Zapato
                ctx.fillStyle = '#fcd5b5';
                ctx.fillRect(offsetX + 36, piernaDerY, 6, 16);
                ctx.fillStyle = '#e63946';
                ctx.fillRect(offsetX + 36, piernaDerY + 12, 8, 6);
            }

            // Generamos los 3 cuadros del buffer
            dibujarFrame(0, 'idle');
            dibujarFrame(64, 'walk1');
            dibujarFrame(128, 'walk2');

            return new THREE.CanvasTexture(canvas);
        }

        // Configuración de Mapeo UV de la Textura
        const spritesheetTexture = crearSpritesheetAvatar();
        spritesheetTexture.magFilter = THREE.NearestFilter;
        spritesheetTexture.minFilter = THREE.NearestFilter;
        
        // Dividimos la textura para mostrar solo 1 cuadro a la vez (1/3 horizontal)
        spritesheetTexture.repeat.set(1/3, 1);

        const spriteMat = new THREE.SpriteMaterial({ map: spritesheetTexture, transparent: true });
        const jugadorSprite = new THREE.Sprite(spriteMat);
        jugadorSprite.scale.set(2, 4, 1);

        const jugadorNode = new THREE.Group();
        jugadorNode.position.set(0, 5, 0);
        jugadorNode.add(jugadorSprite);
        scene.add(jugadorNode);

        // 5. SISTEMA DE PERIFÉRICOS (MOUSE LOOK + TECLADO)
        const teclas = { w: false, a: false, s: false, d: false };
        let mouseCamara = { horizontal: 0, vertical: 0.3 }; // Ángulos de orientación orbital

        const divBloqueo = document.getElementById('bloqueo-pantalla');
        
        // Al dar clic se captura el cursor del sistema
        window.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                divBloqueo.style.opacity = '0';
                divBloqueo.style.pointerEvents = 'none';
            } else {
                divBloqueo.style.opacity = '1';
                divBloqueo.style.pointerEvents = 'auto';
            }
        });

        // Captura del movimiento delta del ratón
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                mouseCamara.horizontal -= e.movementX * 0.003;
                mouseCamara.vertical -= e.movementY * 0.003;
                // Límites verticales para que no se voltee la cámara de cabeza
                mouseCamara.vertical = Math.max(0.05, Math.min(Math.PI / 2.5, mouseCamara.vertical));
            }
        });

        window.addEventListener('keydown', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false; });

        // Variables de Control Dinámico
        const velocidad = 0.22;
        let cronometroAnim = 0;

        // 6. LOOP DE ITERACIÓN CONTINUA
        function animate() {
            requestAnimationFrame(animate);

            let vectorDireccion = new THREE.Vector3();
            let camaraFrente = new THREE.Vector3();
            let camaraDerecha = new THREE.Vector3();

            // Obtener el vector de dirección frontal de la cámara en el plano plano XZ
            camera.getWorldDirection(camaraFrente);
            camaraFrente.y = 0;
            camaraFrente.normalize();

            // Obtener el vector derecho de la cámara
            camaraDerecha.crossVectors(camaraFrente, camera.up).normalize().negate();

            let estaCaminando = false;

            // Ensamblar vector de movimiento relativo a la vista actual
            if (teclas.w) { vectorDireccion.add(camaraFrente); estaCaminando = true; }
            if (teclas.s) { vectorDireccion.add(camaraFrente.clone().negate()); estaCaminando = true; }
            if (teclas.a) { vectorDireccion.add(camaraDerecha.clone().negate()); estaCaminando = true; }
            if (teclas.d) { vectorDireccion.add(camaraDerecha); estaCaminando = true; }

            if (estaCaminando) {
                vectorDireccion.normalize();
                jugadorNode.position.addScaledVector(vectorDireccion, velocidad);

                // Voltear el espejo del Sprite dependiendo de la dirección del movimiento lateral relativo
                const proyeccionLateral = vectorDireccion.dot(camaraDerecha);
                if (proyeccionLateral < -0.1) jugadorSprite.scale.x = -2; // Izquierda
                if (proyeccionLateral > 0.1) jugadorSprite.scale.x = 2;   // Derecha
            }

            // Ajustar altura al suelo geométrico
            const hSuelo = obtenerAlturaTerreno(jugadorNode.position.x, jugadorNode.position.z);
            const nivelFisico = Math.max(hSuelo, -3.0);
            jugadorNode.position.y = nivelFisico + 2.0;

            // --- MOTOR DE CONTROL DE FOTOGRAMAS (ANIMACIÓN SPRITESHEET) ---
            cronometroAnim += 0.12;
            if (estaCaminando) {
                // Alterna rítmicamente entre el cuadro 1 (Offset 1/3) y el cuadro 2 (Offset 2/3)
                let cuadroActual = Math.floor(cronometroAnim % 2) + 1; 
                spritesheetTexture.offset.x = cuadroActual / 3;
                
                // Efecto extra: rebote sutil al caminar
                jugadorSprite.position.y = Math.abs(Math.sin(cronometroAnim * 1.2)) * 0.12;
            } else {
                // Cuadro 0 (Offset 0.0) cuando está quieto
                spritesheetTexture.offset.x = 0.0;
                // Efecto de respiración estática fluida
                jugadorSprite.position.y = Math.sin(cronometroAnim * 0.2) * 0.04;
            }

            // Movimiento sinoidal estético del lago
            lago.position.y = -3.0 + Math.sin(cronometroAnim * 0.1) * 0.04;

            // CALCULO DE POSICIÓN ORBITAL DE LA CÁMARA (TERCERA PERSONA POR RATÓN)
            const radioCamara = 12; // Distancia fija al personaje
            
            const objetivoCamaraX = jugadorNode.position.x + radioCamara * Math.sin(mouseCamara.horizontal) * Math.cos(mouseCamara.vertical);
            const objetivoCamaraY = jugadorNode.position.y + radioCamara * Math.sin(mouseCamara.vertical);
            const objetivoCamaraZ = jugadorNode.position.z + radioCamara * Math.cos(mouseCamara.horizontal) * Math.cos(mouseCamara.vertical);

            // Interpolación suavizada (Lerp) para evitar tirones en la cámara
            camera.position.x += (objetivoCamaraX - camera.position.x) * 0.08;
            camera.position.y += (objetivoCamaraY - camera.position.y) * 0.08;
            camera.position.z += (objetivoCamaraZ - camera.position.z) * 0.08;
            
            // Forzar a la cámara a apuntar al centro de masa del personaje humanoide
            camera.lookAt(jugadorNode.position.x, jugadorNode.position.y, jugadorNode.position.z);

            renderer.render(scene, camera);
        }

        animate();

        // Soporte Responsive adaptativo
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
